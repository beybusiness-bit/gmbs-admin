  /* ── 상품 등록 폼 초기화 ── */
  /* 공급가격 + 수수료 → 판매가 역산 */
  window.calcSalePrice = function() {
    const supply = parseFloat((document.getElementById('p-supply-price') || {}).value || '');
    const commission = parseFloat((document.getElementById('p-commission') || {}).value || '');
    const disp = document.getElementById('p-price-display');
    if (!disp) return;
    if (isNaN(supply) || isNaN(commission) || commission >= 100) {
      disp.textContent = '공급가격 · 수수료 입력 후 표시';
      disp.style.color = 'var(--gray-400)';
      disp.style.fontWeight = '700';
      return;
    }
    const salePrice = Math.round(supply / (1 - commission / 100));
    disp.textContent = salePrice.toLocaleString() + '원';
    disp.style.color = 'var(--blue)';
    disp.style.fontWeight = '700';
    disp.dataset.value = salePrice;
    /* 수수료 입력을 직접 건드린 경우 autoFilled 해제 */
    const commInput = document.getElementById('p-commission');
    if (commInput && commInput.dataset.autoFilled) commInput.dataset.autoFilled = '';
  };

  function initProductNewForm(brands) {
    window._pBrands = brands;
    window._optTags = { 1: [], 2: [], 3: [] };
    window._activeAxes = 1;

    /* 브랜드 선택 → 상품ID 미리보기 + 수수료 기본값 */
    document.getElementById('p-brand').addEventListener('change', function() {
      const opt = this.options[this.selectedIndex];
      const code = opt.dataset.code;
      const last = opt.dataset.last || '000';
      const preview = document.getElementById('p-product-id-preview');
      if (!code) { preview.textContent = '브랜드 선택 후 표시'; preview.style.color = 'var(--gray-400)'; return; }
      const next = String(parseInt(last, 10) + 1).padStart(3, '0');
      preview.textContent = code + '-' + next;
      preview.style.color = 'var(--blue)';
      /* 브랜드 수수료 자동 입력 */
      const commInput = document.getElementById('p-commission');
      if (commInput && (commInput.value === '' || commInput.dataset.autoFilled === 'true')) {
        commInput.value = opt.dataset.commission !== undefined ? opt.dataset.commission : 10;
        commInput.dataset.autoFilled = 'true';
        calcSalePrice();
      }
    });

    /* 관리방식 라디오 스타일 */
    ['p-track-qty','p-track-ind'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        document.getElementById('lbl-qty').style.borderColor = document.getElementById('p-track-qty').checked ? 'var(--blue)' : 'var(--gray-300)';
        document.getElementById('lbl-ind').style.borderColor = document.getElementById('p-track-ind').checked ? 'var(--blue)' : 'var(--gray-300)';
      });
    });

    /* 옵션 모드 라디오 */
    document.getElementById('p-opt-none').addEventListener('change', () => {
      document.getElementById('opt-builder').style.display = 'none';
      document.getElementById('combo-section').style.display = 'none';
      document.getElementById('lbl-no-opt').style.borderColor = 'var(--blue)';
      document.getElementById('lbl-has-opt').style.borderColor = 'var(--gray-300)';
    });
    document.getElementById('p-opt-has').addEventListener('change', () => {
      document.getElementById('opt-builder').style.display = '';
      document.getElementById('lbl-no-opt').style.borderColor = 'var(--gray-300)';
      document.getElementById('lbl-has-opt').style.borderColor = 'var(--blue)';
      rebuildCombos();
    });

  }

  /* ── 옵션 태그 입력 ── */
  window.handleTagInput = function(e, axis) {
    if (e.key !== 'Enter' && e.key !== ',') return;
    e.preventDefault();
    const input = document.getElementById('opt-input-' + axis);
    const val = input.value.trim();
    if (!val || window._optTags[axis].includes(val)) { input.value = ''; return; }
    window._optTags[axis].push(val);
    input.value = '';
    renderTags(axis);
    rebuildCombos();
  };

  function renderTags(axis) {
    const wrap = document.getElementById('opt-tags-' + axis);
    if (!wrap) return;
    wrap.innerHTML = window._optTags[axis].map((t, i) =>
      '<span style="display:inline-flex;align-items:center;gap:4px;background:var(--blue-light);color:var(--blue);padding:3px 8px;border-radius:20px;font-size:12px;font-weight:600;">' +
      esc(t) + '<button onclick="removeTag(' + axis + ',' + i + ')" style="background:none;border:none;cursor:pointer;color:var(--blue);font-size:14px;line-height:1;padding:0;">×</button></span>'
    ).join('');
  }

  window.removeTag = function(axis, idx) {
    window._optTags[axis].splice(idx, 1);
    renderTags(axis);
    rebuildCombos();
  };

  /* ── 축 추가/제거 ── */
  window.addAxis = function() {
    if (window._activeAxes >= 3) return;
    window._activeAxes++;
    document.getElementById('opt-axis-' + window._activeAxes).style.display = '';
    if (window._activeAxes >= 3) document.getElementById('btn-add-axis').style.display = 'none';
  };

  window.removeAxis = function(axis) {
    window._optTags[axis] = [];
    document.getElementById('opt-axis-' + axis).style.display = 'none';
    if (axis === window._activeAxes) window._activeAxes--;
    document.getElementById('btn-add-axis').style.display = '';
    rebuildCombos();
  };

  /* ── 옵션 조합 자동 생성 ── */
  window.rebuildCombos = function() {
    const axes = [];
    for (let i = 1; i <= 3; i++) {
      const name = (document.getElementById('opt-axis-name-' + i) || {}).value || '';
      const tags = window._optTags[i] || [];
      const el = document.getElementById('opt-axis-' + i);
      if (el && el.style.display !== 'none' && name && tags.length > 0) {
        axes.push({ name, tags });
      }
    }

    const combos = axes.length > 0 ? cartesian(axes.map(a => a.tags)) : [];
    const section = document.getElementById('combo-section');
    const wrap = document.getElementById('combo-table-wrap');

    if (combos.length === 0) { section.style.display = 'none'; return; }

    section.style.display = '';
    window._combos = combos.map((c, i) => ({
      idx: i,
      values: Array.isArray(c) ? c : [c],
      axisNames: axes.map(a => a.name),
      optionNumber: String(i + 1).padStart(2, '0'),
      price: ''
    }));

    renderComboTable(wrap);
  };

  function cartesian(arrays) {
    return arrays.reduce((acc, arr) => acc.flatMap(a => arr.map(b => [].concat(a, b))), [[]]);
  }

  function renderComboTable(wrap) {
    if (!window._combos || !window._combos.length) return;
    const brandSel = document.getElementById('p-brand');
    const brandOpt = brandSel.options[brandSel.selectedIndex];
    const brandCode = brandOpt ? brandOpt.dataset.code : '???';
    const last = brandOpt ? (brandOpt.dataset.last || '000') : '000';
    const productNum = String(parseInt(last, 10) + 1).padStart(3, '0');

    const rows = window._combos.map((c, i) => {
      const label = c.axisNames.map((n, j) => n + ': ' + c.values[j]).join(' / ');
      const barcode = brandCode + '-' + productNum + '-' + c.optionNumber;
      return '<tr id="combo-row-' + i + '" draggable="true" ondragstart="dragStart(event,' + i + ')" ondragover="dragOver(event,' + i + ')" ondrop="dragDrop(event,' + i + ')" style="cursor:grab;">' +
        '<td style="color:var(--gray-400);font-size:18px;text-align:center;">⠿</td>' +
        '<td style="font-size:12px;color:var(--gray-400);">' + c.optionNumber + '</td>' +
        '<td style="font-weight:500;">' + esc(label) + '</td>' +
        '<td><input type="number" value="' + (c.price || '') + '" placeholder="기본가 사용" min="0" step="100" style="border:1px solid var(--gray-200);border-radius:6px;padding:5px 8px;font-size:13px;width:110px;" onchange="window._combos[' + i + '].price=this.value" /></td>' +
        '<td style="font-family:monospace;font-size:12px;color:var(--gray-500);">' + esc(barcode) + '</td>' +
        '</tr>';
    }).join('');

    wrap.innerHTML = '<div class="table-wrap"><table>' +
      '<thead><tr><th style="width:32px;"></th><th>옵션번호</th><th>옵션 조합</th><th>판매가 (비우면 기본가)</th><th>바코드 미리보기</th></tr></thead>' +
      '<tbody id="combo-tbody">' + rows + '</tbody>' +
      '</table></div>' +
      '<div style="font-size:11px;color:var(--gray-400);margin-top:8px;">⠿ 드래그해서 순서 변경 — 순서대로 옵션번호가 부여됩니다</div>';
  }

  /* ── 드래그 앤 드롭 ── */
  let _dragIdx = null;
  window.dragStart = function(e, i) { _dragIdx = i; e.dataTransfer.effectAllowed = 'move'; };
  window.dragOver = function(e, i) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
  window.dragDrop = function(e, i) {
    e.preventDefault();
    if (_dragIdx === null || _dragIdx === i) return;
    const moved = window._combos.splice(_dragIdx, 1)[0];
    window._combos.splice(i, 0, moved);
    window._combos.forEach((c, j) => { c.idx = j; c.optionNumber = String(j + 1).padStart(2, '0'); });
    _dragIdx = null;
    renderComboTable(document.getElementById('combo-table-wrap'));
  };

  /* ════════════════════════════════
     4단계: 상품 저장 — 검증 → 확인 화면
  ════════════════════════════════ */
  window.saveProduct = function() {
    const brandSel = document.getElementById('p-brand');
    if (!brandSel || !brandSel.value) { showToast('브랜드를 선택해주세요.', 'error'); return; }
    const productName = (document.getElementById('p-name').value || '').trim();
    if (!productName) { showToast('상품명을 입력해주세요.', 'error'); return; }
    const supplyVal = (document.getElementById('p-supply-price') || {}).value || '';
    if (supplyVal === '' || parseInt(supplyVal) < 0) { showToast('공급가격을 입력해주세요.', 'error'); return; }
    const commissionVal = (document.getElementById('p-commission') || {}).value || '';
    if (commissionVal === '') { showToast('중개수수료를 입력해주세요.', 'error'); return; }
    const salePriceEl = document.getElementById('p-price-display');
    const salePriceRaw = salePriceEl ? parseInt(salePriceEl.dataset.value || '') : NaN;
    if (isNaN(salePriceRaw) || salePriceRaw <= 0) { showToast('공급가격과 수수료를 먼저 입력해주세요.', 'error'); return; }

    const brandOpt = brandSel.options[brandSel.selectedIndex];
    const brandId = brandSel.value;
    const brandCode = brandOpt.dataset.code;
    const lastProductNum = brandOpt.dataset.last || '000';
    const nextProductNum = String(parseInt(lastProductNum, 10) + 1).padStart(3, '0');
    const supplyPrice = parseInt(supplyVal) || 0;
    const commissionRate = parseFloat(commissionVal) || 0;
    const basePrice = salePriceRaw;
    const trackingType = (document.querySelector('input[name="tracking"]:checked') || {}).value || 'quantity';
    const optionMode = (document.querySelector('input[name="opt-mode"]:checked') || {}).value || 'none';
    const memo = (document.getElementById('p-memo').value || '').trim();

    let skus = [];
    if (optionMode === 'none') {
      skus = [{ option_number: '00', label: '옵션 없음', price: basePrice, axisNames: [], values: [] }];
    } else {
      if (!window._combos || window._combos.length === 0) { showToast('옵션값을 입력하고 엔터를 눌러 조합을 만들어주세요.', 'error'); return; }
      skus = window._combos.map(c => ({
        option_number: c.optionNumber,
        label: c.axisNames.map((n, j) => n + ': ' + c.values[j]).join(' / '),
        price: parseInt(c.price) || basePrice,
        axisNames: c.axisNames || [],
        values: c.values || []
      }));
    }

    const mainImgInput = document.getElementById('input-new-product-img');
    const mainImgFile = mainImgInput && mainImgInput.files[0] ? mainImgInput.files[0] : null;
    window._pendingProduct = { brandId, brandCode, nextProductNum, productName, supplyPrice, commissionRate, basePrice, trackingType, optionMode, memo, skus, mainImgFile };
    showProductConfirm();
  };

  function showProductConfirm() {
    const d = window._pendingProduct;
    const productId = d.brandCode + '-' + d.nextProductNum;

    /* 개체 관리일 때 SKU별 개체 수 입력 */
    const unitSection = d.trackingType === 'individual'
      ? '<div style="margin-bottom:20px;padding:16px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;">' +
        '<div style="font-size:13px;font-weight:700;color:var(--gray-900);margin-bottom:4px;">개체 수 입력</div>' +
        '<div style="font-size:12px;color:var(--gray-500);margin-bottom:12px;">SKU별 생성할 개체 수를 입력하세요. (0이면 개체 미생성)</div>' +
        d.skus.map(sku =>
          '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #fde68a;">' +
          '<div style="flex:1;font-size:13px;font-weight:500;">' + esc(sku.label) + '</div>' +
          '<code style="font-size:11px;color:var(--gray-400);">' + esc(d.brandCode + '-' + d.nextProductNum + '-' + sku.option_number) + '</code>' +
          '<input type="number" id="uc-' + sku.option_number + '" min="0" max="999" value="1" ' +
          'style="width:64px;border:1px solid var(--gray-300);border-radius:6px;padding:5px 8px;font-size:13px;text-align:center;" />' +
          '<span style="font-size:12px;color:var(--gray-400);white-space:nowrap;">개</span></div>'
        ).join('') +
        '</div>'
      : '';

    /* 요약 */
    const summary =
      '<div style="background:var(--gray-50);border-radius:10px;padding:16px;margin-bottom:16px;">' +
      '<div style="display:grid;grid-template-columns:auto 1fr;gap:8px 16px;font-size:13px;">' +
      row('상품 ID', '<span style="font-family:monospace;font-weight:700;color:var(--blue);">' + esc(productId) + '</span>') +
      row('브랜드코드', esc(d.brandCode)) +
      row('상품명', esc(d.productName)) +
      row('공급가격', d.supplyPrice.toLocaleString() + '원') +
      row('중개수수료', d.commissionRate + '%') +
      row('판매가격', d.basePrice.toLocaleString() + '원') +
      row('관리방식', d.trackingType === 'quantity' ? '수량 관리' : '개체 관리') +
      row('옵션', d.optionMode === 'none' ? '없음' : d.skus.length + '가지 조합') +
      (d.memo ? row('메모', esc(d.memo)) : '') +
      '</div></div>' +
      '<div style="margin-bottom:16px;">' +
      '<div style="font-size:12px;font-weight:600;color:var(--gray-500);margin-bottom:8px;">생성될 바코드 (' + d.skus.length + '개)</div>' +
      d.skus.map(sku =>
        '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px solid var(--gray-100);">' +
        '<span style="color:var(--gray-700);">' + esc(sku.label) + '</span>' +
        '<code style="color:var(--blue);">' + esc(d.brandCode + '-' + d.nextProductNum + '-' + sku.option_number) + '</code>' +
        '</div>'
      ).join('') +
      '</div>';

    const footerHTML =
      '<button class="btn btn-secondary" onclick="openProductModal()">← 다시 작성</button>' +
      '<button class="btn btn-primary" id="btn-confirm-save" onclick="confirmSaveProduct()">✅ 저장 확정</button>';

    const tossGuide = '<div style="background:#fffbeb;border:1px solid #fbbf24;border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:12px;color:#92400e;">' +
      '⚠️ <strong>Toss POS 등록 안내</strong> — 위 바코드값을 Toss POS 상품 등록 화면의 <strong>상품 코드</strong> 또는 <strong>바코드</strong> 필드에 그대로 입력해야 판매 연동이 됩니다.' +
      '</div>';
    showModal('상품 등록 확인', tossGuide + '<p style="font-size:13px;color:var(--gray-500);margin-bottom:16px;">아래 내용을 확인하고 저장하세요.</p>' + summary + unitSection, footerHTML, 'lg');
  }

  function row(label, val) {
    return '<span style="color:var(--gray-500);white-space:nowrap;">' + label + '</span><span>' + val + '</span>';
  }

  /* ── 최종 저장 (Firestore 트랜잭션) ── */
  window.confirmSaveProduct = async function() {
    const d = window._pendingProduct;
    if (!d) return;

    /* 개체 수 수집 */
    if (d.trackingType === 'individual') {
      d.unitCounts = {};
      d.skus.forEach(sku => {
        const el = document.getElementById('uc-' + sku.option_number);
        d.unitCounts[sku.option_number] = Math.min(999, Math.max(0, parseInt((el && el.value) || '0') || 0));
      });
    }

    const btn = document.getElementById('btn-confirm-save');
    if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner spinner-sm"></div> 저장 중...'; }

    try {
      /* 대표 이미지 업로드 (트랜잭션 전에) */
      let mainImageUrl = '';
      if (d.mainImgFile) {
        try {
          const tmpId = d.brandCode + '-' + d.nextProductNum;
          const path = 'products/' + tmpId + '/main_' + Date.now();
          const snapFile = await uploadBytes(ref(storage, path), d.mainImgFile);
          mainImageUrl = await getDownloadURL(snapFile.ref);
        } catch(imgErr) { console.warn('이미지 업로드 실패:', imgErr); }
      }
      d.mainImageUrl = mainImageUrl;

      const productId = await runProductTransaction(d);
      closeModal();
      showToast('상품이 등록됐습니다: ' + productId, 'success');
      window._pendingProduct = null;
      /* 상품 목록 페이지에 있으면 새로고침 */
      const active = document.querySelector('.nav-item.active');
      if (active && active.dataset.page === 'product-list') {
        await renderProductList(document.getElementById('page-content'));
      }
    } catch(e) {
      showToast('저장 실패: ' + e.message, 'error');
      if (btn) { btn.disabled = false; btn.innerHTML = '✅ 저장 확정'; }
    }
  };

  async function runProductTransaction(d) {
    let savedId;
    await runTransaction(db, async (tx) => {
      /* ── 읽기 (트랜잭션 내 모든 read는 write 전에) ── */
      const brandRef = doc(db, 'brands', d.brandId);
      const brandSnap = await tx.get(brandRef);
      if (!brandSnap.exists()) throw new Error('브랜드를 찾을 수 없습니다.');

      const brandData = brandSnap.data();
      const lastNum = parseInt(brandData.last_product_number || '000', 10);
      const productNum = String(lastNum + 1).padStart(3, '0');
      const brandCode = brandData.brand_code;
      const productId = brandCode + '-' + productNum;
      savedId = productId;
      const now = new Date().toISOString();

      /* ── 쓰기 ── */
      tx.update(brandRef, { last_product_number: productNum, updated_at: now });

      tx.set(doc(db, 'products', productId), {
        brand_id: d.brandId,
        brand_code: brandCode,
        product_number: productNum,
        product_name: d.productName,
        supply_price: d.supplyPrice,
        commission_rate: d.commissionRate,
        base_price: d.basePrice,
        tracking_type: d.trackingType,
        status: '판매중',
        memo: d.memo || '',
        image_url: d.mainImageUrl || '',
        last_option_number: d.optionMode === 'none' ? '00' : String(d.skus.length).padStart(2, '0'),
        created_at: now,
        updated_at: now
      });

      d.skus.forEach((sku, i) => {
        const skuId = productId + '-' + sku.option_number;
        const unitCount = d.trackingType === 'individual' && d.unitCounts ? (d.unitCounts[sku.option_number] || 0) : 0;

        const skuData = {
          option_number: sku.option_number,
          option_sort_order: i,
          price: sku.price || d.basePrice,
          barcode_value: brandCode + '-' + productNum + '-' + sku.option_number,
          sku_status: '판매중',
          last_unit_number: String(unitCount).padStart(3, '0'),
          created_at: now,
          updated_at: now
        };
        if (d.optionMode === 'has') {
          sku.axisNames.forEach((name, j) => {
            skuData['option_' + (j+1) + '_name'] = name;
            skuData['option_' + (j+1) + '_value'] = sku.values[j] || '';
          });
        }
        tx.set(doc(db, 'products', productId, 'skus', skuId), skuData);

        for (let u = 1; u <= unitCount; u++) {
          const unitNum = String(u).padStart(3, '0');
          tx.set(doc(db, 'products', productId, 'skus', skuId, 'units', skuId + '-' + unitNum), {
            unit_number: unitNum,
            barcode_value: brandCode + '-' + productNum + '-' + sku.option_number + '-' + unitNum,
            unit_price: 0,
            unit_status: '판매중',
            memo: '',
            barcode_printed_at: null,
            created_at: now,
            updated_at: now
          });
        }
      });
    });
    return savedId;
  }

  /* ════════════════════════════════
     14단계 정산(Settlement) 관리
  ════════════════════════════════ */
  async function renderSettlementList(container) {
    document.getElementById('page-header-actions').innerHTML = '';

    container.innerHTML = '<div class="spinner" style="margin:60px auto;"></div>';
    try {
      const [snap, brandsSnap] = await Promise.all([
        getDocs(query(collection(db, 'settlements'), orderBy('created_at', 'desc'))),
        getDocs(collection(db, 'brands'))
      ]);
      const brandMap = {};
      brandsSnap.docs.forEach(d => { brandMap[d.id] = d.data().brand_name || d.id; });

      const settlements = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      const statusBadge = s => ({
        '검토중': '<span class="badge badge-yellow">검토중</span>',
        '확정': '<span class="badge badge-green">확정</span>'
      }[s] || '<span class="badge badge-gray">' + esc(s || '-') + '</span>');

      const receiptBadge = s => s === '완료'
        ? '<span class="badge badge-green">완료</span>'
        : '<span class="badge badge-gray">미처리</span>';

      const infoBox = '<div style="background:var(--gray-50);border:1px solid var(--gray-200);border-radius:10px;padding:16px 20px;margin-bottom:20px;font-size:13px;color:var(--gray-600);">' +
        '💡 정산 초안은 <strong>gmbs-functions</strong>가 매월 1일 자동으로 생성합니다. 생성된 초안을 검토한 후 <strong>확정</strong> 처리하면 vendor가 열람할 수 있습니다.' +
        '</div>';

      if (settlements.length === 0) {
        container.innerHTML = infoBox +
          '<div class="empty-state"><div class="empty-state-icon">💰</div>' +
          '<div class="empty-state-text">아직 생성된 정산이 없습니다.</div>' +
          '<div class="empty-state-sub" style="font-size:13px;color:var(--gray-400);margin-top:8px;">판매 데이터가 쌓이면 매월 1일 자동으로 초안이 생성됩니다.</div>' +
          '</div>';
        return;
      }

      container.innerHTML = infoBox +
        '<div class="card"><div class="table-wrap"><table>' +
        '<thead><tr><th>정산 기간</th><th>브랜드</th><th>정산 상태</th><th>지급 상태</th><th>판매액</th><th>정산 금액</th><th>증빙</th><th></th></tr></thead>' +
        '<tbody>' +
        settlements.map(s =>
          '<tr style="cursor:pointer;" onclick="openSettlementDetail(\'' + s.id + '\')">' +
          '<td style="font-weight:600;">' + esc((s.period_start || '').slice(0,7) || s.period || '-') + '</td>' +
          '<td>' + esc(brandMap[s.brand_id] || s.brand_id || '-') + '</td>' +
          '<td>' + statusBadge(s.status || s.pay_status) + '</td>' +
          '<td>' + (s.pay_status === '지급완료' ? '<span class="badge badge-green">지급완료</span>' : (s.pay_status === '확정' ? '<span class="badge badge-yellow">지급 예정</span>' : '<span class="badge badge-gray">' + esc(s.pay_status || '예정') + '</span>')) + '</td>' +
          '<td style="text-align:right;">' + (s.total_sales_amount != null ? s.total_sales_amount.toLocaleString() + '원' : (s.supply_total ? s.supply_total.toLocaleString() + '원' : '-')) + '</td>' +
          '<td style="font-weight:600;text-align:right;">' + (s.total_supply_amount != null ? s.total_supply_amount.toLocaleString() + '원' : (s.settlement_amount ? s.settlement_amount.toLocaleString() + '원' : '-')) + '</td>' +
          '<td>' + receiptBadge(s.receipt_status) + '</td>' +
          '<td onclick="event.stopPropagation();">' +
            (s.pay_status !== '지급완료' && s.status !== '확정' && s.pay_status !== '확정'
              ? '<button class="btn btn-primary" style="font-size:11px;padding:4px 10px;" onclick="confirmSettlement(\'' + s.id + '\')">확정</button>'
              : s.pay_status !== '지급완료'
                ? '<button class="btn btn-secondary" style="font-size:11px;padding:4px 10px;" onclick="markSettlementPaid(\'' + s.id + '\')">지급처리</button>'
                : '<span style="font-size:11px;color:var(--gray-400);">완료</span>') +
          '</td>' +
          '</tr>'
        ).join('') +
        '</tbody></table></div></div>';
    } catch(e) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">' + esc(e.message) + '</div></div>';
    }
  }

  window.confirmSettlement = async function(settlementId) {
    if (!confirm('이 정산을 확정하시겠습니까? 확정 후 vendor에게 공개됩니다.')) return;
    try {
      await updateDoc(doc(db, 'settlements', settlementId), { status: '확정', pay_status: '확정', updated_at: today() });
      showToast('정산이 확정되었습니다.');
      await renderSettlementList(document.getElementById('page-content'));
    } catch(e) { showToast('확정 실패: ' + e.message, 'error'); }
  };

  window.openSettlementDetail = async function(settlementId) {
    showModal('정산 상세', '<div class="spinner" style="margin:40px auto;"></div>', null, 'lg');
    try {
      const snap = await getDoc(doc(db, 'settlements', settlementId));
      if (!snap.exists()) { closeModal(); showToast('정산을 찾을 수 없습니다.', 'error'); return; }
      const s = { id: snap.id, ...snap.data() };

      function drow(label, value) {
        if (value === undefined || value === null || value === '') return '';
        return '<div style="display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--gray-100);">' +
          '<div style="min-width:130px;font-size:12px;color:var(--gray-500);padding-top:1px;">' + label + '</div>' +
          '<div style="flex:1;font-size:13px;color:var(--gray-800);">' + value + '</div></div>';
      }

      const statusBadge = st => ({ '예정':'<span class="badge badge-gray">예정</span>', '검토중':'<span class="badge badge-yellow">검토중</span>', '확정':'<span class="badge badge-green">확정</span>', '지급완료':'<span class="badge badge-green">지급완료</span>' }[st] || '<span class="badge badge-gray">' + esc(st||'-') + '</span>');
      const currentStatus = s.status || s.pay_status || '';
      const payStatus = s.pay_status || currentStatus || '예정';
      const periodLabel = s.period_start ? s.period_start.slice(0,7) + (s.period_end ? ' ~ ' + s.period_end.slice(0,7) : '') : esc(s.period || '');

      const body =
        '<div style="font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:.05em;margin-bottom:8px;">기본 정보</div>' +
        drow('정산 기간', periodLabel) +
        drow('브랜드', esc(s.brand_id || '')) +
        drow('정산 상태', statusBadge(currentStatus) +
          (currentStatus !== '확정' && currentStatus !== '지급완료' ? ' <button class="btn btn-secondary" style="font-size:11px;padding:3px 10px;margin-left:8px;" onclick="closeModal();confirmSettlement(\'' + settlementId + '\')">확정 처리</button>' : '')) +

        '<div style="font-size:11px;font-weight:700;color:var(--gray-400);letter-spacing:.05em;margin-top:16px;margin-bottom:8px;">지급 관리</div>' +

  window.saveSettlement = async function(settlementId) {
    const brand_id = document.getElementById('stl-brand').value;
    const period = (document.getElementById('stl-period').value || '').trim();
    if (!brand_id) { showToast('브랜드를 선택해주세요.', 'error'); return; }
    if (!period) { showToast('정산 기간을 입력해주세요.', 'error'); return; }

    const data = {
      brand_id,
      period,
      supply_total: parseFloat(document.getElementById('stl-supply-total').value) || 0,
      commission_total: parseFloat(document.getElementById('stl-commission-total').value) || 0,
      settlement_amount: parseFloat(document.getElementById('stl-settlement-amount').value) || 0,
      biz_type: document.getElementById('stl-biz-type').value || '',
      receipt_type: document.getElementById('stl-receipt-type').value || '',
      updated_at: today()
    };

    try {
      if (settlementId) {
        await updateDoc(doc(db, 'settlements', settlementId), data);
        showToast('정산을 수정했습니다.');
        openSettlementDetail(settlementId);
      } else {
        data.pay_status = '예정';
        data.receipt_status = '미처리';
        data.created_at = today();
        const newDoc = await addDoc(collection(db, 'settlements'), data);
        showToast('정산을 등록했습니다.');
        openSettlementDetail(newDoc.id);
      }
    } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }
  };

  let _infoTab = 'notice'; // 현재 탭 상태 유지

  async function renderInfoManagement(container) {
    document.getElementById('page-header-actions').innerHTML = '';
    const tabs = [
      { id: 'notice', label: '공지사항' },
      { id: 'onboarding', label: '안내 페이지 작성' },
      { id: 'faq', label: '자주하는 질문 정리' }
    ];
    container.innerHTML =
      '<div style="display:flex;gap:0;border-bottom:2px solid var(--gray-200);margin-bottom:20px;">' +
      tabs.map(t =>
        '<button id="info-tab-' + t.id + '" onclick="switchInfoTab(\'' + t.id + '\')" style="padding:10px 20px;border:none;background:none;cursor:pointer;font-size:14px;font-weight:600;color:var(--gray-500);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .15s;">' +
        t.label + '</button>'
      ).join('') +
      '</div>' +
      '<div id="info-tab-content"></div>';
    switchInfoTab(_infoTab);

  window.switchInfoTab = function(tabId) {
    _infoTab = tabId;
    ['notice','onboarding','faq'].forEach(id => {
      const btn = document.getElementById('info-tab-' + id);
      if (!btn) return;
      if (id === tabId) {
        btn.style.color = 'var(--blue)';
        btn.style.borderBottomColor = 'var(--blue)';
      } else {
        btn.style.color = 'var(--gray-500)';
        btn.style.borderBottomColor = 'transparent';
      }
    });
    const content = document.getElementById('info-tab-content');
    if (!content) return;
    if (tabId === 'notice') renderNoticeTab(content);
    else if (tabId === 'onboarding') renderOnboardingTab(content);
    else if (tabId === 'faq') renderFaqTab(content);
  };

  async function loadCardList() {
    const wrap = document.getElementById('ob-card-list');
    if (!wrap) return;
    wrap.innerHTML = '<div class="spinner" style="margin:40px auto;"></div>';
    try {
      // orderBy 제거 → 복합 인덱스 불필요, 클라이언트에서 정렬
      const snap = await getDocs(query(
        collection(db, 'onboarding_cards'),
        where('audience', '==', _obAudience)
      ));
      const cards = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (a.order || 0) - (b.order || 0));
      if (cards.length === 0) {
        wrap.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🃏</div><div class="empty-state-text">카드가 없습니다. 카드를 추가해보세요.</div></div>';
        return;
      }
      wrap.innerHTML = cards.map((c, i) =>
        '<div class="card" style="margin-bottom:10px;display:flex;align-items:flex-start;gap:14px;" data-card-id="' + c.id + '">' +
        '<div style="display:flex;flex-direction:column;gap:4px;padding-top:4px;">' +
        (i > 0 ? '<button onclick="moveCard(\'' + c.id + '\',-1)" style="border:none;background:none;cursor:pointer;font-size:16px;padding:0;">▲</button>' : '<span style="font-size:16px;opacity:0;">▲</span>') +
        (i < cards.length - 1 ? '<button onclick="moveCard(\'' + c.id + '\',1)" style="border:none;background:none;cursor:pointer;font-size:16px;padding:0;">▼</button>' : '<span style="font-size:16px;opacity:0;">▼</span>') +
        '</div>' +
        (c.image_url ? '<img src="' + esc(c.image_url) + '" alt="' + esc(c.image_alt || '') + '" style="width:90px;height:51px;object-fit:cover;border-radius:6px;border:1px solid var(--gray-200);">' : '<div style="width:90px;height:51px;border-radius:6px;border:1px dashed var(--gray-300);display:flex;align-items:center;justify-content:center;font-size:11px;color:var(--gray-400);">이미지 없음</div>') +
        '<div style="flex:1;">' +
        '<div style="font-weight:700;font-size:14px;margin-bottom:4px;">' + esc(c.title || '') + '</div>' +
        '<div style="font-size:12px;color:var(--gray-600);margin-bottom:6px;white-space:pre-wrap;">' + esc((c.body || '').substring(0, 80)) + (c.body && c.body.length > 80 ? '…' : '') + '</div>' +
        '<div style="display:flex;gap:8px;flex-wrap:wrap;">' +
        '<span class="badge ' + (c.active ? 'badge-green' : 'badge-gray') + '">' + (c.active ? '활성' : '비활성') + '</span>' +
        '<span class="badge badge-blue" style="background:var(--blue-bg);color:var(--blue);">' + ctaLabel(c.cta_type) + '</span>' +
        '</div></div>' +

        where('audience', '==', _obAudience)
      ));
      const cards = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a, b) => (a.order || 0) - (b.order || 0));
      const idx = cards.findIndex(c => c.id === cardId);
      if (idx < 0) return;
      const swapIdx = idx + dir;
      if (swapIdx < 0 || swapIdx >= cards.length) return;
      const batch = writeBatch(db);
      batch.update(doc(db, 'onboarding_cards', cards[idx].id), { order: swapIdx });
      batch.update(doc(db, 'onboarding_cards', cards[swapIdx].id), { order: idx });
      await batch.commit();
      await loadCardList();

  window.saveCard = async function(cardId) {
    const title = (document.getElementById('card-title').value || '').trim();
    if (!title) { showToast('제목을 입력해주세요.', 'error'); return; }
    const fileInput = document.getElementById('card-image-file');
    let imageUrl = document.getElementById('card-image-url').value || '';
    if (fileInput && fileInput.files && fileInput.files[0]) {
      try {
        imageUrl = await uploadCardImage(fileInput.files[0]);
      } catch(e) { showToast('이미지 업로드 실패: ' + e.message, 'error'); return; }
    }
    const audience = document.getElementById('card-audience').value;
    const data = {
      title,
      body: (document.getElementById('card-body').value || '').trim(),
      image_url: imageUrl,
      image_alt: (document.getElementById('card-image-alt').value || '').trim(),
      cta_type: document.getElementById('card-cta').value,
      audience,
      active: document.getElementById('card-active').checked,
      updated_at: today()
    };
    try {
      if (cardId) {
        await updateDoc(doc(db, 'onboarding_cards', cardId), data);
        showToast('카드를 수정했습니다.');
      } else {
        const countSnap = await getDocs(query(collection(db, 'onboarding_cards'), where('audience', '==', audience)));

        data.created_at = today();
        await addDoc(collection(db, 'onboarding_cards'), data);
        showToast('카드를 추가했습니다.');

      closeModal();
      await loadCardList();

  async function uploadCardImage(file) {
    const ext = file.name.split('.').pop();
    const path = 'onboarding_cards/' + Date.now() + '.' + ext;
    const storageRef = ref(storage, path);
    const snap = await uploadBytes(storageRef, file);
    return await getDownloadURL(snap.ref);
  }

    try {

  async function sendNoticeEmail(noticeTitle) {
    try {
      const brandsSnap = await getDocs(collection(db, 'brands'));
      for (const bd of brandsSnap.docs) {
        const bdata = bd.data();
        const personsSnap = await getDocs(query(collection(db, 'persons'), where('brand_id', '==', bd.id), where('active', '==', true)));
        for (const pd of personsSnap.docs) {
          const p = pd.data();
          if (p.contact_email || p.login_google_email) {
            await sendEmailByTrigger('notice_published', {
              toEmail: p.contact_email || p.login_google_email,
              toName: p.name || '',
              brandName: bdata.brand_name || '',
              reason: noticeTitle
            });
          }
        }
      }
    } catch(e) { console.warn('공지 이메일 발송 중 오류:', e); }
  }

    const wrap = document.getElementById('cs-content');
    if (!wrap) return;
    wrap.innerHTML = '<div class="spinner" style="margin:60px auto;"></div>';
    try {
      const snap = await getDocs(collection(db, 'customer_inquiries'));
      let list = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
      if (filterStatus) list = list.filter(i => i.status === filterStatus);

      // 필터 바
      const statusCounts = {};
      snap.docs.forEach(d => {
        const s = d.data().status || '답변대기';
        statusCounts[s] = (statusCounts[s] || 0) + 1;
      });
      const filterBar =
        '<div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px;">' +
        '<button class="btn ' + (!filterStatus ? 'btn-primary' : 'btn-secondary') + '" style="font-size:12px;padding:4px 10px;" onclick="loadStoreInquiries()">전체 ' + snap.size + '</button>' +
        Object.entries(CS_STATUS).map(([k, v]) =>
          '<button class="btn ' + (filterStatus === k ? 'btn-primary' : 'btn-secondary') + '" style="font-size:12px;padding:4px 10px;" onclick="loadStoreInquiries(\'' + k + '\')">' +
          v.label + ' ' + (statusCounts[k] || 0) + '</button>'
        ).join('') +
        '</div>';

      if (list.length === 0) {
        wrap.innerHTML = filterBar + '<div class="empty-state"><div class="empty-state-icon">🛎️</div><div class="empty-state-text">등록된 문의가 없습니다.</div></div>';
        return;
      }

      const rows = list.map(i => {
        const s = CS_STATUS[i.status] || CS_STATUS['답변대기'];
        return '<tr style="cursor:pointer;" onclick="openCustomerInquiryDetail(\'' + i.id + '\')">' +
          '<td><span class="badge ' + s.badge + '">' + s.label + '</span></td>' +
          '<td><span class="badge badge-gray" style="font-size:11px;">' + esc(i.type || '-') + '</span></td>' +
          '<td style="font-weight:600;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">' + esc(i.title || '') + '</td>' +
          '<td style="font-size:12px;color:var(--gray-500);">' + esc(i.brand_name || '-') + '</td>' +
          '<td style="font-size:12px;color:var(--gray-500);">' + esc(i.product_name || '-') + '</td>' +
          '<td style="font-size:12px;color:var(--gray-400);">' + esc(fmtDate(i.created_at)) + '</td>' +
          '</tr>';
      }).join('');

      wrap.innerHTML = filterBar +
        '<div style="overflow-x:auto;"><table class="table"><thead><tr>' +
        '<th>상태</th><th>종류</th><th>제목</th><th>브랜드</th><th>상품</th><th>등록일</th>' +
        '</tr></thead><tbody>' + rows + '</tbody></table></div>';
    } catch(e) {
      wrap.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">' + esc(e.message) + '</div></div>';
    }
  }

  /* 문의 등록/수정 모달 */
  window.openCustomerInquiryModal = async function(inquiryId) {
    let existing = null;
    if (inquiryId) {
      const snap = await getDoc(doc(db, 'customer_inquiries', inquiryId));
      if (snap.exists()) existing = { id: snap.id, ...snap.data() };
    }
    const ci = existing || {};
    showModal(existing ? '문의 수정' : '매장 문의 등록', '<div class="spinner" style="margin:40px auto;"></div>', '', 'lg');
    try {
      const brandsSnap = await getDocs(collection(db, 'brands'));
      const brands = brandsSnap.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(b => b.active !== false)
        .sort((a, b) => (a.brand_name || '').localeCompare(b.brand_name || ''));

      const typeOpts = CS_TYPES.map(t =>
        '<option value="' + t + '"' + (ci.type === t ? ' selected' : '') + '>' + t + '</option>'
      ).join('');
      const brandOpts = '<option value="">브랜드 선택 안 함</option>' +
        brands.map(b => '<option value="' + b.id + '"' + (ci.brand_id === b.id ? ' selected' : '') + '>' + esc(b.brand_name) + '</option>').join('');

      const formHtml =
        '<div class="form-group"><label class="form-label">종류 <span style="color:var(--red);">*</span></label>' +
        '<select class="form-input" id="ci-type">' + typeOpts + '</select></div>' +

        '<div class="form-group"><label class="form-label">제목 <span style="color:var(--red);">*</span></label>' +
        '<input class="form-input" id="ci-title" value="' + esc(ci.title || '') + '" placeholder="문의 제목" /></div>' +

        '<div class="form-group"><label class="form-label">내용</label>' +
        '<textarea class="form-input" id="ci-content" rows="4" style="resize:vertical;" placeholder="고객 문의 내용을 입력하세요">' + esc(ci.content || '') + '</textarea></div>' +

        '<div style="border-top:1px solid var(--gray-100);margin:16px 0;padding-top:16px;">' +
        '<div style="font-size:13px;font-weight:700;color:var(--gray-700);margin-bottom:12px;">관련 상품 (선택)</div>' +

        '<div class="form-group"><label class="form-label">브랜드</label>' +
        '<select class="form-input" id="ci-brand" onchange="onCSBrandChange()">' + brandOpts + '</select></div>' +

        '<div id="ci-product-area"></div>' +
        '</div>';

      const footer =
        '<button class="btn btn-secondary" onclick="closeModal()">취소</button>' +
        '<button class="btn btn-primary" onclick="saveCustomerInquiry(\'' + (existing ? existing.id : '') + '\')">저장</button>';

      updateModal(null, formHtml, footer);

      // 기존 값 있으면 상품 영역 복원
      if (ci.brand_id) {
        const brandSel = document.getElementById('ci-brand');
        if (brandSel) brandSel.value = ci.brand_id;
        await onCSBrandChange(ci.product_id, ci.sku_id, ci.unit_id);
      }
    } catch(e) {
      showToast('로드 실패: ' + e.message, 'error'); closeModal();
    }
  };

  window.onCSBrandChange = async function(preProductId, preSkuId, preUnitId) {
    const brandId = (document.getElementById('ci-brand') || {}).value;
    const area = document.getElementById('ci-product-area');
    if (!area) return;
    if (!brandId) { area.innerHTML = ''; return; }
    area.innerHTML = '<div class="spinner" style="width:20px;height:20px;margin:8px 0;"></div>';
    try {
      const snap = await getDocs(collection(db, 'products'));
      const products = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(p => p.brand_id === brandId && p.status !== '판매중지')
        .sort((a, b) => (a.product_name || '').localeCompare(b.product_name || ''));

      if (products.length === 0) {
        area.innerHTML = '<div style="font-size:12px;color:var(--gray-400);margin-bottom:12px;">이 브랜드의 등록 상품이 없습니다.</div>';
        return;
      }
      const prodOpts = '<option value="">상품 선택 안 함</option>' +
        products.map(p => '<option value="' + p.id + '"' + (preProductId === p.id ? ' selected' : '') + '>' +
          esc(p.product_name || p.id) + ' (' + esc(p.product_number || '') + ')' + '</option>').join('');

      area.innerHTML =
        '<div class="form-group"><label class="form-label">상품</label>' +
        '<select class="form-input" id="ci-product" onchange="onCSProductChange()">' + prodOpts + '</select></div>' +
        '<div id="ci-sku-area"></div>';

      if (preProductId) {
        const prodSel = document.getElementById('ci-product');
        if (prodSel) prodSel.value = preProductId;
        await onCSProductChange(preSkuId, preUnitId);
      }
    } catch(e) { area.innerHTML = '<div style="font-size:12px;color:var(--red);">로드 실패</div>'; }
  };

  window.onCSProductChange = async function(preSkuId, preUnitId) {
    const productId = (document.getElementById('ci-product') || {}).value;
    const area = document.getElementById('ci-sku-area');
    if (!area) return;
    if (!productId) { area.innerHTML = ''; return; }
    area.innerHTML = '<div class="spinner" style="width:20px;height:20px;margin:8px 0;"></div>';
    try {
      const [productSnap, skusSnap] = await Promise.all([
        getDoc(doc(db, 'products', productId)),
        getDocs(collection(db, 'products', productId, 'skus')),
      ]);
      const product = productSnap.exists() ? productSnap.data() : {};
      const skus = skusSnap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (a.option_sort_order || 0) - (b.option_sort_order || 0));

      // 상품 썸네일
      const prodThumb = product.photo_url
        ? '<img src="' + esc(product.photo_url) + '" style="width:60px;height:60px;object-fit:cover;border-radius:8px;border:1px solid var(--gray-200);margin-bottom:10px;" />'
        : '';

      // SKU 선택 — 썸네일 그리드
      const skuGrid = skus.map(s => {
        const optLabel = [s.option_1_value, s.option_2_value, s.option_3_value].filter(Boolean).join(' / ') || '기본';
        const thumb = s.photo_url || product.photo_url || '';
        return '<div id="sku-card-' + s.id + '" onclick="selectCSsku(\'' + s.id + '\')" ' +
          'style="cursor:pointer;border:2px solid ' + (preSkuId === s.id ? 'var(--blue)' : 'var(--gray-200)') + ';border-radius:10px;padding:8px;text-align:center;min-width:80px;">' +
          (thumb ? '<img src="' + esc(thumb) + '" style="width:56px;height:56px;object-fit:cover;border-radius:6px;margin-bottom:4px;" />' :
            '<div style="width:56px;height:56px;background:var(--gray-100);border-radius:6px;margin:0 auto 4px;display:flex;align-items:center;justify-content:center;font-size:20px;">📦</div>') +
          '<div style="font-size:11px;color:var(--gray-700);font-weight:600;">' + esc(optLabel) + '</div>' +
          '<div style="font-size:10px;color:var(--gray-400);">' + esc(s.barcode_value || '') + '</div>' +
          '</div>';
      }).join('');

      area.innerHTML =
        prodThumb +
        (skus.length > 0
          ? '<div class="form-group"><label class="form-label">옵션(SKU)</label>' +
            '<div style="display:flex;flex-wrap:wrap;gap:8px;">' + skuGrid + '</div></div>'
          : '') +
        '<input type="hidden" id="ci-sku" value="' + esc(preSkuId || '') + '" />' +
        '<input type="hidden" id="ci-sku-tracking" value="' + esc(product.tracking_type || '') + '" />' +
        '<div id="ci-unit-area"></div>';

      if (preSkuId) {
        const skuEl = document.getElementById('ci-sku');
        if (skuEl) skuEl.value = preSkuId;
        const sku = skus.find(s => s.id === preSkuId);
        if (sku && product.tracking_type === 'individual') {
          await loadCSUnits(productId, preSkuId, preUnitId);
        }
      }
    } catch(e) { area.innerHTML = ''; }
  };

  window.selectCSsku = async function(skuId) {
    // 이전 선택 해제
    document.querySelectorAll('[id^="sku-card-"]').forEach(el => {
      el.style.borderColor = 'var(--gray-200)';
    });
    const card = document.getElementById('sku-card-' + skuId);
    if (card) card.style.borderColor = 'var(--blue)';
    const skuEl = document.getElementById('ci-sku');
    if (skuEl) skuEl.value = skuId;
    document.getElementById('ci-unit-area').innerHTML = '';

    const tracking = (document.getElementById('ci-sku-tracking') || {}).value;
    if (tracking === 'individual') {
      const productId = (document.getElementById('ci-product') || {}).value;
      if (productId) await loadCSUnits(productId, skuId, null);
    }
  };

  async function loadCSUnits(productId, skuId, preUnitId) {
    const area = document.getElementById('ci-unit-area');
    if (!area) return;
    area.innerHTML = '<div class="spinner" style="width:18px;height:18px;margin:6px 0;"></div>';
    try {
      const snap = await getDocs(collection(db, 'products', productId, 'skus', skuId, 'units'));
      const units = snap.docs.map(d => ({ id: d.id, ...d.data() }))
        .filter(u => u.unit_status === '판매중')
        .sort((a, b) => (a.unit_number || '').localeCompare(b.unit_number || ''));
      if (units.length === 0) { area.innerHTML = ''; return; }
      const opts = '<option value="">개체 선택 안 함</option>' +
        units.map(u => '<option value="' + u.id + '"' + (preUnitId === u.id ? ' selected' : '') + '>' +
          esc(u.barcode_value || u.unit_number || u.id) + (u.memo ? ' (' + esc(u.memo) + ')' : '') + '</option>').join('');
      area.innerHTML =
        '<div class="form-group"><label class="form-label">개체 번호</label>' +
        '<select class="form-input" id="ci-unit">' + opts + '</select></div>';
    } catch(e) { area.innerHTML = ''; }
  }

  window.saveCustomerInquiry = async function(inquiryId) {
    const type = (document.getElementById('ci-type') || {}).value;
    const title = ((document.getElementById('ci-title') || {}).value || '').trim();
    const content = ((document.getElementById('ci-content') || {}).value || '').trim();
    if (!title) { showToast('제목을 입력해주세요.', 'error'); return; }

    const brandSel = document.getElementById('ci-brand');
    const brandId = brandSel ? brandSel.value : '';
    const brandName = brandSel && brandId ? (brandSel.options[brandSel.selectedIndex] || {}).text : '';
    const productSel = document.getElementById('ci-product');
    const productId = productSel ? productSel.value : '';
    const productName = productSel && productId ? (productSel.options[productSel.selectedIndex] || {}).text : '';
    const skuEl = document.getElementById('ci-sku');
    const skuId = skuEl ? skuEl.value : '';
    const unitSel = document.getElementById('ci-unit');
    const unitId = unitSel ? unitSel.value : '';

    const data = {
      type, title, content,
      brand_id: brandId || '',
      brand_name: brandId ? brandName : '',
      product_id: productId || '',
      product_name: productId ? productName : '',
      sku_id: skuId || '',
      unit_id: unitId || '',
      updated_at: today(),
    };

    try {
      if (inquiryId) {
        await updateDoc(doc(db, 'customer_inquiries', inquiryId), data);
        showToast('수정되었습니다.');
      } else {
        data.status = '답변대기';
        data.created_at = today();
        data.created_by = auth.currentUser ? auth.currentUser.email : '';
        await addDoc(collection(db, 'customer_inquiries'), data);
        showToast('문의가 등록되었습니다.');
      }
      closeModal();
      await loadStoreInquiries();
    } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }
  };

  /* 문의 상세 */
  window.openCustomerInquiryDetail = async function(inquiryId) {
    showModal('문의 상세', '<div class="spinner" style="margin:40px auto;"></div>', '', 'lg');
    try {
      const [inqSnap, responsesSnap] = await Promise.all([
        getDoc(doc(db, 'customer_inquiries', inquiryId)),
        getDocs(collection(db, 'customer_inquiries', inquiryId, 'responses')),
      ]);
      if (!inqSnap.exists()) { showToast('문의를 찾을 수 없습니다.', 'error'); closeModal(); return; }
      const inq = { id: inqSnap.id, ...inqSnap.data() };
      const responses = responsesSnap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (a.created_at || '').localeCompare(b.created_at || ''));

      const st = CS_STATUS[inq.status] || CS_STATUS['답변대기'];
      const statusBadge = '<span class="badge ' + st.badge + '">' + st.label + '</span>';

      // 기본 정보 섹션
      let body =
        '<div style="display:grid;grid-template-columns:70px 1fr;gap:6px 12px;font-size:13px;margin-bottom:16px;">' +
        '<span style="color:var(--gray-500);">상태</span><span>' + statusBadge + '</span>' +
        '<span style="color:var(--gray-500);">종류</span><span><span class="badge badge-gray">' + esc(inq.type || '-') + '</span></span>' +
        '<span style="color:var(--gray-500);">등록일</span><span style="color:var(--gray-400);">' + esc(fmtDate(inq.created_at)) + '</span>' +
        (inq.brand_name ? '<span style="color:var(--gray-500);">브랜드</span><span>' + esc(inq.brand_name) + '</span>' : '') +
        (inq.product_name ? '<span style="color:var(--gray-500);">상품</span><span>' + esc(inq.product_name) + '</span>' : '') +
        '</div>' +
        '<div style="font-size:15px;font-weight:700;margin-bottom:8px;">' + esc(inq.title) + '</div>' +
        '<div style="font-size:13px;color:var(--gray-700);white-space:pre-wrap;background:var(--gray-50);border-radius:8px;padding:12px;margin-bottom:16px;">' + esc(inq.content || '') + '</div>';

      // 재응답 필요 사유
      if (inq.status === '재응답 필요' && inq.re_response_note) {
        body +=
          '<div style="background:#fff3cd;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px;">' +
          '<div style="font-weight:700;margin-bottom:4px;color:#856404;">⚠️ 재응답 요청 사유</div>' +
          '<div style="color:#664d03;white-space:pre-wrap;">' + esc(inq.re_response_note) + '</div>' +
          '</div>';
      }

      // 응답 이력
      body += '<div style="font-size:13px;font-weight:700;color:var(--gray-700);margin-bottom:10px;border-top:1px solid var(--gray-100);padding-top:14px;">응답 이력</div>';
      if (responses.length === 0) {
        body += '<div style="font-size:13px;color:var(--gray-400);margin-bottom:16px;">아직 응답이 없습니다.</div>';
      } else {
        body += responses.map(r => {
          const isVendor = r.author_type === 'vendor';
          return '<div style="margin-bottom:12px;' + (isVendor ? 'padding-left:0;' : 'padding-left:0;') + '">' +
            '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;">' +
            '<span style="font-size:12px;font-weight:700;color:' + (isVendor ? 'var(--blue)' : 'var(--gray-700)') + ';">' +
            (isVendor ? '🏬 ' : '👤 ') + esc(r.author_name || r.author_email || '') + '</span>' +
            '<span style="font-size:11px;color:var(--gray-400);">' + esc(fmtTs(r.created_at)) + '</span>' +
            '</div>' +
            '<div style="font-size:13px;color:var(--gray-700);white-space:pre-wrap;background:' + (isVendor ? 'var(--blue-light)' : 'var(--gray-50)') + ';border-radius:8px;padding:10px;">' +
            esc(r.content || '') + '</div>' +
            '</div>';
        }).join('');
      }

      // 관리자 응답 작성
      body +=
        '<div style="border-top:1px solid var(--gray-100);padding-top:14px;margin-top:4px;">' +
        '<div style="font-size:13px;font-weight:700;color:var(--gray-700);margin-bottom:8px;">관리자 응답 작성</div>' +
        '<textarea class="form-input" id="ci-admin-response" rows="3" style="resize:vertical;" placeholder="응답 내용을 입력하세요..."></textarea>' +
        '</div>';

      // 하단 버튼
      const canClose = inq.status === '답변완료';
      const canReRequest = inq.status === '답변완료' && inq.brand_id;
      const footer =
        '<button class="btn btn-secondary" onclick="openCustomerInquiryModal(\'' + inquiryId + '\')">수정</button>' +
        '<div style="flex:1;"></div>' +
        (canReRequest
          ? '<button class="btn btn-secondary" style="color:var(--red);" onclick="openCSReResponseModal(\'' + inquiryId + '\')">재응답 요청</button>'
          : '') +
        (canClose
          ? '<button class="btn btn-secondary" style="color:var(--green);" onclick="updateCSStatus(\'' + inquiryId + '\',\'처리완료\')">처리완료</button>'
          : '') +
        '<button class="btn btn-primary" onclick="submitCSAdminResponse(\'' + inquiryId + '\')">응답 저장</button>';

      updateModal('문의 상세 — ' + esc(inq.title), body,
        '<div style="display:flex;gap:8px;align-items:center;width:100%;">' + footer + '</div>');
    } catch(e) {
      showToast('로드 실패: ' + e.message, 'error'); closeModal();
    }
  };

  window.submitCSAdminResponse = async function(inquiryId) {
    const content = ((document.getElementById('ci-admin-response') || {}).value || '').trim();
    if (!content) { showToast('응답 내용을 입력해주세요.', 'error'); return; }
    try {
      const user = auth.currentUser;
      await addDoc(collection(db, 'customer_inquiries', inquiryId, 'responses'), {
        content,
        author_type: 'admin',
        author_email: user ? user.email : '',
        author_name: user ? (user.displayName || user.email) : '관리자',
        created_at: today(),
      });
      await updateDoc(doc(db, 'customer_inquiries', inquiryId), { status: '답변완료', updated_at: today() });
      showToast('응답이 저장되었습니다.');
      await openCustomerInquiryDetail(inquiryId);
      await loadStoreInquiries();
    } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }

  window.openCSReResponseModal = function(inquiryId) {
    const formHtml =

  async function renderInquiryList(container) {
    document.getElementById('page-header-actions').innerHTML = '';
    container.innerHTML = '<div class="spinner" style="margin:60px auto;"></div>';
    try {
      const snap = await getDocs(query(collection(db, 'inquiries'), orderBy('created_at', 'desc')));
      const inquiries = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      // 브랜드명 + 담당자명 조회용 캐시
      const brandCache = {};
      const personCache = {};
      const brandIds = [...new Set(inquiries.map(i => i.brand_id).filter(Boolean))];
      await Promise.all(brandIds.map(async bid => {
        try {
          const bs = await getDoc(doc(db, 'brands', bid));
          if (bs.exists()) brandCache[bid] = bs.data().brand_name || bid;
        } catch(e) {}
      }));
      await Promise.all(inquiries.filter(i => i.brand_id && i.person_id).map(async i => {
        const key = i.brand_id + '/' + i.person_id;
        if (personCache[key] !== undefined) return;
        try {
          const ps = i.person_id ? await getDoc(doc(db, 'persons', i.person_id)) : null;
          personCache[key] = ps.exists() ? (ps.data().name || '') : '';
        } catch(e) { personCache[key] = ''; }
      }));

      if (inquiries.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><div class="empty-state-text">등록된 문의가 없습니다.</div></div>';
        return;
      }
      container.innerHTML =
        '<div style="display:flex;gap:10px;margin-bottom:16px;">' +
        '<select id="inq-status-filter" onchange="filterInquiryList()" style="border:1px solid var(--gray-200);border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;">' +
        '<option value="">전체</option><option value="답변대기">답변대기</option><option value="답변완료">답변완료</option>' +
        '</select></div>' +
        '<div class="card"><div class="table-wrap"><table id="inq-table">' +
        '<thead><tr><th>브랜드</th><th>담당자</th><th>제목</th><th>상태</th><th>등록일</th></tr></thead>' +
        '<tbody id="inq-tbody"></tbody></table></div></div>';

      window._allInquiries = inquiries.map(i => ({
        ...i,
        brand_name: brandCache[i.brand_id] || i.brand_id || '',
        person_name: personCache[i.brand_id + '/' + i.person_id] || '',
      }));
      filterInquiryList();
    } catch(e) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">' + esc(e.message) + '</div></div>';
    }
  }

  window.filterInquiryList = function() {
    const statusFilter = ((document.getElementById('inq-status-filter') || {}).value || '');
    const filtered = (window._allInquiries || []).filter(i => !statusFilter || i.status === statusFilter);
    const tbody = document.getElementById('inq-tbody');
    if (!tbody) return;
    tbody.innerHTML = filtered.map(i =>
      '<tr style="cursor:pointer;" onclick="openInquiryDetail(\'' + i.id + '\')">' +
      '<td>' + esc(i.brand_name || '-') + '</td>' +
      '<td style="font-size:12px;color:var(--gray-600);">' + esc(i.person_name || '-') + '</td>' +
      '<td style="font-weight:600;">' + esc(i.title || '') + '</td>' +
      '<td>' + (i.status === '답변완료'
        ? '<span class="badge badge-green">답변완료</span>'
        : '<span class="badge badge-yellow">답변대기</span>') + '</td>' +
      '<td style="font-size:12px;color:var(--gray-500);">' + esc(fmtTs(i.created_at)) + '</td>' +

  window.openInquiryDetail = async function(inquiryId) {
    const snap = await getDoc(doc(db, 'inquiries', inquiryId));
    if (!snap.exists()) return;
    const i = { id: snap.id, ...snap.data() };
    // 담당자명 조회
    let personName = '';
    if (i.brand_id && i.person_id) {
      try {
        const ps = await getDoc(doc(db, 'persons', i.person_id));
        if (ps.exists()) personName = ps.data().name || '';
      } catch(e) {}
    }
    // 브랜드명 조회
    let brandName = i.brand_id || '';
    try {
      const bs = await getDoc(doc(db, 'brands', i.brand_id));
      if (bs.exists()) brandName = bs.data().brand_name || brandName;
    } catch(e) {}
    const body =
      '<div style="font-size:13px;color:var(--gray-500);margin-bottom:12px;">' +
      esc(fmtTs(i.created_at)) + ' · ' + esc(brandName) + (personName ? ' · ' + esc(personName) : '') +
      '</div>' +
      '<div style="font-size:14px;line-height:1.7;white-space:pre-wrap;color:var(--gray-800);background:var(--gray-50);border-radius:8px;padding:14px;margin-bottom:20px;">' + esc(i.content || '') + '</div>' +
      '<div style="font-size:12px;font-weight:700;color:var(--gray-400);margin-bottom:8px;">답변</div>' +
      (i.answer
        ? '<div style="font-size:13px;line-height:1.7;white-space:pre-wrap;color:var(--gray-800);background:var(--blue-light);border-radius:8px;padding:14px;">' + esc(i.answer) + '</div>' +
          '<div style="font-size:11px;color:var(--gray-400);margin-top:6px;">' + esc(i.answered_by || '') + ' · ' + esc(fmtTs(i.answered_at)) + '</div>'
        : '<textarea class="form-input" id="inquiry-answer" rows="5" placeholder="답변을 입력하세요" style="resize:vertical;"></textarea>');
    const inquiryIdBar = '<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--gray-100);display:flex;align-items:center;gap:16px;">' +
      renderDocId(inquiryId, '문의') + '</div>';
    const footerHTML =
      '<button class="btn btn-secondary" onclick="closeModal()">닫기</button>' +
      (!i.answer ? '<button class="btn btn-primary" onclick="saveInquiryAnswer(\'' + inquiryId + '\')">답변 저장</button>' : '');
    showModal(esc(i.title || '문의'), body + inquiryIdBar, footerHTML, 'lg');
  };

  window.saveInquiryAnswer = async function(inquiryId) {
    const answer = (document.getElementById('inquiry-answer').value || '').trim();
    if (!answer) { showToast('답변 내용을 입력해주세요.', 'error'); return; }
    try {
      const inqSnap = await getDoc(doc(db, 'inquiries', inquiryId));
      if (!inqSnap.exists()) return;
      const inqData = inqSnap.data();
      await updateDoc(doc(db, 'inquiries', inquiryId), {
        answer,
        answered_by: (auth.currentUser || {}).email || '',
        answered_at: today(),
        status: '답변완료',
        updated_at: today()
      });
      showToast('답변을 저장했습니다.');
      refreshSidebarBadges();
      // 이메일 알림: 문의 답변 완료
      if (inqData.brand_id) {
        try {
          let toEmail = '', toName = '', brandName = '';
          const bs = await getDoc(doc(db, 'brands', inqData.brand_id));
          if (bs.exists()) brandName = bs.data().brand_name || '';
          if (inqData.person_id) {
            const ps = inqData.person_id ? await getDoc(doc(db, 'persons', inqData.person_id)) : null;
            if (ps.exists()) { toEmail = ps.data().email || ''; toName = ps.data().name || ''; }
          }
          if (toEmail) {
            await sendEmailByTrigger('inquiry_answered', {
              toEmail, toName, brandName,
              inquiryTitle: inqData.title || '',
              answer,
            });
          }
        } catch(e) {}
      }
      openInquiryDetail(inquiryId);
    } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }
  };

  /* ── 암호화 키 로드·생성 ── */
  async function loadEncKeyStatus() {
    const el = document.getElementById('enc-key-status');
    if (!el) return;
    try {
      const snap = await getDoc(doc(db, 'app_configs', 'encryption'));
      if (snap.exists() && snap.data().aes_key_b64) {
        el.innerHTML = '<span style="color:var(--green);">✅ 암호화 키가 설정되어 있습니다.</span> Admin·Vendor 양쪽에서 동일 키로 암호화/복호화됩니다.';
      } else {
        el.innerHTML = '<span style="color:var(--red);">⚠ 암호화 키가 없습니다.</span> 아래 버튼으로 키를 생성하세요. 키가 없으면 주민등록번호·계좌번호 저장이 불가합니다.';
      }
    } catch(e) {
      el.textContent = '확인 오류: ' + e.message;
    }
  }

  window.generateEncryptionKey = async function() {
    const el = document.getElementById('enc-key-status');
    const confirmed = confirm('새 암호화 키를 생성합니다.\n\n⚠️ 기존에 암호화된 데이터(주민등록번호·계좌번호)가 있다면 읽을 수 없게 됩니다.\n\n계속하시겠습니까?');
    if (!confirmed) return;
    try {
      const key = await crypto.subtle.generateKey({ name: 'AES-GCM', length: 256 }, true, ['encrypt', 'decrypt']);
      const rawKey = await crypto.subtle.exportKey('raw', key);
      const keyB64 = btoa(String.fromCharCode(...new Uint8Array(rawKey)));
      await setDoc(doc(db, 'app_configs', 'encryption'), { aes_key_b64: keyB64, created_at: today() });
      // 캐시 초기화
      _sharedCryptoKey = null;
      _sharedKeyB64Cached = null;
      if (el) el.innerHTML = '<span style="color:var(--green);">✅ 새 암호화 키가 생성·저장되었습니다.</span> Vendor 앱에서 자동으로 동일 키를 사용합니다.';
      showToast('암호화 키가 생성되었습니다.', 'success');
    } catch(e) {
      showToast('키 생성 오류: ' + e.message, 'error');
    }
  };

      }
    } catch(e) {

  window.saveNtsApiKey = async function() {
    const inputEl = document.getElementById('nts-api-key-input');
    const statusEl = document.getElementById('nts-key-status');
    const key = (inputEl?.value || '').trim();
    if (!key) { showToast('API 키를 입력해주세요.', 'error'); return; }

      await setDoc(doc(db, 'settings', 'config'), { nts_api_key: key }, { merge: true });
      if (inputEl) { inputEl.value = ''; inputEl.placeholder = '••••••••••••••••••••••• (저장됨)'; }
      if (statusEl) statusEl.innerHTML = '<span style="color:var(--green);">✅ API 키가 저장되어 있습니다.</span> 변경하려면 새 값을 입력 후 저장하세요.';
      showToast('국세청 API 키가 저장되었습니다.', 'success');

      showToast('저장 오류: ' + e.message, 'error');

    // 유캔사인 템플릿 필드 자동 가져오기
    window._fetchUcansignFields = async function() {
      const templateId = (document.getElementById('ct-ucansign-id') || {}).value?.trim();
      if (!templateId) { showToast('템플릿 ID를 먼저 입력해주세요.', 'error'); return; }
      const btn = document.getElementById('btn-fetch-fields');
      if (btn) { btn.disabled = true; btn.textContent = '가져오는 중...'; }
      try {
        const cfgSnap = await getDoc(doc(db, 'settings', 'config'));
        const storedApiKey = cfgSnap.data()?.ucansign_api_key;
        if (!storedApiKey) {
          showToast('설정 페이지에서 유캔사인 API 키를 먼저 저장해주세요.', 'error');
          if (btn) { btn.disabled = false; btn.textContent = '🔍 필드 가져오기'; }
          return;
        }

        // 1단계: API KEY로 accessToken 발급 (유효기간 30분)
        if (btn) btn.textContent = '토큰 발급 중...';
        const tokenRes = await fetch('https://app.ucansign.com/openapi/user/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ apiKey: storedApiKey })
        });
        const tokenJson = await tokenRes.json();
        // 토큰 발급 결과는 콘솔에 출력하지 않음 (보안)
        if (tokenJson.code !== 0 || !tokenJson.result?.accessToken) {
          throw new Error('토큰 발급 실패: ' + (tokenJson.msg || '알 수 없는 오류') + ' — 설정 페이지에서 API 키를 다시 확인해주세요.');
        }
        const accessToken = tokenJson.result.accessToken;

        // 2단계: accessToken으로 템플릿 상세 조회
        if (btn) btn.textContent = '필드 조회 중...';
        const res = await fetch('https://app.ucansign.com/openapi/templates/' + templateId, {
          method: 'GET',
          headers: { 'Authorization': 'Bearer ' + accessToken, 'Content-Type': 'application/json' }
        });
        const json = await res.json();
        // 템플릿 상세 응답 전체 로그 제거 (보안)
        if (json.code !== undefined && json.code !== 0) {
          throw new Error((json.msg || '알 수 없는 오류') + ' (code: ' + json.code + ')');
        }

        // 응답 전체에서 fieldName 속성이 있는 객체를 재귀적으로 수집
        function collectFields(obj, collected) {
          if (!obj || typeof obj !== 'object') return;
          if (Array.isArray(obj)) {
            obj.forEach(function(item) { collectFields(item, collected); });
            return;
          }
          const fieldKey = obj.fieldName || obj.field_name || obj.name;
          const type = (obj.fieldType || obj.field_type || obj.type || obj.componentType || '').toUpperCase();
          if (fieldKey && typeof fieldKey === 'string' && fieldKey.trim()) {
            const key = fieldKey.trim();
            if (!collected.some(function(c) { return c.name === key; })) {
              const descCandidates = [obj.label, obj.description, obj.placeholder, obj.componentLabel, obj.title];
              const desc = descCandidates.find(function(d) { return d && typeof d === 'string' && d.trim() && d.trim() !== key; }) || '';
              const typeLabel = type ? ' [' + type + ']' : '';
              collected.push({ name: key, desc: (typeof desc === 'string' ? desc.trim() : '') + typeLabel });
            }
          }
          Object.keys(obj).forEach(function(k) { collectFields(obj[k], collected); });
        }

        const collected = [];
        collectFields(json, collected);


        if (collected.length === 0) {
          showToast('입력 필드를 찾지 못했습니다. 브라우저 개발자 도구(F12) → Console에서 응답 구조를 확인해주세요.', 'info');
        } else {
          document.getElementById('ct-fields-rows').innerHTML = '';
          collected.forEach(function(f) { window._addCtFieldRow(f.name, '', f.desc); });
          showToast(collected.length + '개 필드를 불러왔습니다. 기본값을 입력하세요.', 'success');
        }
      } catch(e) {
        if (e instanceof TypeError || e.message.includes('Failed to fetch') || e.message.includes('NetworkError')) {
          showToast('유캔사인 API가 브라우저 직접 호출을 허용하지 않습니다. 필드를 직접 추가해주세요.', 'error');
        } else {
          showToast('필드 조회 실패: ' + e.message, 'error');
        }
      } finally {
        if (btn) { btn.disabled = false; btn.textContent = '🔍 필드 가져오기'; }
      }
    };

    // 클립보드 복사 헬퍼 (변수 칩 클릭용)
    window._cpVar = function(val) {
      navigator.clipboard.writeText(val).then(function() {
        showToast(val + ' 복사됨', 'success');
      }).catch(function() {});
    };

    // 변수 행 추가 헬퍼
    window._addCtFieldRow = function(k, v, desc) {
      var row = document.createElement('div');
      row.className = 'ct-field-row';
      row.style.cssText = 'display:flex;flex-direction:column;gap:2px;padding:8px;background:var(--gray-50);border-radius:8px;border:1px solid var(--gray-200);';
      var labelHtml = desc
        ? '<div style="font-size:11px;color:var(--gray-500);margin-bottom:2px;font-weight:500;">' + esc(desc) + '</div>'
        : '';
      row.innerHTML =
        labelHtml +
        '<div style="display:flex;gap:6px;align-items:center;">' +
        '<input class="form-input ct-field-key" placeholder="유캔사인 필드명" value="' + esc(k || '') + '" style="flex:1;font-size:13px;font-family:monospace;" />' +
        '<span style="color:var(--gray-400);flex-shrink:0;font-size:12px;">→</span>' +
        '<input class="form-input ct-field-val" placeholder="기본값 또는 {{변수}}" value="' + esc(v || '') + '" style="flex:1.5;font-size:13px;" title="비워두면 발송 시 직접 입력합니다." />' +
        '<button type="button" onclick="this.closest(\'.ct-field-row\').remove()" style="flex-shrink:0;border:none;background:none;cursor:pointer;color:var(--gray-400);font-size:16px;padding:0 4px;">✕</button>' +
        '</div>';
      document.getElementById('ct-fields-rows').appendChild(row);
    };

    // 기존 데이터 복원
    if (t.default_fields && typeof t.default_fields === 'object') {
      Object.entries(t.default_fields).forEach(([k, v]) => window._addCtFieldRow(k, String(v), (t.field_descs || {})[k] || ''));
    }
  };

  window.saveContractTemplate = async function(templateId) {
    const name = (document.getElementById('ct-name') || {}).value?.trim();
    const ucansignId = (document.getElementById('ct-ucansign-id') || {}).value?.trim();
    const type = (document.getElementById('ct-type') || {}).value?.trim();
    const isActive = (document.getElementById('ct-active') || {}).checked;

    if (!name) { showToast('계약서 이름을 입력해주세요.', 'error'); return; }
    if (!ucansignId) { showToast('유캔사인 템플릿 ID를 입력해주세요.', 'error'); return; }

    // 키-값 행에서 defaultFields 수집
    const defaultFields = {};

  /* ── 날짜 포맷 헬퍼 (ISO 문자열 → 한국 날짜) ── */
  function fmtDate(v) {
    if (!v) return '';
    if (typeof v === 'string') return v.slice(0,10);
    if (v && typeof v.toDate === 'function') return v.toDate().toLocaleDateString('ko-KR');
    return String(v);
  }

  function fmtTs(v) {
    if (!v) return '';
    let d;
    if (v && typeof v.toDate === 'function') d = v.toDate();
    else if (v && v.seconds) d = new Date(v.seconds * 1000);
    else if (typeof v === 'string') {
      // "2025-01-01" 또는 "2025-01-01T..." 형태
      d = new Date(v);
    } else d = new Date(v);
    if (isNaN(d)) return String(v);
    return d.toLocaleString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
  }

      const allProducts = (window._allProducts || []).filter(p => selected.has(p.id));

      /* 토스포스 양식 헤더 (2행: 헤더 + 필수여부) */

      const header2 = ['','*필수','선택','*필수','선택','*필수','선택','선택','선택','선택'];

      for (const p of allProducts) {

      showToast(allProducts.length + '개 상품을 토스포스 양식으로 내보냈습니다.', 'success');

  /* ════════════════════════════════
     EmailJS 공통 발송 헬퍼
  ════════════════════════════════ */
  async function sendEmailByTrigger(triggerEvent, params) {
    // params: { toEmail, toName, brandName, reason, ... }
    try {
      const [settingsSnap, triggerSnap] = await Promise.all([
        getDoc(doc(db, 'email_configs', '_settings')),
        getDoc(doc(db, 'email_configs', triggerEvent))
      ]);
      if (!settingsSnap.exists()) return;
      const { public_key, service_id, globally_enabled } = settingsSnap.data();
      if (!globally_enabled) return;
      if (!public_key || !service_id) return;
      if (!triggerSnap.exists()) return;
      const { template_id, enabled } = triggerSnap.data();
      if (!enabled || !template_id) return;
      if (typeof emailjs !== 'undefined') {
        emailjs.init({ publicKey: public_key });
        await emailjs.send(service_id, template_id, {
          to_email: params.toEmail || '',
          to_name: params.toName || '',
          brand_name: params.brandName || '',
          reason: params.reason || '',
          rejection_reason: params.reason || params.rejectionReason || '',
          reply_to: 'noreply@gmbs.kr'
        });
        // 발송 카운터 증가
        const counterRef = doc(db, 'email_configs', '_settings');
        const curSnap = await getDoc(counterRef);
        const cur = curSnap.exists() ? (curSnap.data().sent_count || 0) : 0;
        await updateDoc(counterRef, { sent_count: cur + 1, last_sent_at: new Date().toISOString() });
      }
    } catch(e) {
      console.warn('EmailJS 발송 실패:', e);
    }
  }

  /* ════════════════════════════════
     입점 심사 (brand_applications / brand_join_requests)
  ════════════════════════════════ */
  async function renderApplicationReview(container) {
    container.innerHTML = '<div class="spinner" style="margin:60px auto;"></div>';
    try {
      const [appsSnap, joinsSnap, productsSnap] = await Promise.all([
        getDocs(query(collection(db, 'brand_applications'), orderBy('submitted_at', 'desc'))),
        getDocs(query(collection(db, 'brand_join_requests'), orderBy('submitted_at', 'desc'))),
        getDocs(query(collection(db, 'products'), orderBy('created_at', 'desc')))
      ]);
      let apps = appsSnap.docs.map(d => ({ id: d.id, _type: 'application', ...d.data() })).filter(d => !d.brand_deleted);
      let joins = joinsSnap.docs.map(d => ({ id: d.id, _type: 'join', ...d.data() })).filter(d => !d.brand_deleted);
      // 브랜드가 삭제됐지만 brand_deleted 플래그가 없는 구형 신청서/합류신청 자동 정리
      {
        // apps: brand_id → brand_code → brand_name 순으로 존재 여부 확인
        const appsWithBrandId   = apps.filter(a => a.status === '승인' && a.brand_id);
        const appsWithCodeOnly  = apps.filter(a => a.status === '승인' && !a.brand_id && a.brand_code);
        const appsWithNameOnly  = apps.filter(a => a.status === '승인' && !a.brand_id && !a.brand_code && a.brand_name);
        // joins: target_brand_id로 브랜드 존재 여부 확인
        const joinsWithTargetId = joins.filter(j => j.target_brand_id);
        const brandIdSet  = new Set([...appsWithBrandId.map(a => a.brand_id), ...joinsWithTargetId.map(j => j.target_brand_id)]);
        const codeSet     = new Set(appsWithCodeOnly.map(a => a.brand_code));
        const nameSet     = new Set(appsWithNameOnly.map(a => a.brand_name));
        const existingIds  = new Set();
        const existingCodes = new Set();
        const existingNames = new Set();
        await Promise.all([
          ...[...brandIdSet].map(async id => { const s = await getDoc(doc(db, 'brands', id)); if (s.exists()) existingIds.add(id); }),
          ...[...codeSet].map(async code => { const s = await getDocs(query(collection(db, 'brands'), where('brand_code', '==', code), limit(1))); if (!s.empty) existingCodes.add(code); }),
          ...[...nameSet].map(async name => { const s = await getDocs(query(collection(db, 'brands'), where('brand_name', '==', name), limit(1))); if (!s.empty) existingNames.add(name); })
        ]);
        const toFlagApps = [
          ...appsWithBrandId.filter(a => !existingIds.has(a.brand_id)),
          ...appsWithCodeOnly.filter(a => !existingCodes.has(a.brand_code)),
          ...appsWithNameOnly.filter(a => !existingNames.has(a.brand_name))
        ];
        const toFlagJoins = joinsWithTargetId.filter(j => !existingIds.has(j.target_brand_id));
        await Promise.all([
          ...toFlagApps.map(a => updateDoc(doc(db, 'brand_applications', a.id), { brand_deleted: true })),
          ...toFlagJoins.map(j => updateDoc(doc(db, 'brand_join_requests', j.id), { brand_deleted: true }))
        ]);
        if (toFlagApps.length || toFlagJoins.length) {
          const fa = new Set(toFlagApps.map(a => a.id));
          const fj = new Set(toFlagJoins.map(j => j.id));
          apps  = apps.filter(a => !fa.has(a.id));
          joins = joins.filter(j => !fj.has(j.id));
        }
      }
      // 상품 승인대기 목록 (approval_status가 '승인대기'인 것만)
      const pendingProducts = productsSnap.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(p => p.approval_status === '승인대기');
      renderApplicationReviewUI(container, apps, joins, pendingProducts, 'application');
    } catch(e) {
      container.innerHTML = '<div style="padding:40px;color:var(--red);">로드 실패: ' + esc(e.message) + '</div>';
    }
  }

        '<td>' + fmtDate(p.created_at) + '</td>' +

    const pendingApps  = apps.filter(a => a.status === '제출됨').length;

    container.innerHTML =

          tabBtn('브랜드 입점 신청', 'application', activeTab, pendingApps) +
          tabBtn('상품 승인 신청', 'product', activeTab, pendingProducts.length) +
          tabBtn('담당자 합류 신청', 'join', activeTab, pendingJoins) +
        '</div>' +
      '</div>' +

      '<div id="tab-application" style="display:' + (activeTab==='application'?'block':'none') + ';">' +
        '<div class="card" style="overflow-x:auto;">' +
          '<table class="data-table"><thead><tr>' +
