    let brands;
    try {
      const snap = await getDocs(collection(db, 'brands'));
      brands = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(b => b.active !== false);
      brands.sort((a, b) => (a.brand_name || '').localeCompare(b.brand_name || ''));
    } catch(e) {
      document.querySelector('#modal-container .modal-body').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">브랜드 목록을 불러오지 못했습니다.<br>' + e.message + '</div></div>';
      return;
    }

    if (brands.length === 0) {
      document.querySelector('#modal-container .modal-body').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">먼저 브랜드를 등록해주세요.<br>' +
        '<button class="btn btn-primary" style="margin-top:16px;" onclick="closeModal();openBrandModal(null)">브랜드 등록하러 가기</button></div></div>';
      return;
    }

    const footerHTML =
      '<button class="btn btn-secondary" onclick="closeModal()">취소</button>' +
      '<button class="btn btn-primary" id="btn-save-product" onclick="saveProduct()">다음 단계 →</button>';

    showModal('새 상품 등록', buildProductNewHTML(brands), footerHTML, 'lg');
    initProductNewForm(brands);
  };

  function buildProductNewHTML(brands) {
    const brandOptions = brands.map(b =>
      '<option value="' + b.id + '" data-code="' + esc(b.brand_code) + '" data-last="' + esc(b.last_product_number || '000') + '">' + esc(b.brand_name) + ' (' + esc(b.brand_code) + ')</option>'
    ).join('');

    return [

      /* ── Step 1: 기본 정보 ── */
      '<div class="form-section">',
      '<div class="form-section-title">기본 정보</div>',
      '<div class="form-row">',
      '<div class="form-group">',
      '<label class="form-label" for="p-brand">브랜드 <span class="required">*</span></label>',
      '<select class="form-select" id="p-brand"><option value="">브랜드 선택...</option>' + brandOptions + '</select>',
      '</div>',
      '<div class="form-group">',
      '<label class="form-label">예정 상품 ID</label>',
      '<div id="p-product-id-preview" style="padding:9px 12px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;font-family:monospace;font-size:14px;font-weight:700;color:var(--gray-400);">브랜드 선택 후 표시</div>',
      '</div>',
      '</div>',
      '<div class="form-group">',
      '<label class="form-label" for="p-name">상품명 <span class="required">*</span></label>',
      '<input class="form-input" id="p-name" type="text" placeholder="예: 체크 파우치" />',
      '</div>',
      '<div class="form-row">',
      '<div class="form-group">',
      '<label class="form-label" for="p-price">기본 판매가 <span class="required">*</span></label>',
      '<input class="form-input" id="p-price" type="number" min="0" step="100" placeholder="0" />',
      '</div>',
      '<div class="form-group">',
      '<label class="form-label">관리 방식 <span class="required">*</span></label>',
      '<div style="display:flex;gap:10px;margin-top:2px;">',
      '<label style="display:flex;align-items:center;gap:8px;padding:9px 16px;border:1px solid var(--gray-300);border-radius:8px;cursor:pointer;flex:1;transition:all 0.12s;" id="lbl-qty">',
      '<input type="radio" name="tracking" id="p-track-qty" value="quantity" checked style="accent-color:var(--blue);" />',
      '<div><div style="font-weight:600;font-size:13px;">수량 관리</div><div style="font-size:11px;color:var(--gray-400);">일반 상품</div></div>',
      '</label>',
      '<label style="display:flex;align-items:center;gap:8px;padding:9px 16px;border:1px solid var(--gray-300);border-radius:8px;cursor:pointer;flex:1;transition:all 0.12s;" id="lbl-ind">',
      '<input type="radio" name="tracking" id="p-track-ind" value="individual" style="accent-color:var(--blue);" />',
      '<div><div style="font-weight:600;font-size:13px;">개체 관리</div><div style="font-size:11px;color:var(--gray-400);">수공예·빈티지 등</div></div>',
      '</label>',
      '</div>',
      '</div>',
      '</div>',
      '<div class="form-group">',
      '<label class="form-label" for="p-memo">메모 <span style="font-size:11px;font-weight:400;color:var(--gray-400);">선택</span></label>',
      '<input class="form-input" id="p-memo" type="text" placeholder="내부 메모 (선택)" />',
      '</div>',
      '</div>',

      /* ── Step 2: 옵션 설정 ── */
      '<div class="form-section">',
      '<div class="form-section-title">옵션 설정</div>',
      '<div style="display:flex;gap:10px;margin-bottom:20px;">',
      '<label style="display:flex;align-items:center;gap:8px;padding:10px 20px;border:1px solid var(--gray-300);border-radius:8px;cursor:pointer;transition:all 0.12s;" id="lbl-no-opt">',
      '<input type="radio" name="opt-mode" id="p-opt-none" value="none" checked style="accent-color:var(--blue);" />',
      '<div><div style="font-weight:600;font-size:13px;">옵션 없음</div><div style="font-size:11px;color:var(--gray-400);">바코드: 상품코드-00</div></div>',
      '</label>',
      '<label style="display:flex;align-items:center;gap:8px;padding:10px 20px;border:1px solid var(--gray-300);border-radius:8px;cursor:pointer;transition:all 0.12s;" id="lbl-has-opt">',
      '<input type="radio" name="opt-mode" id="p-opt-has" value="has" style="accent-color:var(--blue);" />',
      '<div><div style="font-weight:600;font-size:13px;">옵션 있음</div><div style="font-size:11px;color:var(--gray-400);">색상, 크기 등 조합</div></div>',
      '</label>',
      '</div>',
      '<div id="opt-builder" style="display:none;">',
      buildOptionAxesHTML(),
      '</div>',
      '</div>',

      /* ── Step 3: 조합 미리보기 ── */
      '<div id="combo-section" style="display:none;">',
      '<div class="form-section-title" style="margin-bottom:16px;">옵션 조합 확인</div>',
      '<div id="combo-table-wrap"></div>',
      '</div>',


    ].join('');
  }

  function buildOptionAxesHTML() {
    let html = '';
    for (let i = 1; i <= 3; i++) {
      html += [
        '<div class="opt-axis" id="opt-axis-' + i + '" style="' + (i > 1 ? 'display:none;' : '') + 'margin-bottom:16px;padding:16px;background:var(--gray-50);border-radius:10px;border:1px solid var(--gray-200);">',
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">',
        '<div style="font-size:13px;font-weight:700;color:var(--gray-700);">옵션 ' + i + '</div>',
        (i > 1 ? '<button onclick="removeAxis(' + i + ')" style="font-size:11px;color:var(--gray-400);background:none;border:none;cursor:pointer;">✕ 제거</button>' : ''),
        '</div>',
        '<div class="form-row" style="margin-bottom:10px;">',
        '<div class="form-group" style="margin-bottom:0;">',
        '<input class="form-input" id="opt-axis-name-' + i + '" type="text" placeholder="옵션명 (예: 색상)" oninput="rebuildCombos()" />',
        '</div>',
        '</div>',
        '<div>',
        '<label class="form-label" style="font-size:12px;">옵션값 <span style="color:var(--gray-400);font-weight:400;">엔터로 추가</span></label>',
        '<div style="display:flex;gap:6px;flex-wrap:wrap;min-height:36px;padding:6px;border:1px solid var(--gray-300);border-radius:8px;background:#fff;align-items:center;" id="opt-tags-' + i + '" onclick="document.getElementById(\'opt-input-' + i + '\').focus()">',
        '</div>',
        '<input type="text" id="opt-input-' + i + '" placeholder="값 입력 후 엔터" style="border:none;outline:none;font-size:13px;padding:4px 8px;width:100%;margin-top:4px;" onkeydown="handleTagInput(event,' + i + ')" />',
        '</div>',
        '</div>'
      ].join('');
    }
    html += '<div id="add-axis-btn-wrap" style="margin-top:8px;"><button class="btn btn-secondary" onclick="addAxis()" id="btn-add-axis" style="font-size:12px;padding:6px 14px;">+ 옵션 추가 (최대 3개)</button></div>';
    return html;
  }

  /* ── 상품 등록 폼 초기화 ── */
  function initProductNewForm(brands) {
    window._pBrands = brands;
    window._optTags = { 1: [], 2: [], 3: [] };
    window._activeAxes = 1;

    /* 브랜드 선택 → 상품ID 미리보기 */
    document.getElementById('p-brand').addEventListener('change', function() {
      const opt = this.options[this.selectedIndex];
      const code = opt.dataset.code;
      const last = opt.dataset.last || '000';
      const preview = document.getElementById('p-product-id-preview');
      if (!code) { preview.textContent = '브랜드 선택 후 표시'; preview.style.color = 'var(--gray-400)'; return; }
      const next = String(parseInt(last, 10) + 1).padStart(3, '0');
      preview.textContent = code + '-' + next;
      preview.style.color = 'var(--blue)';
    });

    /* 관리방식 라디오 스타일 */
    ['p-track-qty','p-track-ind'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        document.getElementById('lbl-qty').style.borderColor = document.getElementById('p-track-qty').checked ? 'var(--blue)' : 'var(--gray-300)';
        document.getElementById('lbl-ind').style.borderColor = document.getElementById('p-track-ind').checked ? 'var(--blue)' : 'var(--gray-300)';
      });
    });

    /* 옵션 모드 라디오 */
    document.getElementById('p-opt-none').addEventListener('change', () => {
      document.getElementById('opt-builder').style.display = 'none';
      document.getElementById('combo-section').style.display = 'none';
      document.getElementById('lbl-no-opt').style.borderColor = 'var(--blue)';
      document.getElementById('lbl-has-opt').style.borderColor = 'var(--gray-300)';
    });
    document.getElementById('p-opt-has').addEventListener('change', () => {
      document.getElementById('opt-builder').style.display = '';
      document.getElementById('lbl-no-opt').style.borderColor = 'var(--gray-300)';
      document.getElementById('lbl-has-opt').style.borderColor = 'var(--blue)';
      rebuildCombos();
    });
  }

  /* ── 옵션 태그 입력 ── */
  window.handleTagInput = function(e, axis) {
    if (e.key !== 'Enter' && e.key !== ',') return;
    e.preventDefault();
    const input = document.getElementById('opt-input-' + axis);
    const val = input.value.trim();
    if (!val || window._optTags[axis].includes(val)) { input.value = ''; return; }
    window._optTags[axis].push(val);
    input.value = '';
    renderTags(axis);
    rebuildCombos();
  };

  function renderTags(axis) {
    const wrap = document.getElementById('opt-tags-' + axis);
    if (!wrap) return;
    wrap.innerHTML = window._optTags[axis].map((t, i) =>
      '<span style="display:inline-flex;align-items:center;gap:4px;background:var(--blue-light);color:var(--blue);padding:3px 8px;border-radius:20px;font-size:12px;font-weight:600;">' +
      esc(t) + '<button onclick="removeTag(' + axis + ',' + i + ')" style="background:none;border:none;cursor:pointer;color:var(--blue);font-size:14px;line-height:1;padding:0;">×</button></span>'
    ).join('');
  }

  window.removeTag = function(axis, idx) {
    window._optTags[axis].splice(idx, 1);
    renderTags(axis);
    rebuildCombos();
  };

  /* ── 축 추가/제거 ── */
  window.addAxis = function() {
    if (window._activeAxes >= 3) return;
    window._activeAxes++;
    document.getElementById('opt-axis-' + window._activeAxes).style.display = '';
    if (window._activeAxes >= 3) document.getElementById('btn-add-axis').style.display = 'none';
  };

  window.removeAxis = function(axis) {
    window._optTags[axis] = [];
    document.getElementById('opt-axis-' + axis).style.display = 'none';
    if (axis === window._activeAxes) window._activeAxes--;
    document.getElementById('btn-add-axis').style.display = '';
    rebuildCombos();
  };

  /* ── 옵션 조합 자동 생성 ── */
  window.rebuildCombos = function() {
    const axes = [];
    for (let i = 1; i <= 3; i++) {
      const name = (document.getElementById('opt-axis-name-' + i) || {}).value || '';
      const tags = window._optTags[i] || [];
      const el = document.getElementById('opt-axis-' + i);
      if (el && el.style.display !== 'none' && name && tags.length > 0) {
        axes.push({ name, tags });
      }
    }

    const combos = axes.length > 0 ? cartesian(axes.map(a => a.tags)) : [];
    const section = document.getElementById('combo-section');
    const wrap = document.getElementById('combo-table-wrap');

    if (combos.length === 0) { section.style.display = 'none'; return; }

    section.style.display = '';
    window._combos = combos.map((c, i) => ({
      idx: i,
      values: Array.isArray(c) ? c : [c],
      axisNames: axes.map(a => a.name),
      optionNumber: String(i + 1).padStart(2, '0'),
      price: ''
    }));

    renderComboTable(wrap);
  };

  function cartesian(arrays) {
    return arrays.reduce((acc, arr) => acc.flatMap(a => arr.map(b => [].concat(a, b))), [[]]);
  }

  function renderComboTable(wrap) {
    if (!window._combos || !window._combos.length) return;
    const brandSel = document.getElementById('p-brand');
    const brandOpt = brandSel.options[brandSel.selectedIndex];
    const brandCode = brandOpt ? brandOpt.dataset.code : '???';
    const last = brandOpt ? (brandOpt.dataset.last || '000') : '000';
    const productNum = String(parseInt(last, 10) + 1).padStart(3, '0');

    const rows = window._combos.map((c, i) => {
      const label = c.axisNames.map((n, j) => n + ': ' + c.values[j]).join(' / ');
      const barcode = brandCode + '-' + productNum + '-' + c.optionNumber;
      return '<tr id="combo-row-' + i + '" draggable="true" ondragstart="dragStart(event,' + i + ')" ondragover="dragOver(event,' + i + ')" ondrop="dragDrop(event,' + i + ')" style="cursor:grab;">' +
        '<td style="color:var(--gray-400);font-size:18px;text-align:center;">⠿</td>' +
        '<td style="font-size:12px;color:var(--gray-400);">' + c.optionNumber + '</td>' +
        '<td style="font-weight:500;">' + esc(label) + '</td>' +
        '<td><input type="number" value="' + (c.price || '') + '" placeholder="기본가 사용" min="0" step="100" style="border:1px solid var(--gray-200);border-radius:6px;padding:5px 8px;font-size:13px;width:110px;" onchange="window._combos[' + i + '].price=this.value" /></td>' +
        '<td style="font-family:monospace;font-size:12px;color:var(--gray-500);">' + esc(barcode) + '</td>' +
        '</tr>';
    }).join('');

    wrap.innerHTML = '<div class="table-wrap"><table>' +
      '<thead><tr><th style="width:32px;"></th><th>옵션번호</th><th>옵션 조합</th><th>판매가 (비우면 기본가)</th><th>바코드 미리보기</th></tr></thead>' +
      '<tbody id="combo-tbody">' + rows + '</tbody>' +
      '</table></div>' +
      '<div style="font-size:11px;color:var(--gray-400);margin-top:8px;">⠿ 드래그해서 순서 변경 — 순서대로 옵션번호가 부여됩니다</div>';
  }

  /* ── 드래그 앤 드롭 ── */
  let _dragIdx = null;
  window.dragStart = function(e, i) { _dragIdx = i; e.dataTransfer.effectAllowed = 'move'; };
  window.dragOver = function(e, i) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
  window.dragDrop = function(e, i) {
    e.preventDefault();
    if (_dragIdx === null || _dragIdx === i) return;
    const moved = window._combos.splice(_dragIdx, 1)[0];
    window._combos.splice(i, 0, moved);
    window._combos.forEach((c, j) => { c.idx = j; c.optionNumber = String(j + 1).padStart(2, '0'); });
    _dragIdx = null;
    renderComboTable(document.getElementById('combo-table-wrap'));
  };

  /* ════════════════════════════════
     4단계: 상품 저장 — 검증 → 확인 화면
  ════════════════════════════════ */
  window.saveProduct = function() {
    const brandSel = document.getElementById('p-brand');
    if (!brandSel || !brandSel.value) { showToast('브랜드를 선택해주세요.', 'error'); return; }
    const productName = (document.getElementById('p-name').value || '').trim();
    if (!productName) { showToast('상품명을 입력해주세요.', 'error'); return; }
    const priceVal = document.getElementById('p-price').value;
    if (priceVal === '' || parseInt(priceVal) < 0) { showToast('판매가를 입력해주세요.', 'error'); return; }

    const brandOpt = brandSel.options[brandSel.selectedIndex];
    const brandId = brandSel.value;
    const brandCode = brandOpt.dataset.code;
    const lastProductNum = brandOpt.dataset.last || '000';
    const nextProductNum = String(parseInt(lastProductNum, 10) + 1).padStart(3, '0');
    const basePrice = parseInt(priceVal) || 0;
    const trackingType = (document.querySelector('input[name="tracking"]:checked') || {}).value || 'quantity';
    const optionMode = (document.querySelector('input[name="opt-mode"]:checked') || {}).value || 'none';
    const memo = (document.getElementById('p-memo').value || '').trim();

    let skus = [];
    if (optionMode === 'none') {
      skus = [{ option_number: '00', label: '옵션 없음', price: basePrice, axisNames: [], values: [] }];
    } else {
      if (!window._combos || window._combos.length === 0) { showToast('옵션값을 입력하고 엔터를 눌러 조합을 만들어주세요.', 'error'); return; }
      skus = window._combos.map(c => ({
        option_number: c.optionNumber,
        label: c.axisNames.map((n, j) => n + ': ' + c.values[j]).join(' / '),
        price: parseInt(c.price) || basePrice,
        axisNames: c.axisNames || [],
        values: c.values || []
      }));
    }

    window._pendingProduct = { brandId, brandCode, nextProductNum, productName, basePrice, trackingType, optionMode, memo, skus };
    showProductConfirm();
  };

  function showProductConfirm() {
    const d = window._pendingProduct;
    const productId = d.brandCode + '-' + d.nextProductNum;

    /* 개체 관리일 때 SKU별 개체 수 입력 */
    const unitSection = d.trackingType === 'individual'
      ? '<div style="margin-bottom:20px;padding:16px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;">' +
        '<div style="font-size:13px;font-weight:700;color:var(--gray-900);margin-bottom:4px;">개체 수 입력</div>' +
        '<div style="font-size:12px;color:var(--gray-500);margin-bottom:12px;">SKU별 생성할 개체 수를 입력하세요. (0이면 개체 미생성)</div>' +
        d.skus.map(sku =>
          '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #fde68a;">' +
          '<div style="flex:1;font-size:13px;font-weight:500;">' + esc(sku.label) + '</div>' +
          '<code style="font-size:11px;color:var(--gray-400);">' + esc(d.brandCode + '-' + d.nextProductNum + '-' + sku.option_number) + '</code>' +
          '<input type="number" id="uc-' + sku.option_number + '" min="0" max="999" value="1" ' +
          'style="width:64px;border:1px solid var(--gray-300);border-radius:6px;padding:5px 8px;font-size:13px;text-align:center;" />' +
          '<span style="font-size:12px;color:var(--gray-400);white-space:nowrap;">개</span></div>'
        ).join('') +
        '</div>'
      : '';

    /* 요약 */
    const summary =
      '<div style="background:var(--gray-50);border-radius:10px;padding:16px;margin-bottom:16px;">' +
      '<div style="display:grid;grid-template-columns:auto 1fr;gap:8px 16px;font-size:13px;">' +
      row('상품 ID', '<span style="font-family:monospace;font-weight:700;color:var(--blue);">' + esc(productId) + '</span>') +
      row('브랜드코드', esc(d.brandCode)) +
      row('상품명', esc(d.productName)) +
      row('기본 판매가', d.basePrice.toLocaleString() + '원') +
      row('관리방식', d.trackingType === 'quantity' ? '수량 관리' : '개체 관리') +
      row('옵션', d.optionMode === 'none' ? '없음' : d.skus.length + '가지 조합') +
      (d.memo ? row('메모', esc(d.memo)) : '') +
      '</div></div>' +
      '<div style="margin-bottom:16px;">' +
      '<div style="font-size:12px;font-weight:600;color:var(--gray-500);margin-bottom:8px;">생성될 바코드 (' + d.skus.length + '개)</div>' +
      d.skus.map(sku =>
        '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px solid var(--gray-100);">' +
        '<span style="color:var(--gray-700);">' + esc(sku.label) + '</span>' +
        '<code style="color:var(--blue);">' + esc(d.brandCode + '-' + d.nextProductNum + '-' + sku.option_number) + '</code>' +
        '</div>'
      ).join('') +
      '</div>';

    const footerHTML =
      '<button class="btn btn-secondary" onclick="openProductModal()">← 다시 작성</button>' +
      '<button class="btn btn-primary" id="btn-confirm-save" onclick="confirmSaveProduct()">✅ 저장 확정</button>';

    showModal('상품 등록 확인', '<p style="font-size:13px;color:var(--gray-500);margin-bottom:16px;">아래 내용을 확인하고 저장하세요.</p>' + summary + unitSection, footerHTML, 'lg');
  }

  function row(label, val) {
    return '<span style="color:var(--gray-500);white-space:nowrap;">' + label + '</span><span>' + val + '</span>';
  }

  /* ── 최종 저장 (Firestore 트랜잭션) ── */
  window.confirmSaveProduct = async function() {
    const d = window._pendingProduct;
    if (!d) return;

    /* 개체 수 수집 */
    if (d.trackingType === 'individual') {
      d.unitCounts = {};
      d.skus.forEach(sku => {
        const el = document.getElementById('uc-' + sku.option_number);
        d.unitCounts[sku.option_number] = Math.min(999, Math.max(0, parseInt((el && el.value) || '0') || 0));
      });
    }

    const btn = document.getElementById('btn-confirm-save');
    if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner spinner-sm"></div> 저장 중...'; }

    try {
      const productId = await runProductTransaction(d);
      closeModal();
      showToast('상품이 등록됐습니다: ' + productId, 'success');
      window._pendingProduct = null;
      /* 상품 목록 페이지에 있으면 새로고침 */
      const active = document.querySelector('.nav-item.active');
      if (active && active.dataset.page === 'product-list') {
        await renderProductList(document.getElementById('page-content'));
      }
    } catch(e) {
      showToast('저장 실패: ' + e.message, 'error');
      if (btn) { btn.disabled = false; btn.innerHTML = '✅ 저장 확정'; }
    }
  };

  async function runProductTransaction(d) {
    let savedId;
    await runTransaction(db, async (tx) => {
      /* ── 읽기 (트랜잭션 내 모든 read는 write 전에) ── */
      const brandRef = doc(db, 'brands', d.brandId);
      const brandSnap = await tx.get(brandRef);
      if (!brandSnap.exists()) throw new Error('브랜드를 찾을 수 없습니다.');

      const brandData = brandSnap.data();
      const lastNum = parseInt(brandData.last_product_number || '000', 10);
      const productNum = String(lastNum + 1).padStart(3, '0');
      const brandCode = brandData.brand_code;
      const productId = brandCode + '-' + productNum;
      savedId = productId;
      const now = new Date().toISOString();

      /* ── 쓰기 ── */
      tx.update(brandRef, { last_product_number: productNum, updated_at: now });

      tx.set(doc(db, 'products', productId), {
        brand_id: d.brandId,
        brand_code: brandCode,
        product_number: productNum,
        product_name: d.productName,
        base_price: d.basePrice,
        tracking_type: d.trackingType,
        status: '판매중',
        memo: d.memo || '',
        last_option_number: d.optionMode === 'none' ? '00' : String(d.skus.length).padStart(2, '0'),
        created_at: now,
        updated_at: now
      });

      d.skus.forEach((sku, i) => {
        const skuId = productId + '-' + sku.option_number;
        const unitCount = d.trackingType === 'individual' && d.unitCounts ? (d.unitCounts[sku.option_number] || 0) : 0;

        const skuData = {
          option_number: sku.option_number,
          option_sort_order: i,
          price: sku.price || d.basePrice,
          barcode_value: brandCode + '-' + productNum + '-' + sku.option_number,
          sku_status: '판매중',
          last_unit_number: String(unitCount).padStart(3, '0'),
          created_at: now,
          updated_at: now
        };
        if (d.optionMode === 'has') {
          sku.axisNames.forEach((name, j) => {
            skuData['option_' + (j+1) + '_name'] = name;
            skuData['option_' + (j+1) + '_value'] = sku.values[j] || '';
          });
        }
        tx.set(doc(db, 'products', productId, 'skus', skuId), skuData);

        for (let u = 1; u <= unitCount; u++) {
          const unitNum = String(u).padStart(3, '0');
          tx.set(doc(db, 'products', productId, 'skus', skuId, 'units', skuId + '-' + unitNum), {
            unit_number: unitNum,
            barcode_value: brandCode + '-' + productNum + '-' + sku.option_number + '-' + unitNum,
            unit_price: 0,
            unit_status: '판매중',
            memo: '',
            barcode_printed_at: null,
            created_at: now,
            updated_at: now
          });
        }
      });
    });
    return savedId;
  }

  /* ════════════════════════════════
     설정 페이지
  ════════════════════════════════ */

      '<div style="display:flex;align-items:center;gap:12px;">' +
      '<span style="font-size:24px;">⚙️</span>' +
      '<div>' +

      '</div>' +
      '<button onclick="navigate(\'barcode\')" class="btn btn-primary" style="margin-left:auto;">바코드 페이지로 →</button>' +
      '</div>' +
      '</div>' +

      /* ── 데이터 내보내기 ── */
      '<div class="card" style="margin-bottom:20px;">' +
      '<div style="font-size:16px;font-weight:700;color:var(--gray-900);margin-bottom:4px;">데이터 내보내기</div>' +
      '<div style="font-size:12px;color:var(--gray-500);margin-bottom:20px;">Firestore에 저장된 데이터를 엑셀(.xlsx)로 다운로드합니다.</div>' +
      '<div style="display:flex;gap:10px;flex-wrap:wrap;">' +
      '<button onclick="exportBrands()" class="btn btn-secondary">브랜드 목록 내보내기</button>' +
      '<button onclick="exportProducts()" class="btn btn-secondary">상품 목록 내보내기</button>' +
      '</div>' +
      '</div>' +

      /* ── 앱 설치 ── */
      '<div class="card" style="margin-bottom:20px;">' +
      '<div style="font-size:16px;font-weight:700;color:var(--gray-900);margin-bottom:4px;">홈 화면에 앱 설치</div>' +
      '<div style="font-size:12px;color:var(--gray-500);margin-bottom:16px;">이 관리 도구를 스마트폰 또는 컴퓨터의 홈 화면에 앱처럼 설치할 수 있습니다.</div>' +
      '<div id="pwa-install-area">' +
      '<div style="background:var(--blue-light);border-radius:10px;padding:14px 16px;font-size:13px;line-height:1.7;color:var(--gray-700);">' +
      '<b>📱 iOS(아이폰/아이패드)</b><br>' +
      'Safari에서 열기 → 하단 공유 버튼(□↑) → "홈 화면에 추가" 선택<br><br>' +
      '<b>🤖 Android / 💻 Chrome(PC)</b><br>' +
      '아래 버튼을 누르거나, 주소창 오른쪽 설치 아이콘을 클릭하세요.' +
      '</div>' +
      '<div style="margin-top:12px;">' +
      '<button id="btn-pwa-install" onclick="triggerPwaInstall()" class="btn btn-primary" style="display:none;">📲 홈 화면에 설치</button>' +
      '<span id="pwa-already-installed" style="display:none;color:var(--green);font-weight:600;">✅ 이미 설치된 상태입니다.</span>' +
      '</div>' +
      '</div>' +
      '</div>' +

      /* ── Firebase 연결 상태 ── */
      '<div class="card">' +
      '<div style="font-size:16px;font-weight:700;color:var(--gray-900);margin-bottom:16px;">Firebase 연결 상태</div>' +
      '<div id="firebase-status-area"><div class="spinner" style="width:20px;height:20px;"></div></div>' +
      '</div>' +

  function settingNumField(label, id, val, min, max) {
    return '<div>' +
      '<label style="display:block;font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:6px;">' + label + '</label>' +
      '<input type="number" id="' + id + '" value="' + val + '" min="' + min + '" max="' + max + '" style="width:100%;padding:8px 10px;border:1px solid var(--gray-200);border-radius:8px;font-size:14px;">' +
      '</div>';
  }

  async function checkFirebaseStatus() {
    const area = document.getElementById('firebase-status-area');
    if (!area) return;
    const rows = [];
    try {
      await getDoc(doc(db, 'settings', 'config'));
      rows.push(statusRow('Firestore 연결', true));
    } catch(e) { rows.push(statusRow('Firestore 연결', false, e.message)); }
    rows.push(statusRow('Firebase 인증', !!window._currentUser));
    rows.push(statusRow('현재 계정', true, window._currentUser ? window._currentUser.email : '없음'));
    area.innerHTML = '<div style="display:flex;flex-direction:column;gap:10px;">' + rows.join('') + '</div>';
  }

  function statusRow(label, ok, note) {
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:' + (ok ? 'var(--green-light)' : 'var(--red-light)') + ';">' +
      '<span style="font-size:18px;">' + (ok ? '✅' : '❌') + '</span>' +
      '<div>' +
      '<div style="font-weight:600;font-size:13px;">' + label + '</div>' +
      (note ? '<div style="font-size:12px;color:var(--gray-500);">' + esc(note) + '</div>' : '') +
      '</div></div>';
  }

  window.exportBrands = async function() {
    if (!window.XLSX) { showToast('엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도하세요.', 'error'); return; }
    try {
      const snap = await getDocs(collection(db, 'brands'));
      const rows = [['브랜드명','브랜드코드','거래유형','상태','등록일']];
      snap.docs.forEach(d => {
        const b = d.data();
        rows.push([b.brand_name, b.brand_code, b.brand_type, b.active === false ? '사용중지' : '활성', b.created_at ? b.created_at.toDate().toLocaleDateString('ko-KR') : '']);
      });
      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '브랜드목록');
      XLSX.writeFile(wb, 'GMBS_브랜드목록.xlsx');
    } catch(e) { showToast('내보내기 실패: ' + e.message, 'error'); }
  };

  window.exportProducts = async function() {
    if (!window.XLSX) { showToast('엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도하세요.', 'error'); return; }
    try {
      const snap = await getDocs(collection(db, 'products'));
      const rows = [['상품ID','브랜드코드','상품명','기본가','관리방식','상태','메모','등록일']];
      for (const d of snap.docs) {
        const p = d.data();
        rows.push([d.id, p.brand_code, p.product_name, p.base_price, p.tracking_type === 'individual' ? '개체관리' : '수량관리', p.status, p.memo || '', p.created_at ? p.created_at.toDate().toLocaleDateString('ko-KR') : '']);
        const skuSnap = await getDocs(collection(db, 'products', d.id, 'skus'));
        skuSnap.docs.forEach(s => {
          const sk = s.data();
          const opts = [sk.option_1_value, sk.option_2_value, sk.option_3_value].filter(Boolean).join(' / ');
          rows.push(['  └ ' + s.id, p.brand_code, p.product_name + (opts ? ' [' + opts + ']' : ''), sk.price || p.base_price, '', sk.sku_status, '', '']);
        });
      }
      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '상품목록');
      XLSX.writeFile(wb, 'GMBS_상품목록.xlsx');
    } catch(e) { showToast('내보내기 실패: ' + e.message, 'error'); }
  };

  /* ── 준비중 ── */
  function renderComingSoon(container, name) {
    container.innerHTML = '<div class="coming-soon"><div class="coming-soon-icon">🔧</div><div class="coming-soon-label">' + name + '</div><div class="coming-soon-sub">다음 단계에서 구현됩니다.</div></div>';
  }

  /* ── 유틸 ── */
  function statCard(label, value, sub) {
    return '<div class="stat-card"><div class="stat-card-label">' + label + '</div><div class="stat-card-value">' + value + '</div>' + (sub ? '<div class="stat-card-sub">' + sub + '</div>' : '') + '</div>';
  }
  function quickBtn(icon, label, action) {
    const onclick = action.includes('(') ? action : "navigate('" + action + "')";
    return '<button onclick="' + onclick + '" style="display:flex;align-items:center;gap:8px;padding:12px 20px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;font-weight:600;color:#374151;cursor:pointer;" onmouseover="this.style.borderColor=\'#2563eb\';this.style.color=\'#2563eb\'" onmouseout="this.style.borderColor=\'#e5e7eb\';this.style.color=\'#374151\'">' + icon + ' ' + label + '</button>';
  }
  function formGroup(label, id, inputHTML, required) {
    return '<div class="form-group"><label class="form-label" for="' + id + '">' + label + (required ? '<span class="required">*</span>' : '') + '</label>' + inputHTML + '</div>';
  }
  function opt(value, label, selected) {
    return '<option value="' + value + '"' + (selected === value ? ' selected' : '') + '>' + label + '</option>';
  }
  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-backdrop').classList.toggle('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-backdrop').classList.remove('open');
  }
  function showToast(msg, type) {
    type = type || 'info';
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
  window.showToast = showToast;
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    });
  }

  /* ── PWA 설치 프롬프트 ── */
  window._pwaInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    window._pwaInstallPrompt = e;
    const btn = document.getElementById('btn-pwa-install');
    if (btn) btn.style.display = 'inline-flex';
  });
  window.addEventListener('appinstalled', () => {
    window._pwaInstallPrompt = null;
    const btn = document.getElementById('btn-pwa-install');
    const msg = document.getElementById('pwa-already-installed');
    if (btn) btn.style.display = 'none';
    if (msg) msg.style.display = 'inline';
    showToast('앱이 홈 화면에 설치되었습니다!', 'success');
  });
  window.triggerPwaInstall = async function() {
    if (!window._pwaInstallPrompt) return;
    window._pwaInstallPrompt.prompt();
    const { outcome } = await window._pwaInstallPrompt.userChoice;
    if (outcome === 'accepted') window._pwaInstallPrompt = null;
  };
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
    window.addEventListener('DOMContentLoaded', () => {
      const msg = document.getElementById('pwa-already-installed');
      if (msg) msg.style.display = 'inline';
    });
  }
</script>
