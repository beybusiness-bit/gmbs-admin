  window.saveApproval = async function(productId) {
    const status = document.getElementById('approval-status').value;
    const data = { approval_status: status || null, updated_at: today() };

    if (status === '승인') {
      const supply = parseFloat((document.getElementById('approval-supply-price') || {}).value) || 0;
      const rate = parseFloat((document.getElementById('approval-commission-rate') || {}).value) || 0;
      const retail = parseFloat((document.getElementById('approval-retail-price') || {}).value) || 0;
      data.supply_price = supply;
      data.commission_rate = rate;
      data.retail_price_auto = retail || (supply > 0 && rate >= 0 ? Math.ceil(supply / (1 - rate / 100) / 100) * 100 : 0);
    } else if (status === '거절') {
      const reason = ((document.getElementById('approval-rejection-reason') || {}).value || '').trim();
      if (!reason) { showToast('거절 사유를 입력해주세요.', 'error'); return; }
      data.rejection_reason = reason;
    }

    try {
      const psnap = await getDoc(doc(db, 'products', productId));
      const brandId = psnap.exists() ? (psnap.data().brand_id || '') : '';
      await updateDoc(doc(db, 'products', productId), data);
      await writeActivityLog(brandId, 'product', productId, 'status_changed', null, { approval_status: status });
      showToast('승인 상태를 저장했습니다.');
      openProductDetail(productId);
    } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }
  };

  function fileUploadArea(areaId, previewId, inputId, existingUrl) {
    const existing = existingUrl
      ? '<div class="file-preview"><img src="' + esc(existingUrl) + '" /><div><div class="file-preview-name">기존 파일</div><div class="file-preview-size">변경하려면 클릭</div></div></div>'
      : '<div class="file-upload-label"><strong>클릭</strong>해서 이미지 선택<br><span style="font-size:11px;color:var(--gray-400);">JPG, PNG, PDF</span></div>';
    return '<div class="file-upload-area" id="' + areaId + '" onclick="document.getElementById(\'' + inputId + '\').click()">' +
      '<div id="' + previewId + '">' + existing + '</div>' +
      '<input type="file" id="' + inputId + '" accept="image/*,.pdf" style="display:none;" />' +
      '</div>';
  }

  function setupFileUpload(areaId, previewId, inputId) {
    const input = document.getElementById(inputId);
    if (!input) return;
    input.addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      const area = document.getElementById(areaId);
      const preview = document.getElementById(previewId);
      area.classList.add('has-file');
      const sizeMB = (file.size / 1024 / 1024).toFixed(1);
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = e => {
          preview.innerHTML = '<div class="file-preview"><img src="' + e.target.result + '" /><div><div class="file-preview-name">' + esc(file.name) + '</div><div class="file-preview-size">' + sizeMB + ' MB</div></div></div>';
        };
        reader.readAsDataURL(file);
      } else {
        preview.innerHTML = '<div class="file-preview"><div style="font-size:28px;">📄</div><div><div class="file-preview-name">' + esc(file.name) + '</div><div class="file-preview-size">' + sizeMB + ' MB</div></div></div>';
      }
    });
  }

  window.toggleAllProducts = function(checked) {
    const filtered = window._productFiltered || [];
    const ps = window._productPageSize || 20;
    const pg = window._productPage || 1;
    const pageItems = filtered.slice((pg-1)*ps, pg*ps);
    pageItems.forEach(p => {
      if (checked) window._productSelected.add(p.id);
      else window._productSelected.delete(p.id);
      const cb = document.getElementById('pl-chk-' + p.id);
      if (cb) cb.checked = checked;
    });
    updateProductExportBtn();
  };

  window.toggleProductSelect = function(id, checked) {
    if (checked) window._productSelected.add(id);
    else window._productSelected.delete(id);
    const allChk = document.getElementById('pl-chk-all');
    if (allChk) {
      const filtered = window._productFiltered || [];
      const ps = window._productPageSize || 20;
      const pg = window._productPage || 1;
      const pageItems = filtered.slice((pg-1)*ps, pg*ps);
      allChk.checked = pageItems.length > 0 && pageItems.every(p => window._productSelected.has(p.id));
    }
    updateProductExportBtn();
  };

  function updateProductExportBtn() {
    const btn = document.getElementById('btn-export-products');
    const bulkBtn = document.getElementById('btn-bulk-product-status');
    const cnt = (window._productSelected || new Set()).size;
    if (btn) {
      if (cnt > 0) { btn.style.display = ''; btn.textContent = '📥 선택 내보내기 (' + cnt + '개, 토스포스)'; }
      else btn.style.display = 'none';
    }
    if (bulkBtn) {
      if (cnt > 0) { bulkBtn.style.display = ''; bulkBtn.textContent = '🔄 승인상태 변경 (' + cnt + '개)'; }
      else bulkBtn.style.display = 'none';
    }
  }

  window.filterProductList = function() {
    const term = ((document.getElementById('pl-search') || {}).value || '').trim().toLowerCase();
    const approvalFilter = ((document.getElementById('pl-approval-filter') || {}).value || '');
    const filtered = (window._allProducts || []).filter(function(p) {
      const matchTerm = !term ||
        (p.product_name || '').toLowerCase().includes(term) ||
        (p.id || '').toLowerCase().includes(term) ||
        (p.brand_code || '').toLowerCase().includes(term);
      const matchApproval = !approvalFilter || p.approval_status === approvalFilter;
      return matchTerm && matchApproval;
    });
    window._productFiltered = filtered;

    const ps = window._productPageSize || 20;
    const pg = window._productPage || 1;
    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / ps));
    if (window._productPage > totalPages) window._productPage = totalPages;
    const pageItems = filtered.slice((pg-1)*ps, pg*ps);

    const trackingLabel = { quantity: '<span class="badge badge-blue">수량</span>', individual: '<span class="badge badge-yellow">개체</span>' };
    const approvalLabel = {
      '승인대기': '<span class="badge badge-yellow">승인대기</span>',
      '승인': '<span class="badge badge-green">승인</span>',
      '거절': '<span class="badge badge-red">거절</span>',
      '판매중지': '<span class="badge badge-gray">판매중지</span>'
    };

    const tbody = document.getElementById('pl-tbody');
    const countEl = document.getElementById('pl-count');
    const paginEl = document.getElementById('pl-pagination');
    if (!tbody) return;

    if (pageItems.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--gray-400);padding:32px;">검색 결과가 없습니다.</td></tr>';
    } else {
      tbody.innerHTML = pageItems.map(p => {
        const thumb = p.image_url
          ? '<img src="' + esc(p.image_url) + '" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--gray-200);" />'
          : '<div style="width:72px;height:72px;border-radius:8px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:22px;">📦</div>';
        const checked = (window._productSelected || new Set()).has(p.id) ? ' checked' : '';
        return '<tr style="cursor:pointer;" onclick="openProductDetail(\'' + p.id + '\')">' +
        '<td style="padding-left:16px;" onclick="event.stopPropagation()"><input type="checkbox" id="pl-chk-' + p.id + '"' + checked + ' onchange="toggleProductSelect(\'' + p.id + '\',this.checked)" style="cursor:pointer;accent-color:var(--blue);" /></td>' +
        '<td style="padding:8px;">' + thumb + '</td>' +
        '<td class="td-code">' + esc(p.id) + '</td>' +
        '<td style="font-weight:600;">' + esc(p.product_name) + '</td>' +
        '<td>' + esc(p.brand_code) + '</td>' +
        '<td>' + (trackingLabel[p.tracking_type] || p.tracking_type) + '</td>' +
        '<td>' + (p.base_price || 0).toLocaleString() + '원</td>' +
        '<td>' + (approvalLabel[p.approval_status] || '<span class="badge badge-gray">미설정</span>') + '</td>' +
        '<td style="color:var(--gray-400);font-size:12px;">' + (p.created_at ? p.created_at.slice(0,10) : '-') + '</td>' +
        '</tr>';
      }).join('');
    }

    const allChk = document.getElementById('pl-chk-all');
    if (allChk) allChk.checked = pageItems.length > 0 && pageItems.every(p => (window._productSelected||new Set()).has(p.id));

    if (countEl) countEl.innerHTML = '총 <strong>' + (window._allProducts || []).length + '</strong>개 중 <strong>' + total + '</strong>개 · 선택 <strong>' + (window._productSelected||new Set()).size + '</strong>개';

    if (paginEl) {
      if (totalPages <= 1) { paginEl.innerHTML = ''; }
      else {
        paginEl.innerHTML =
          '<div style="display:flex;align-items:center;gap:6px;font-size:13px;">' +
          '<button onclick="window._productPage=Math.max(1,window._productPage-1);filterProductList()" style="padding:4px 10px;border:1px solid var(--gray-200);border-radius:6px;background:#fff;cursor:pointer;"' + (pg<=1?' disabled':'') + '>이전</button>' +
          '<span style="color:var(--gray-500);">' + pg + ' / ' + totalPages + '</span>' +
          '<button onclick="window._productPage=Math.min(' + totalPages + ',window._productPage+1);filterProductList()" style="padding:4px 10px;border:1px solid var(--gray-200);border-radius:6px;background:#fff;cursor:pointer;"' + (pg>=totalPages?' disabled':'') + '>다음</button>' +
          '</div>';
      }
    }

    updateProductExportBtn();
  };

  window.openProductDetail = async function(productId) {
    showModal('상품 상세', '<div class="spinner" style="margin:40px auto;"></div>', null, 'lg');
    try {
      const [productSnap, skusSnap] = await Promise.all([
        getDoc(doc(db, 'products', productId)),
        getDocs(collection(db, 'products', productId, 'skus'))
      ]);
      if (!productSnap.exists()) { closeModal(); showToast('상품을 찾을 수 없습니다.', 'error'); return; }
      const p = productSnap.data();
      const skus = skusSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      skus.sort((a, b) => (a.option_sort_order ?? 99) - (b.option_sort_order ?? 99));

      const skuRows = skus.map(s => {
        const optLabel = s.option_number === '00' ? '옵션 없음'
          : [1,2,3].map(i => s['option_' + i + '_name'] ? s['option_' + i + '_name'] + ': ' + s['option_' + i + '_value'] : '').filter(Boolean).join(' / ');
        const skuThumb = s.image_url
          ? '<img src="' + esc(s.image_url) + '" style="width:32px;height:32px;object-fit:cover;border-radius:4px;border:1px solid var(--gray-200);cursor:pointer;" onclick="uploadSkuImage(\'' + productId + '\',\'' + s.id + '\')" title="클릭하면 사진 변경" />'
          : '<button onclick="uploadSkuImage(\'' + productId + '\',\'' + s.id + '\')" style="width:32px;height:32px;border:1px dashed var(--gray-300);border-radius:4px;background:var(--gray-50);cursor:pointer;font-size:14px;" title="사진 추가">📷</button>';
        return '<tr>' +
          '<td style="padding:6px 8px;">' + skuThumb + '</td>' +
          '<td class="td-code" style="font-size:12px;">' + esc(s.barcode_value) + '</td>' +
          '<td style="font-size:13px;">' + esc(optLabel) + '</td>' +
          '<td>' + (s.price || p.base_price || 0).toLocaleString() + '원</td>' +
          '<td><span class="badge ' + (s.sku_status === '판매중' ? 'badge-green' : 'badge-gray') + '">' + esc(s.sku_status) + '</span></td>' +
          (p.tracking_type === 'individual' ? '<td><button class="btn btn-secondary" style="padding:4px 10px;font-size:11px;" onclick="openUnitList(\'' + productId + '\',\'' + s.id + '\')">개체 보기</button></td>' : '') +
          '</tr>';
      }).join('');

      const mainImgHTML = p.image_url
        ? '<img src="' + esc(p.image_url) + '" style="width:144px;height:144px;object-fit:cover;border-radius:10px;border:1px solid var(--gray-200);margin-right:16px;flex-shrink:0;" />'
        : '';

      const approvalBadge = s => ({
        '승인대기': '<span class="badge badge-yellow">승인대기</span>',
        '승인': '<span class="badge badge-green">승인</span>',
        '거절': '<span class="badge badge-red">거절</span>',
        '판매중지': '<span class="badge badge-gray">판매중지</span>'
      }[s] || '<span class="badge badge-gray">미설정</span>');

      const approvalRow = p.approval_status

        row('상품명', '<strong>' + esc(p.product_name) + '</strong>') +
        row('브랜드', esc(p.brand_code)) +
        approvalRow +

        (p.commission_rate !== undefined ? row('중개수수료율', p.commission_rate + '%') : '') +
        (p.retail_price_auto ? row('정가(자동산정)', (p.retail_price_auto).toLocaleString() + '원') : '') +
        row('판매가격', (p.base_price || 0).toLocaleString() + '원') +
        row('관리방식', p.tracking_type === 'quantity' ? '수량 관리' : '개체 관리') +
        row('상태', p.status || '-') +
        (p.memo ? row('메모', esc(p.memo)) : '') +
        '</div></div></div>' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">' +
        '<div style="font-size:13px;font-weight:700;">SKU / 옵션 (' + skus.length + '개)</div>' +
        '<div style="font-size:12px;color:var(--gray-400);">📷 아이콘 클릭 → 옵션별 사진 추가/변경</div>' +
        '</div>' +
        '<div class="table-wrap"><table>' +
        '<thead><tr><th style="width:40px;"></th><th>바코드</th><th>옵션</th><th>판매가</th><th>상태</th>' +
        (p.tracking_type === 'individual' ? '<th></th>' : '') + '</tr></thead>' +
        '<tbody>' + skuRows + '</tbody></table></div>' +
        '<input type="file" id="sku-img-input" accept="image/*" style="display:none;" />';

      const footerHTML =
        '<button class="btn btn-secondary" onclick="closeModal()">닫기</button>' +
        '<button class="btn btn-secondary" onclick="openProductEdit(\'' + productId + '\')">✏️ 수정</button>' +
        '<button class="btn btn-danger" onclick="toggleProductStatus(\'' + productId + '\',\'' + p.status + '\')">' +
        (p.status === '판매중' ? '판매중지' : '판매 재개') + '</button>';

      showModal('상품 상세 — ' + esc(p.product_name), body, footerHTML, 'lg');

      /* SKU 이미지 업로드 핸들러 */
      window.uploadSkuImage = function(pid, sid) {
        const input = document.getElementById('sku-img-input');
        if (!input) return;
        input.onchange = async function() {
          const file = this.files[0];
          if (!file) return;
          try {
            const path = 'products/' + pid + '/skus/' + sid + '/img_' + Date.now();
            const snap = await uploadBytes(ref(storage, path), file);

  window.toggleProductStatus = async function(productId, currentStatus) {
    const next = currentStatus === '판매중' ? '판매중지' : '판매중';
    try {
      await updateDoc(doc(db, 'products', productId), { status: next, updated_at: new Date().toISOString() });
      showToast('상태를 ' + next + '으로 변경했습니다.', 'success');
      closeModal();
      await renderProductList(document.getElementById('page-content'));
    } catch(e) { showToast('변경 실패: ' + e.message, 'error'); }
  };

  /* ── 상품 수정 ── */
  window.openProductEdit = async function(productId) {
    showModal('상품 수정', '<div class="spinner" style="margin:40px auto;"></div>', null, 'lg');
    try {
      const [pSnap, skusSnap] = await Promise.all([
        getDoc(doc(db, 'products', productId)),
        getDocs(collection(db, 'products', productId, 'skus'))
      ]);
      if (!pSnap.exists()) { showToast('상품을 찾을 수 없습니다.', 'error'); closeModal(); return; }
      const p = pSnap.data();
      const skus = skusSnap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (a.option_sort_order ?? 99) - (b.option_sort_order ?? 99));

      const supplyPrice = p.supply_price !== undefined ? p.supply_price : '';
      const commRate = p.commission_rate !== undefined ? p.commission_rate : '';
      const basePrice = p.base_price || 0;

      /* SKU 행 */
      const skuRows = skus.map((s, i) => {
        const optLabel = s.option_number === '00' ? '옵션 없음'
          : [1,2,3].map(j => s['option_' + j + '_name'] ? s['option_' + j + '_name'] + ': ' + s['option_' + j + '_value'] : '').filter(Boolean).join(' / ');
        return '<tr>' +
          '<td style="font-size:11px;font-family:monospace;">' + esc(s.barcode_value) + '</td>' +
          '<td style="font-size:12px;">' + esc(optLabel) + '</td>' +
          '<td><input type="number" min="0" step="100" value="' + (s.price || basePrice) + '" ' +
            'style="width:100px;border:1px solid var(--gray-300);border-radius:6px;padding:4px 7px;font-size:12px;" ' +
            'onchange="window._editSkuPrices[\'' + s.id + '\']=parseInt(this.value)||0" /></td>' +
          '<td style="text-align:center;">' +
            (i > 0 ? '<button onclick="moveEditSku(' + i + ',-1)" style="border:none;background:var(--gray-100);border-radius:4px;padding:2px 6px;cursor:pointer;">↑</button> ' : '') +
            (i < skus.length - 1 ? '<button onclick="moveEditSku(' + i + ',1)" style="border:none;background:var(--gray-100);border-radius:4px;padding:2px 6px;cursor:pointer;">↓</button>' : '') +
          '</td>' +
          '</tr>';
      }).join('');

      window._editSkuPrices = {};
      skus.forEach(s => { window._editSkuPrices[s.id] = s.price || basePrice; });
      window._editSkuOrder = skus.map(s => s.id);
      window._editProductId = productId;
      window._editProductData = p;
      window._editSkus = skus;

      const body =
        '<div style="display:grid;gap:16px;">' +
        '<div style="display:flex;gap:16px;align-items:flex-start;">' +
        '<div style="flex:0 0 auto;">' +
        (p.image_url
          ? '<img id="edit-product-img-preview" src="' + esc(p.image_url) + '" style="width:144px;height:144px;object-fit:cover;border-radius:10px;border:1px solid var(--gray-200);cursor:pointer;" onclick="document.getElementById(\'input-edit-product-img\').click()" title="클릭해서 사진 변경" />'
          : '<div id="edit-product-img-preview" onclick="document.getElementById(\'input-edit-product-img\').click()" style="width:144px;height:144px;border-radius:10px;border:2px dashed var(--gray-300);background:var(--gray-50);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:4px;">' +
            '<span style="font-size:32px;">📷</span><span style="font-size:11px;color:var(--gray-400);">사진 추가</span></div>') +
        '<input type="file" id="input-edit-product-img" accept="image/*" style="display:none;" onchange="(function(f){if(!f)return;var r=new FileReader();r.onload=function(e){var el=document.getElementById(\'edit-product-img-preview\');el.outerHTML=\'<img id=\\\'edit-product-img-preview\\\' src=\\\'\'+e.target.result+\'\\\' style=\\\'width:144px;height:144px;object-fit:cover;border-radius:10px;border:1px solid var(--gray-200);cursor:pointer;\\\' onclick=\\\'document.getElementById(\\\\\\\'input-edit-product-img\\\\\\\').click()\\\' title=\\\'클릭해서 사진 변경\\\' />\';};r.readAsDataURL(f);})(this.files[0])" />' +
        '</div>' +
        '<div style="flex:1;display:grid;gap:12px;">' +
        '<div class="form-group" style="margin:0;"><label class="form-label">상품 ID</label>' +
        '<div style="padding:9px 12px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;font-family:monospace;font-weight:700;color:var(--blue);">' + esc(productId) + '</div></div>' +
        '<div class="form-group" style="margin:0;"><label class="form-label" for="edit-p-name">상품명 <span class="required">*</span></label>' +
        '<input class="form-input" id="edit-p-name" type="text" value="' + esc(p.product_name) + '" /></div>' +
        '</div></div>' +
        /* 공급가격 + 수수료 + 판매가 */
        '<div class="form-row">' +
        '<div class="form-group"><label class="form-label" for="edit-p-supply">공급가격</label>' +
        '<input class="form-input" id="edit-p-supply" type="number" min="0" step="100" value="' + supplyPrice + '" oninput="calcEditSalePrice()" /></div>' +
        '<div class="form-group"><label class="form-label" for="edit-p-commission">중개수수료 (%)</label>' +
        '<input class="form-input" id="edit-p-commission" type="number" min="0" max="100" step="0.1" value="' + commRate + '" oninput="calcEditSalePrice()" /></div>' +
        '</div>' +
        '<div class="form-group"><label class="form-label">판매가격 <span style="font-size:11px;color:var(--gray-400);font-weight:400;">(자동 계산 또는 직접 입력)</span></label>' +
        '<input class="form-input" id="edit-p-price" type="number" min="0" step="100" value="' + basePrice + '" /></div>' +
        '<div class="form-group"><label class="form-label" for="edit-p-memo">메모</label>' +
        '<input class="form-input" id="edit-p-memo" type="text" value="' + esc(p.memo || '') + '" /></div>' +
        /* SKU 가격 + 순서: 옵션 있는 상품(2개 이상 SKU)만 표시 */
        (skus.length > 1 ?
          '<div style="background:var(--blue-light);border:1px solid #bfdbfe;border-radius:10px;padding:16px;">' +
          '<div style="font-size:13px;font-weight:700;color:var(--blue);margin-bottom:4px;">📋 SKU별 판매가 · 표시 순서</div>' +
          '<div style="font-size:12px;color:var(--gray-500);margin-bottom:12px;">옵션별 가격을 개별 조정하고 목록 표시 순서를 바꿀 수 있습니다.</div>' +
          '<div id="edit-sku-table-wrap" class="table-wrap"><table>' +
          '<thead><tr><th>바코드</th><th>옵션</th><th>판매가</th><th>순서</th></tr></thead>' +
          '<tbody id="edit-sku-tbody">' + skuRows + '</tbody></table></div></div>' : '') +
        '</div>';

      const footerHTML =
        '<button class="btn btn-secondary" onclick="openProductDetail(\'' + productId + '\')">← 돌아가기</button>' +
        '<button class="btn btn-primary" onclick="saveProductEdit()">💾 저장</button>';

      showModal('상품 수정 — ' + esc(p.product_name), body, footerHTML, 'lg');
      calcEditSalePrice();
    } catch(e) {
      document.querySelector('#modal-container .modal-body').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">' + e.message + '</div></div>';
    }
  };

  /* 수정 화면 판매가 역산 */
  window.calcEditSalePrice = function() {
    const supply = parseFloat((document.getElementById('edit-p-supply') || {}).value || '');
    const commission = parseFloat((document.getElementById('edit-p-commission') || {}).value || '');
    if (!isNaN(supply) && !isNaN(commission) && commission < 100) {
      const salePrice = Math.round(supply / (1 - commission / 100));
      const el = document.getElementById('edit-p-price');
      if (el) el.value = salePrice;
    }
  };

  /* SKU 순서 변경 */
  window.moveEditSku = function(i, dir) {
    const j = i + dir;
    const arr = window._editSkus;
    if (j < 0 || j >= arr.length) return;
    const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    window._editSkuOrder = arr.map(s => s.id);
    const basePrice = parseInt((document.getElementById('edit-p-price') || {}).value || '0') || 0;
    const skuRows = arr.map((s, idx) => {
      const optLabel = s.option_number === '00' ? '옵션 없음'
        : [1,2,3].map(k => s['option_' + k + '_name'] ? s['option_' + k + '_name'] + ': ' + s['option_' + k + '_value'] : '').filter(Boolean).join(' / ');
      return '<tr>' +
        '<td style="font-size:11px;font-family:monospace;">' + esc(s.barcode_value) + '</td>' +
        '<td style="font-size:12px;">' + esc(optLabel) + '</td>' +
        '<td><input type="number" min="0" step="100" value="' + (window._editSkuPrices[s.id] || basePrice) + '" ' +
          'style="width:100px;border:1px solid var(--gray-300);border-radius:6px;padding:4px 7px;font-size:12px;" ' +
          'onchange="window._editSkuPrices[\'' + s.id + '\']=parseInt(this.value)||0" /></td>' +
        '<td style="text-align:center;">' +
          (idx > 0 ? '<button onclick="moveEditSku(' + idx + ',-1)" style="border:none;background:var(--gray-100);border-radius:4px;padding:2px 6px;cursor:pointer;">↑</button> ' : '') +
          (idx < arr.length - 1 ? '<button onclick="moveEditSku(' + idx + ',1)" style="border:none;background:var(--gray-100);border-radius:4px;padding:2px 6px;cursor:pointer;">↓</button>' : '') +
        '</td></tr>';
    }).join('');
    document.getElementById('edit-sku-tbody').innerHTML = skuRows;
  };

  /* 상품 수정 저장 */
  window.saveProductEdit = async function() {
    const productId = window._editProductId;
    if (!productId) return;
    const name = (document.getElementById('edit-p-name').value || '').trim();
    if (!name) { showToast('상품명을 입력해주세요.', 'error'); return; }
    const supplyPrice = parseFloat((document.getElementById('edit-p-supply') || {}).value || '') || undefined;
    const commissionRate = parseFloat((document.getElementById('edit-p-commission') || {}).value || '') || undefined;
    const basePrice = parseInt((document.getElementById('edit-p-price') || {}).value || '0') || 0;
    const memo = (document.getElementById('edit-p-memo').value || '').trim();
    const now = new Date().toISOString();

    try {
      const updates = { product_name: name, base_price: basePrice, memo, updated_at: now };
      if (supplyPrice !== undefined) updates.supply_price = supplyPrice;
      if (commissionRate !== undefined) updates.commission_rate = commissionRate;

      /* 상품 대표 사진 업로드 */
      const imgFile = document.getElementById('input-edit-product-img') && document.getElementById('input-edit-product-img').files[0];
      if (imgFile) {
        try {
          const path = 'products/' + productId + '/main_' + Date.now();
          const snap = await uploadBytes(ref(storage, path), imgFile);
          updates.image_url = await getDownloadURL(snap.ref);
        } catch(imgErr) { console.warn('이미지 업로드 실패:', imgErr); }
      }

      await updateDoc(doc(db, 'products', productId), updates);

      /* SKU 가격 + 순서 일괄 업데이트 */
      await Promise.all(window._editSkus.map(async (s, i) => {
        const skuUpdates = {
          price: window._editSkuPrices[s.id] || basePrice,
          option_sort_order: window._editSkuOrder.indexOf(s.id),
          updated_at: now
        };
        await updateDoc(doc(db, 'products', productId, 'skus', s.id), skuUpdates);
      }));

      showToast('상품이 수정됐습니다.', 'success');
      closeModal();
      await renderProductList(document.getElementById('page-content'));
    } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }
  };

  /* ── 개체 목록 (개체관리 상품) ── */
  window.openUnitList = async function(productId, skuId) {
    showModal('개체 목록', '<div class="spinner" style="margin:40px auto;"></div>', null, 'lg');
    try {
      const [skuSnap, unitsSnap] = await Promise.all([
        getDoc(doc(db, 'products', productId, 'skus', skuId)),
        getDocs(collection(db, 'products', productId, 'skus', skuId, 'units'))
      ]);
      const sku = skuSnap.data();
      const units = unitsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      units.sort((a, b) => (a.unit_number || '').localeCompare(b.unit_number || ''));

      const statusOpts = ['판매중','판매완료','분실','폐기'];
      const statusColors = { '판매중':'badge-green','판매완료':'badge-blue','분실':'badge-red','폐기':'badge-gray' };

      const unitRows = units.length === 0
        ? '<tr><td colspan="5" style="text-align:center;color:var(--gray-400);padding:24px;">등록된 개체가 없습니다.</td></tr>'
        : units.map(u => {
          const uThumb = u.image_url
            ? '<img src="' + esc(u.image_url) + '" style="width:30px;height:30px;object-fit:cover;border-radius:4px;border:1px solid var(--gray-200);cursor:pointer;" onclick="uploadUnitImage(\'' + productId + '\',\'' + skuId + '\',\'' + u.id + '\')" title="클릭하면 사진 변경" />'
            : '<button onclick="uploadUnitImage(\'' + productId + '\',\'' + skuId + '\',\'' + u.id + '\')" style="width:30px;height:30px;border:1px dashed var(--gray-300);border-radius:4px;background:var(--gray-50);cursor:pointer;font-size:12px;" title="사진 추가">📷</button>';
          return '<tr>' +
          '<td style="padding:6px 8px;">' + uThumb + '</td>' +
          '<td class="td-code" style="font-size:12px;">' + esc(u.barcode_value) + '</td>' +
          '<td style="font-size:13px;color:var(--gray-500);">' + esc(u.unit_number) + '</td>' +
          '<td><span class="badge ' + (statusColors[u.unit_status] || 'badge-gray') + '">' + esc(u.unit_status) + '</span></td>' +
          '<td><select onchange="changeUnitStatus(\'' + productId + '\',\'' + skuId + '\',\'' + u.id + '\',this.value)" ' +
          'style="border:1px solid var(--gray-200);border-radius:6px;padding:4px 6px;font-size:12px;">' +
          statusOpts.map(s => '<option' + (s === u.unit_status ? ' selected' : '') + '>' + s + '</option>').join('') +
          '</select></td>' +
          '</tr>';
        }).join('');

      const body =
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">' +
        '<div style="font-size:13px;color:var(--gray-500);">바코드: <code style="color:var(--blue);">' + esc(sku.barcode_value) + '</code></div>' +
        '<div style="display:flex;align-items:center;gap:8px;">' +
        '<span style="font-size:13px;color:var(--gray-500);">추가:</span>' +
        '<input type="number" id="add-unit-count" min="1" max="99" value="1" style="width:60px;border:1px solid var(--gray-300);border-radius:6px;padding:5px 8px;font-size:13px;text-align:center;" />' +
        '<span style="font-size:13px;color:var(--gray-500);">개</span>' +
        '<button class="btn btn-primary" style="padding:6px 14px;font-size:13px;" onclick="addUnitsToSku(\'' + productId + '\',\'' + skuId + '\')">➕ 개체 추가</button>' +
        '</div></div>' +
        '<div class="table-wrap"><table>' +
        '<thead><tr><th style="width:40px;"></th><th>개체 바코드</th><th>개체번호</th><th>상태</th><th>상태 변경</th></tr></thead>' +
        '<tbody>' + unitRows + '</tbody></table></div>' +
        '<input type="file" id="unit-img-input" accept="image/*" style="display:none;" />';

      showModal('개체 목록 — ' + esc(skuId), body, '<button class="btn btn-secondary" onclick="openProductDetail(\'' + productId + '\')">← 상품으로</button>', 'lg');

      window.uploadUnitImage = function(pid, sid, uid) {
        const input = document.getElementById('unit-img-input');
        if (!input) return;
        input.onchange = async function() {
          const file = this.files[0];
          if (!file) return;
          try {
            const path = 'products/' + pid + '/skus/' + sid + '/units/' + uid + '/img_' + Date.now();
            const snap = await uploadBytes(ref(storage, path), file);
            const url = await getDownloadURL(snap.ref);
            await updateDoc(doc(db, 'products', pid, 'skus', sid, 'units', uid), { image_url: url, updated_at: new Date().toISOString() });
            showToast('사진이 저장됐습니다.', 'success');
            await openUnitList(pid, sid);
          } catch(e) { showToast('사진 업로드 실패: ' + e.message, 'error'); }
        };
        input.value = '';
        input.click();
      };
    } catch(e) {
      document.querySelector('#modal-container .modal-body').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">' + e.message + '</div></div>';

  window.changeUnitStatus = async function(productId, skuId, unitId, newStatus) {
    try {
      await updateDoc(doc(db, 'products', productId, 'skus', skuId, 'units', unitId), { unit_status: newStatus, updated_at: new Date().toISOString() });
      showToast('개체 상태를 ' + newStatus + '으로 변경했습니다.', 'success');
    } catch(e) { showToast('변경 실패: ' + e.message, 'error'); }
  };

  /* 개체 추가 (Firestore 트랜잭션) */
  window.addUnitsToSku = async function(productId, skuId) {
    const countEl = document.getElementById('add-unit-count');
    const count = parseInt((countEl || {}).value || '1');
    if (!count || count < 1 || count > 99) { showToast('1~99 사이의 숫자를 입력해주세요.', 'error'); return; }

    const btn = document.querySelector('button[onclick="addUnitsToSku(\'' + productId + '\',\'' + skuId + '\')"]');
    if (btn) { btn.disabled = true; btn.textContent = '추가 중...'; }

    try {
      const skuRef = doc(db, 'products', productId, 'skus', skuId);
      let newUnits = [];

      await runTransaction(db, async (tx) => {
        const skuSnap = await tx.get(skuRef);
        if (!skuSnap.exists()) throw new Error('SKU를 찾을 수 없습니다.');
        const skuData = skuSnap.data();
        const lastNum = parseInt(skuData.last_unit_number || '000', 10);
        const now = new Date().toISOString();
        newUnits = [];

        for (let i = 1; i <= count; i++) {
          const unitNum = String(lastNum + i).padStart(3, '0');
          const unitId = skuId + '-' + unitNum;
          const barcodeValue = skuData.barcode_value + '-' + unitNum;
          newUnits.push({ id: unitId, unit_number: unitNum, barcode_value: barcodeValue });
          tx.set(doc(db, 'products', productId, 'skus', skuId, 'units', unitId), {
            unit_number: unitNum,
            barcode_value: barcodeValue,
            unit_price: 0,
            unit_status: '판매중',
            memo: '',
            barcode_printed_at: null,
            created_at: now,
            updated_at: now
          });
        }
        tx.update(skuRef, { last_unit_number: String(lastNum + count).padStart(3, '0'), updated_at: now });
      });

      showToast(count + '개 개체가 추가됐습니다.', 'success');
      /* 목록 새로고침 */
      await openUnitList(productId, skuId);
    } catch(e) {
      showToast('추가 실패: ' + e.message, 'error');
      if (btn) { btn.disabled = false; btn.textContent = '➕ 개체 추가'; }
    }
  };

        '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">브랜드 목록을 불러오지 못했습니다.<br>' + e.message + '</div></div>';

      html += [

        (i > 1 ? '<button onclick="removeAxis(' + i + ')" style="font-size:11px;color:var(--gray-400);background:none;border:none;cursor:pointer;">✕ 제거</button>' : ''),

        '</div>'
      ].join('');
    }
    html += '<div id="add-axis-btn-wrap" style="margin-top:8px;"><button class="btn btn-secondary" onclick="addAxis()" id="btn-add-axis" style="font-size:12px;padding:6px 14px;">+ 옵션 추가 (최대 3개)</button></div>';

  /* ── 상품 등록 폼 초기화 ── */
  /* 공급가격 + 수수료 → 판매가 역산 */
  window.calcSalePrice = function() {
    const supply = parseFloat((document.getElementById('p-supply-price') || {}).value || '');
    const commission = parseFloat((document.getElementById('p-commission') || {}).value || '');
    const disp = document.getElementById('p-price-display');
    if (!disp) return;
    if (isNaN(supply) || isNaN(commission) || commission >= 100) {
      disp.textContent = '공급가격 · 수수료 입력 후 표시';
      disp.style.color = 'var(--gray-400)';
      disp.style.fontWeight = '700';
      return;
    }
    const salePrice = Math.round(supply / (1 - commission / 100));
    disp.textContent = salePrice.toLocaleString() + '원';
    disp.style.color = 'var(--blue)';
    disp.style.fontWeight = '700';
    disp.dataset.value = salePrice;
    /* 수수료 입력을 직접 건드린 경우 autoFilled 해제 */
    const commInput = document.getElementById('p-commission');
    if (commInput && commInput.dataset.autoFilled) commInput.dataset.autoFilled = '';
  };

  function initProductNewForm(brands) {
    window._pBrands = brands;
    window._optTags = { 1: [], 2: [], 3: [] };
    window._activeAxes = 1;

    /* 브랜드 선택 → 상품ID 미리보기 + 수수료 기본값 */
    document.getElementById('p-brand').addEventListener('change', function() {
      const opt = this.options[this.selectedIndex];
      const code = opt.dataset.code;
      const last = opt.dataset.last || '000';
      const preview = document.getElementById('p-product-id-preview');
      if (!code) { preview.textContent = '브랜드 선택 후 표시'; preview.style.color = 'var(--gray-400)'; return; }
      const next = String(parseInt(last, 10) + 1).padStart(3, '0');
      preview.textContent = code + '-' + next;
      preview.style.color = 'var(--blue)';
      /* 브랜드 수수료 자동 입력 */
      const commInput = document.getElementById('p-commission');
      if (commInput && (commInput.value === '' || commInput.dataset.autoFilled === 'true')) {
        commInput.value = opt.dataset.commission !== undefined ? opt.dataset.commission : 10;
        commInput.dataset.autoFilled = 'true';
        calcSalePrice();
      }
    });

    /* 관리방식 라디오 스타일 */
    ['p-track-qty','p-track-ind'].forEach(id => {
      document.getElementById(id).addEventListener('change', () => {
        document.getElementById('lbl-qty').style.borderColor = document.getElementById('p-track-qty').checked ? 'var(--blue)' : 'var(--gray-300)';
        document.getElementById('lbl-ind').style.borderColor = document.getElementById('p-track-ind').checked ? 'var(--blue)' : 'var(--gray-300)';
      });
    });

    /* 옵션 모드 라디오 */
    document.getElementById('p-opt-none').addEventListener('change', () => {
      document.getElementById('opt-builder').style.display = 'none';
      document.getElementById('combo-section').style.display = 'none';
      document.getElementById('lbl-no-opt').style.borderColor = 'var(--blue)';
      document.getElementById('lbl-has-opt').style.borderColor = 'var(--gray-300)';
    });
    document.getElementById('p-opt-has').addEventListener('change', () => {
      document.getElementById('opt-builder').style.display = '';
      document.getElementById('lbl-no-opt').style.borderColor = 'var(--gray-300)';
      document.getElementById('lbl-has-opt').style.borderColor = 'var(--blue)';
      rebuildCombos();
    });

  }

  /* ── 옵션 태그 입력 ── */
  window.handleTagInput = function(e, axis) {
    if (e.key !== 'Enter' && e.key !== ',') return;
    e.preventDefault();
    const input = document.getElementById('opt-input-' + axis);
    const val = input.value.trim();
    if (!val || window._optTags[axis].includes(val)) { input.value = ''; return; }
    window._optTags[axis].push(val);
    input.value = '';
    renderTags(axis);
    rebuildCombos();
  };

  function renderTags(axis) {
    const wrap = document.getElementById('opt-tags-' + axis);
    if (!wrap) return;
    wrap.innerHTML = window._optTags[axis].map((t, i) =>
      '<span style="display:inline-flex;align-items:center;gap:4px;background:var(--blue-light);color:var(--blue);padding:3px 8px;border-radius:20px;font-size:12px;font-weight:600;">' +
      esc(t) + '<button onclick="removeTag(' + axis + ',' + i + ')" style="background:none;border:none;cursor:pointer;color:var(--blue);font-size:14px;line-height:1;padding:0;">×</button></span>'
    ).join('');
  }

  window.removeTag = function(axis, idx) {
    window._optTags[axis].splice(idx, 1);
    renderTags(axis);
    rebuildCombos();
  };

  /* ── 축 추가/제거 ── */
  window.addAxis = function() {
    if (window._activeAxes >= 3) return;
    window._activeAxes++;
    document.getElementById('opt-axis-' + window._activeAxes).style.display = '';
    if (window._activeAxes >= 3) document.getElementById('btn-add-axis').style.display = 'none';
  };

  window.removeAxis = function(axis) {
    window._optTags[axis] = [];
    document.getElementById('opt-axis-' + axis).style.display = 'none';
    if (axis === window._activeAxes) window._activeAxes--;
    document.getElementById('btn-add-axis').style.display = '';
    rebuildCombos();
  };

  /* ── 옵션 조합 자동 생성 ── */
  window.rebuildCombos = function() {
    const axes = [];
    for (let i = 1; i <= 3; i++) {
      const name = (document.getElementById('opt-axis-name-' + i) || {}).value || '';
      const tags = window._optTags[i] || [];
      const el = document.getElementById('opt-axis-' + i);
      if (el && el.style.display !== 'none' && name && tags.length > 0) {
        axes.push({ name, tags });
      }
    }

    const combos = axes.length > 0 ? cartesian(axes.map(a => a.tags)) : [];
    const section = document.getElementById('combo-section');
    const wrap = document.getElementById('combo-table-wrap');

    if (combos.length === 0) { section.style.display = 'none'; return; }

    section.style.display = '';
    window._combos = combos.map((c, i) => ({
      idx: i,
      values: Array.isArray(c) ? c : [c],
      axisNames: axes.map(a => a.name),
      optionNumber: String(i + 1).padStart(2, '0'),
      price: ''
    }));

    renderComboTable(wrap);
  };

  function cartesian(arrays) {
    return arrays.reduce((acc, arr) => acc.flatMap(a => arr.map(b => [].concat(a, b))), [[]]);
  }

  function renderComboTable(wrap) {
    if (!window._combos || !window._combos.length) return;
    const brandSel = document.getElementById('p-brand');
    const brandOpt = brandSel.options[brandSel.selectedIndex];
    const brandCode = brandOpt ? brandOpt.dataset.code : '???';
    const last = brandOpt ? (brandOpt.dataset.last || '000') : '000';
    const productNum = String(parseInt(last, 10) + 1).padStart(3, '0');

    const rows = window._combos.map((c, i) => {
      const label = c.axisNames.map((n, j) => n + ': ' + c.values[j]).join(' / ');
      const barcode = brandCode + '-' + productNum + '-' + c.optionNumber;
      return '<tr id="combo-row-' + i + '" draggable="true" ondragstart="dragStart(event,' + i + ')" ondragover="dragOver(event,' + i + ')" ondrop="dragDrop(event,' + i + ')" style="cursor:grab;">' +
        '<td style="color:var(--gray-400);font-size:18px;text-align:center;">⠿</td>' +
        '<td style="font-size:12px;color:var(--gray-400);">' + c.optionNumber + '</td>' +
        '<td style="font-weight:500;">' + esc(label) + '</td>' +
        '<td><input type="number" value="' + (c.price || '') + '" placeholder="기본가 사용" min="0" step="100" style="border:1px solid var(--gray-200);border-radius:6px;padding:5px 8px;font-size:13px;width:110px;" onchange="window._combos[' + i + '].price=this.value" /></td>' +
        '<td style="font-family:monospace;font-size:12px;color:var(--gray-500);">' + esc(barcode) + '</td>' +
        '</tr>';
    }).join('');

    wrap.innerHTML = '<div class="table-wrap"><table>' +
      '<thead><tr><th style="width:32px;"></th><th>옵션번호</th><th>옵션 조합</th><th>판매가 (비우면 기본가)</th><th>바코드 미리보기</th></tr></thead>' +
      '<tbody id="combo-tbody">' + rows + '</tbody>' +
      '</table></div>' +
      '<div style="font-size:11px;color:var(--gray-400);margin-top:8px;">⠿ 드래그해서 순서 변경 — 순서대로 옵션번호가 부여됩니다</div>';
  }

  /* ── 드래그 앤 드롭 ── */
  let _dragIdx = null;
  window.dragStart = function(e, i) { _dragIdx = i; e.dataTransfer.effectAllowed = 'move'; };
  window.dragOver = function(e, i) { e.preventDefault(); e.dataTransfer.dropEffect = 'move'; };
  window.dragDrop = function(e, i) {
    e.preventDefault();
    if (_dragIdx === null || _dragIdx === i) return;
    const moved = window._combos.splice(_dragIdx, 1)[0];
    window._combos.splice(i, 0, moved);
    window._combos.forEach((c, j) => { c.idx = j; c.optionNumber = String(j + 1).padStart(2, '0'); });
    _dragIdx = null;
    renderComboTable(document.getElementById('combo-table-wrap'));
  };

  /* ════════════════════════════════
     4단계: 상품 저장 — 검증 → 확인 화면
  ════════════════════════════════ */
  window.saveProduct = function() {
    const brandSel = document.getElementById('p-brand');
    if (!brandSel || !brandSel.value) { showToast('브랜드를 선택해주세요.', 'error'); return; }
    const productName = (document.getElementById('p-name').value || '').trim();
    if (!productName) { showToast('상품명을 입력해주세요.', 'error'); return; }
    const supplyVal = (document.getElementById('p-supply-price') || {}).value || '';
    if (supplyVal === '' || parseInt(supplyVal) < 0) { showToast('공급가격을 입력해주세요.', 'error'); return; }
    const commissionVal = (document.getElementById('p-commission') || {}).value || '';
    if (commissionVal === '') { showToast('중개수수료를 입력해주세요.', 'error'); return; }
    const salePriceEl = document.getElementById('p-price-display');
    const salePriceRaw = salePriceEl ? parseInt(salePriceEl.dataset.value || '') : NaN;
    if (isNaN(salePriceRaw) || salePriceRaw <= 0) { showToast('공급가격과 수수료를 먼저 입력해주세요.', 'error'); return; }

    const brandOpt = brandSel.options[brandSel.selectedIndex];
    const brandId = brandSel.value;
    const brandCode = brandOpt.dataset.code;
    const lastProductNum = brandOpt.dataset.last || '000';
    const nextProductNum = String(parseInt(lastProductNum, 10) + 1).padStart(3, '0');
    const supplyPrice = parseInt(supplyVal) || 0;
    const commissionRate = parseFloat(commissionVal) || 0;
    const basePrice = salePriceRaw;
    const trackingType = (document.querySelector('input[name="tracking"]:checked') || {}).value || 'quantity';
    const optionMode = (document.querySelector('input[name="opt-mode"]:checked') || {}).value || 'none';
    const memo = (document.getElementById('p-memo').value || '').trim();

    let skus = [];
    if (optionMode === 'none') {
      skus = [{ option_number: '00', label: '옵션 없음', price: basePrice, axisNames: [], values: [] }];
    } else {
      if (!window._combos || window._combos.length === 0) { showToast('옵션값을 입력하고 엔터를 눌러 조합을 만들어주세요.', 'error'); return; }
      skus = window._combos.map(c => ({
        option_number: c.optionNumber,
        label: c.axisNames.map((n, j) => n + ': ' + c.values[j]).join(' / '),
        price: parseInt(c.price) || basePrice,
        axisNames: c.axisNames || [],
        values: c.values || []
      }));
    }

    const mainImgInput = document.getElementById('input-new-product-img');
    const mainImgFile = mainImgInput && mainImgInput.files[0] ? mainImgInput.files[0] : null;
    window._pendingProduct = { brandId, brandCode, nextProductNum, productName, supplyPrice, commissionRate, basePrice, trackingType, optionMode, memo, skus, mainImgFile };
    showProductConfirm();
  };

  function showProductConfirm() {
    const d = window._pendingProduct;
    const productId = d.brandCode + '-' + d.nextProductNum;

    /* 개체 관리일 때 SKU별 개체 수 입력 */
    const unitSection = d.trackingType === 'individual'
      ? '<div style="margin-bottom:20px;padding:16px;background:#fffbeb;border:1px solid #fde68a;border-radius:10px;">' +
        '<div style="font-size:13px;font-weight:700;color:var(--gray-900);margin-bottom:4px;">개체 수 입력</div>' +
        '<div style="font-size:12px;color:var(--gray-500);margin-bottom:12px;">SKU별 생성할 개체 수를 입력하세요. (0이면 개체 미생성)</div>' +
        d.skus.map(sku =>
          '<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid #fde68a;">' +
          '<div style="flex:1;font-size:13px;font-weight:500;">' + esc(sku.label) + '</div>' +
          '<code style="font-size:11px;color:var(--gray-400);">' + esc(d.brandCode + '-' + d.nextProductNum + '-' + sku.option_number) + '</code>' +
          '<input type="number" id="uc-' + sku.option_number + '" min="0" max="999" value="1" ' +
          'style="width:64px;border:1px solid var(--gray-300);border-radius:6px;padding:5px 8px;font-size:13px;text-align:center;" />' +
          '<span style="font-size:12px;color:var(--gray-400);white-space:nowrap;">개</span></div>'
        ).join('') +
        '</div>'
      : '';

    /* 요약 */
    const summary =
      '<div style="background:var(--gray-50);border-radius:10px;padding:16px;margin-bottom:16px;">' +
      '<div style="display:grid;grid-template-columns:auto 1fr;gap:8px 16px;font-size:13px;">' +
      row('상품 ID', '<span style="font-family:monospace;font-weight:700;color:var(--blue);">' + esc(productId) + '</span>') +
      row('브랜드코드', esc(d.brandCode)) +
      row('상품명', esc(d.productName)) +
      row('공급가격', d.supplyPrice.toLocaleString() + '원') +
      row('중개수수료', d.commissionRate + '%') +
      row('판매가격', d.basePrice.toLocaleString() + '원') +
      row('관리방식', d.trackingType === 'quantity' ? '수량 관리' : '개체 관리') +
      row('옵션', d.optionMode === 'none' ? '없음' : d.skus.length + '가지 조합') +
      (d.memo ? row('메모', esc(d.memo)) : '') +
      '</div></div>' +
      '<div style="margin-bottom:16px;">' +
      '<div style="font-size:12px;font-weight:600;color:var(--gray-500);margin-bottom:8px;">생성될 바코드 (' + d.skus.length + '개)</div>' +
      d.skus.map(sku =>
        '<div style="display:flex;justify-content:space-between;align-items:center;font-size:12px;padding:5px 0;border-bottom:1px solid var(--gray-100);">' +
        '<span style="color:var(--gray-700);">' + esc(sku.label) + '</span>' +
        '<code style="color:var(--blue);">' + esc(d.brandCode + '-' + d.nextProductNum + '-' + sku.option_number) + '</code>' +
        '</div>'
      ).join('') +
      '</div>';

    const footerHTML =
      '<button class="btn btn-secondary" onclick="openProductModal()">← 다시 작성</button>' +
      '<button class="btn btn-primary" id="btn-confirm-save" onclick="confirmSaveProduct()">✅ 저장 확정</button>';

    showModal('상품 등록 확인', '<p style="font-size:13px;color:var(--gray-500);margin-bottom:16px;">아래 내용을 확인하고 저장하세요.</p>' + summary + unitSection, footerHTML, 'lg');
  }

  function row(label, val) {
    return '<span style="color:var(--gray-500);white-space:nowrap;">' + label + '</span><span>' + val + '</span>';
  }

  /* ── 최종 저장 (Firestore 트랜잭션) ── */
  window.confirmSaveProduct = async function() {
    const d = window._pendingProduct;
    if (!d) return;

    /* 개체 수 수집 */
    if (d.trackingType === 'individual') {
      d.unitCounts = {};
      d.skus.forEach(sku => {
        const el = document.getElementById('uc-' + sku.option_number);
        d.unitCounts[sku.option_number] = Math.min(999, Math.max(0, parseInt((el && el.value) || '0') || 0));
      });
    }

    const btn = document.getElementById('btn-confirm-save');
    if (btn) { btn.disabled = true; btn.innerHTML = '<div class="spinner spinner-sm"></div> 저장 중...'; }

    try {
      /* 대표 이미지 업로드 (트랜잭션 전에) */
      let mainImageUrl = '';
      if (d.mainImgFile) {
        try {
          const tmpId = d.brandCode + '-' + d.nextProductNum;
          const path = 'products/' + tmpId + '/main_' + Date.now();
          const snapFile = await uploadBytes(ref(storage, path), d.mainImgFile);
          mainImageUrl = await getDownloadURL(snapFile.ref);
        } catch(imgErr) { console.warn('이미지 업로드 실패:', imgErr); }
      }
      d.mainImageUrl = mainImageUrl;

      const productId = await runProductTransaction(d);
      closeModal();
      showToast('상품이 등록됐습니다: ' + productId, 'success');
      window._pendingProduct = null;
      /* 상품 목록 페이지에 있으면 새로고침 */
      const active = document.querySelector('.nav-item.active');
      if (active && active.dataset.page === 'product-list') {
        await renderProductList(document.getElementById('page-content'));
      }
    } catch(e) {
      showToast('저장 실패: ' + e.message, 'error');
      if (btn) { btn.disabled = false; btn.innerHTML = '✅ 저장 확정'; }
    }
  };

  async function runProductTransaction(d) {
    let savedId;
    await runTransaction(db, async (tx) => {
      /* ── 읽기 (트랜잭션 내 모든 read는 write 전에) ── */
      const brandRef = doc(db, 'brands', d.brandId);
      const brandSnap = await tx.get(brandRef);
      if (!brandSnap.exists()) throw new Error('브랜드를 찾을 수 없습니다.');

      const brandData = brandSnap.data();
      const lastNum = parseInt(brandData.last_product_number || '000', 10);
      const productNum = String(lastNum + 1).padStart(3, '0');
      const brandCode = brandData.brand_code;
      const productId = brandCode + '-' + productNum;
      savedId = productId;
      const now = new Date().toISOString();

      /* ── 쓰기 ── */
      tx.update(brandRef, { last_product_number: productNum, updated_at: now });

      tx.set(doc(db, 'products', productId), {
        brand_id: d.brandId,
        brand_code: brandCode,
        product_number: productNum,
        product_name: d.productName,
        supply_price: d.supplyPrice,
        commission_rate: d.commissionRate,
        base_price: d.basePrice,
        tracking_type: d.trackingType,
        status: '판매중',
        memo: d.memo || '',
        image_url: d.mainImageUrl || '',
        last_option_number: d.optionMode === 'none' ? '00' : String(d.skus.length).padStart(2, '0'),
        created_at: now,
        updated_at: now
      });

      d.skus.forEach((sku, i) => {
        const skuId = productId + '-' + sku.option_number;
        const unitCount = d.trackingType === 'individual' && d.unitCounts ? (d.unitCounts[sku.option_number] || 0) : 0;

        const skuData = {
          option_number: sku.option_number,
          option_sort_order: i,
          price: sku.price || d.basePrice,
          barcode_value: brandCode + '-' + productNum + '-' + sku.option_number,
          sku_status: '판매중',
          last_unit_number: String(unitCount).padStart(3, '0'),
          created_at: now,
          updated_at: now
        };
        if (d.optionMode === 'has') {
          sku.axisNames.forEach((name, j) => {
            skuData['option_' + (j+1) + '_name'] = name;
            skuData['option_' + (j+1) + '_value'] = sku.values[j] || '';
          });
        }
        tx.set(doc(db, 'products', productId, 'skus', skuId), skuData);

        for (let u = 1; u <= unitCount; u++) {
          const unitNum = String(u).padStart(3, '0');
          tx.set(doc(db, 'products', productId, 'skus', skuId, 'units', skuId + '-' + unitNum), {
            unit_number: unitNum,
            barcode_value: brandCode + '-' + productNum + '-' + sku.option_number + '-' + unitNum,
            unit_price: 0,
            unit_status: '판매중',
            memo: '',
            barcode_printed_at: null,
            created_at: now,
            updated_at: now
          });
        }
      });
    });
    return savedId;
  }

  /* ════════════════════════════════
     14단계 정산(Settlement) 관리

  async function renderSettlementList(container) {

      const payBadge = s => ({
        '예정': '<span class="badge badge-gray">예정</span>',

        '확정': '<span class="badge badge-blue">확정</span>',
        '지급완료': '<span class="badge badge-green">지급완료</span>'
      }[s] || '<span class="badge badge-gray">' + esc(s || '-') + '</span>');

      container.innerHTML = '<div class="card"><div class="table-wrap"><table>' +
        '<thead><tr><th>정산 기간</th><th>브랜드</th><th>지급 상태</th><th>지급 예정일</th><th>정산금액</th><th>증빙</th><th></th></tr></thead>' +
        '<tbody>' +
        settlements.map(s =>
          '<tr style="cursor:pointer;" onclick="openSettlementDetail(\'' + s.id + '\')">' +
          '<td style="font-weight:600;">' + esc(s.period || '-') + '</td>' +
          '<td>' + esc(s.brand_id || '-') + '</td>' +
          '<td>' + payBadge(s.pay_status) + '</td>' +
          '<td style="font-size:12px;color:var(--gray-500);">' + esc(s.pay_date || '-') + '</td>' +

  window.saveSettlement = async function(settlementId) {
    const brand_id = document.getElementById('stl-brand').value;
    const period = (document.getElementById('stl-period').value || '').trim();
    if (!brand_id) { showToast('브랜드를 선택해주세요.', 'error'); return; }
    if (!period) { showToast('정산 기간을 입력해주세요.', 'error'); return; }

    const data = {
      brand_id,
      period,
      supply_total: parseFloat(document.getElementById('stl-supply-total').value) || 0,
      commission_total: parseFloat(document.getElementById('stl-commission-total').value) || 0,
      settlement_amount: parseFloat(document.getElementById('stl-settlement-amount').value) || 0,
      biz_type: document.getElementById('stl-biz-type').value || '',
      receipt_type: document.getElementById('stl-receipt-type').value || '',
      updated_at: today()
    };

    try {
      if (settlementId) {
        await updateDoc(doc(db, 'settlements', settlementId), data);
        showToast('정산을 수정했습니다.');
        openSettlementDetail(settlementId);
      } else {
        data.pay_status = '예정';
        data.receipt_status = '미처리';
        data.created_at = today();
        const newDoc = await addDoc(collection(db, 'settlements'), data);
        showToast('정산을 등록했습니다.');
        openSettlementDetail(newDoc.id);
      }
    } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }
  };

    const title = (document.getElementById('notice-title').value || '').trim();
    if (!title) { showToast('제목을 입력해주세요.', 'error'); return; }
    const data = {
      title,
      content: (document.getElementById('notice-content').value || '').trim(),
      pinned: document.getElementById('notice-pinned').checked,
      status: document.getElementById('notice-public').checked ? '공개' : '비공개',
      created_by: (auth.currentUser || {}).email || '',
      updated_at: today()
    };

      if (noticeId) {
        await updateDoc(doc(db, 'notices', noticeId), data);
        showToast('공지를 수정했습니다.');
        closeModal();
      } else {
        data.created_at = today();
        await addDoc(collection(db, 'notices'), data);
        showToast('공지를 등록했습니다.');

  async function renderInquiryList(container) {
    document.getElementById('page-header-actions').innerHTML = '';
    container.innerHTML = '<div class="spinner" style="margin:60px auto;"></div>';
    try {
      const snap = await getDocs(query(collection(db, 'inquiries'), orderBy('created_at', 'desc')));
      const inquiries = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      // 브랜드명 조회용 캐시
      const brandCache = {};
      const brandIds = [...new Set(inquiries.map(i => i.brand_id).filter(Boolean))];
      await Promise.all(brandIds.map(async bid => {
        try {
          const bs = await getDoc(doc(db, 'brands', bid));
          if (bs.exists()) brandCache[bid] = bs.data().brand_name || bid;
        } catch(e) {}
      }));

      if (inquiries.length === 0) {
        container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">💬</div><div class="empty-state-text">등록된 문의가 없습니다.</div></div>';
        return;
      }
      container.innerHTML =
        '<div style="display:flex;gap:10px;margin-bottom:16px;">' +
        '<select id="inq-status-filter" onchange="filterInquiryList()" style="border:1px solid var(--gray-200);border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;">' +
        '<option value="">전체</option><option value="답변대기">답변대기</option><option value="답변완료">답변완료</option>' +
        '</select></div>' +
        '<div class="card"><div class="table-wrap"><table id="inq-table">' +
        '<thead><tr><th>브랜드</th><th>제목</th><th>상태</th><th>등록일</th></tr></thead>' +
        '<tbody id="inq-tbody"></tbody></table></div></div>';

      window._allInquiries = inquiries.map(i => ({ ...i, brand_name: brandCache[i.brand_id] || i.brand_id || '' }));
      filterInquiryList();
    } catch(e) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">' + esc(e.message) + '</div></div>';
    }
  }

  window.filterInquiryList = function() {
    const statusFilter = ((document.getElementById('inq-status-filter') || {}).value || '');
    const filtered = (window._allInquiries || []).filter(i => !statusFilter || i.status === statusFilter);
    const tbody = document.getElementById('inq-tbody');
    if (!tbody) return;
    tbody.innerHTML = filtered.map(i =>
      '<tr style="cursor:pointer;" onclick="openInquiryDetail(\'' + i.id + '\')">' +
      '<td>' + esc(i.brand_name || '-') + '</td>' +
      '<td style="font-weight:600;">' + esc(i.title || '') + '</td>' +
      '<td>' + (i.status === '답변완료'

      '<td style="font-size:12px;color:var(--gray-500);">' + esc(i.created_at || '') + '</td>' +
      '</tr>'
    ).join('');
  };

  async function checkFirebaseStatus() {
    const area = document.getElementById('firebase-status-area');
    if (!area) return;
    const rows = [];
    try {
      await getDoc(doc(db, 'settings', 'config'));
      rows.push(statusRow('Firestore 연결', true));
    } catch(e) { rows.push(statusRow('Firestore 연결', false, e.message)); }
    rows.push(statusRow('Firebase 인증', !!window._currentUser));
    rows.push(statusRow('현재 계정', true, window._currentUser ? window._currentUser.email : '없음'));
    area.innerHTML = '<div style="display:flex;flex-direction:column;gap:10px;">' + rows.join('') + '</div>';
  }

  function statusRow(label, ok, note) {
    return '<div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:8px;background:' + (ok ? 'var(--green-light)' : 'var(--red-light)') + ';">' +
      '<span style="font-size:18px;">' + (ok ? '✅' : '❌') + '</span>' +
      '<div>' +
      '<div style="font-weight:600;font-size:13px;">' + label + '</div>' +
      (note ? '<div style="font-size:12px;color:var(--gray-500);">' + esc(note) + '</div>' : '') +
      '</div></div>';
  }

  /* ── 날짜 포맷 헬퍼 (ISO 문자열 → 한국 날짜) ── */
  function fmtDate(v) {
    if (!v) return '';
    if (typeof v === 'string') return v.slice(0,10);
    if (v && typeof v.toDate === 'function') return v.toDate().toLocaleDateString('ko-KR');
    return String(v);
  }

  /* ── 브랜드 내보내기 (선택한 항목만 GMBS 내부 양식) ── */
  window.exportSelectedBrands = async function() {
    if (!window.XLSX) { showToast('엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도하세요.', 'error'); return; }
    const selected = window._brandSelected || new Set();
    if (selected.size === 0) { showToast('내보낼 브랜드를 먼저 선택해주세요.', 'error'); return; }
    try {
      const allBrands = window._allBrands || [];
      const brands = allBrands.filter(b => selected.has(b.id));
      const rows = [['브랜드명','브랜드코드','거래유형','상태','마지막 상품번호','등록일']];
      brands.forEach(b => {
        rows.push([b.brand_name, b.brand_code, b.brand_type, b.onboarding_status || '미계약', b.last_product_number || '000', fmtDate(b.created_at)]);
      });
      const ws = XLSX.utils.aoa_to_sheet(rows);
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '브랜드목록');
      XLSX.writeFile(wb, 'GMBS_브랜드목록.xlsx');
      showToast(brands.length + '개 브랜드를 내보냈습니다.', 'success');
    } catch(e) { showToast('내보내기 실패: ' + e.message, 'error'); }
  };

  /* ── 상품 내보내기 (선택한 항목 → 토스포스 양식) ── */
  window.exportSelectedProducts = async function() {
    if (!window.XLSX) { showToast('엑셀 라이브러리 로딩 중입니다. 잠시 후 다시 시도하세요.', 'error'); return; }
    const selected = window._productSelected || new Set();
    if (selected.size === 0) { showToast('내보낼 상품을 먼저 선택해주세요.', 'error'); return; }

    showToast('내보내기 준비 중...', 'info');
    try {
      const allProducts = (window._allProducts || []).filter(p => selected.has(p.id));

      /* 토스포스 양식 헤더 (2행: 헤더 + 필수여부) */
      const header1 = ['상품 ID','상품이름','상품코드','카테고리','가격타입\n(고정 가격 or 시가)','기본가격 (원)','세금','바코드','제조사','재고'];
      const header2 = ['','*필수','선택','*필수','선택','*필수','선택','선택','선택','선택'];
      const rows = [header1, header2];

      for (const p of allProducts) {
        const skuSnap = await getDocs(collection(db, 'products', p.id, 'skus'));
        const skus = skuSnap.docs.map(d => ({ id: d.id, ...d.data() }));
        skus.sort((a, b) => (a.option_sort_order ?? 99) - (b.option_sort_order ?? 99));

        skus.forEach(sk => {
          const opts = [sk.option_1_value, sk.option_2_value, sk.option_3_value].filter(Boolean).join(' / ');
          const itemName = p.product_name + (opts ? ' (' + opts + ')' : '');
          rows.push([
            '',                              // 상품 ID (신규등록이므로 빈칸)
            itemName,                        // 상품이름 *필수
            sk.barcode_value || '',          // 상품코드
            p.brand_name || p.brand_code,   // 카테고리 *필수 (브랜드명)
            '고정 가격',                     // 가격타입
            sk.price || p.base_price || 0,  // 기본가격 *필수
            '과세',                          // 세금
            sk.barcode_value || '',          // 바코드
            p.brand_name || p.brand_code,   // 제조사
            ''                              // 재고
          ]);
        });
      }

      const ws = XLSX.utils.aoa_to_sheet(rows);
      /* 열 너비 설정 */
      ws['!cols'] = [8,28,18,12,12,12,8,18,12,8].map(w => ({ wch: w }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, '상품목록(토스포스)');
      XLSX.writeFile(wb, 'GMBS_토스포스_상품등록.xlsx');
      showToast(allProducts.length + '개 상품을 토스포스 양식으로 내보냈습니다.', 'success');
    } catch(e) { showToast('내보내기 실패: ' + e.message, 'error'); }
  };

  /* ── 준비중 ── */
  function renderComingSoon(container, name) {
    container.innerHTML = '<div class="coming-soon"><div class="coming-soon-icon">🔧</div><div class="coming-soon-label">' + name + '</div><div class="coming-soon-sub">다음 단계에서 구현됩니다.</div></div>';
  }

  /* ════════════════════════════════
     이메일 설정 페이지
  ════════════════════════════════ */
  const EMAIL_TRIGGERS = [
    { id: 'application_received', label: '브랜드 등록 신청 접수', desc: '신규 브랜드가 등록 신청을 제출했을 때 신청자에게 자동 발송' },
    { id: 'join_received',        label: '기존 브랜드 합류 신청 접수', desc: '기존 브랜드에 합류 신청을 제출했을 때 신청자에게 자동 발송' },
    { id: 'brand_approved',       label: '입점 승인 완료', desc: '관리자가 브랜드 입점을 승인했을 때 담당자에게 자동 발송' },
    { id: 'brand_rejected',       label: '입점 거절', desc: '관리자가 브랜드 입점을 거절했을 때 신청자에게 자동 발송' },
    { id: 'product_registered',   label: '상품 등록 승인', desc: '관리자가 상품 등록을 승인했을 때 담당자에게 자동 발송' },
    { id: 'product_rejected',     label: '상품 등록 거절', desc: '관리자가 상품 등록을 거절했을 때 담당자에게 자동 발송' },
  ];

  async function renderEmailSettings(container) {
    container.innerHTML = '<div class="spinner" style="margin:60px auto;"></div>';
    try {
      const [settingsSnap, configsSnap] = await Promise.all([
        getDoc(doc(db, 'email_configs', '_settings')),
        getDocs(collection(db, 'email_configs')),
      ]);
      const settings = settingsSnap.exists() ? settingsSnap.data() : {};
      const configs = {};
      configsSnap.docs.forEach(function(d) { if (d.id !== '_settings') configs[d.id] = d.data(); });

      container.innerHTML =
        '<div style="max-width:800px;">' +

        /* ── EmailJS 연동 설정 ── */
        '<div class="card" style="margin-bottom:24px;padding:24px;">' +
        '<div style="font-size:16px;font-weight:700;color:var(--gray-900);margin-bottom:4px;">EmailJS 연동 설정</div>' +
        '<div style="font-size:12px;color:var(--gray-500);margin-bottom:20px;">EmailJS에서 발급받은 키를 입력하세요. <a href="https://www.emailjs.com/" target="_blank" style="color:var(--blue);text-decoration:none;">EmailJS 콘솔 →</a></div>' +
        '<div class="form-row" style="margin-bottom:16px;">' +
        '<div class="form-group">' +
        '<label class="form-label">Public Key</label>' +
        '<input id="ejs-public-key" class="form-input" type="text" placeholder="예: O4qANYVjrmK5AdY4i" value="' + esc(settings.public_key || '') + '" />' +
        '<div class="form-hint">EmailJS → Account → Public Key</div>' +
        '</div>' +
        '<div class="form-group">' +
        '<label class="form-label">Service ID</label>' +
        '<input id="ejs-service-id" class="form-input" type="text" placeholder="예: service_xxxxxxx" value="' + esc(settings.service_id || '') + '" />' +
        '<div class="form-hint">EmailJS → Email Services → Service ID</div>' +
        '</div>' +
        '</div>' +
        '<button onclick="saveEmailJsSettings()" class="btn btn-primary">저장</button>' +
        '</div>' +

        /* ── 트리거 설정 ── */
        '<div class="card" style="padding:24px;">' +
        '<div style="font-size:16px;font-weight:700;color:var(--gray-900);margin-bottom:4px;">이메일 발송 트리거 설정</div>' +
        '<div style="font-size:12px;color:var(--gray-500);margin-bottom:12px;">각 이벤트에 연결할 EmailJS 템플릿 ID를 입력하고 활성화하세요.</div>' +
        '<div style="background:var(--blue-light);border-radius:8px;padding:12px 14px;margin-bottom:20px;font-size:12px;color:var(--gray-700);line-height:1.7;">' +
        '<b>💡 템플릿에서 사용 가능한 변수</b><br>' +
        '<code>{{to_email}}</code> 수신자 이메일 &nbsp;·&nbsp; <code>{{to_name}}</code> 수신자 이름 &nbsp;·&nbsp; <code>{{brand_name}}</code> 브랜드명 &nbsp;·&nbsp; <code>{{reply_to}}</code> 답장 이메일' +
        '</div>' +
        EMAIL_TRIGGERS.map(function(t) {
          var cfg = configs[t.id] || {};
          var isEnabled = !!(cfg.enabled && cfg.template_id);
          return '<div style="padding:16px 0;border-bottom:1px solid var(--gray-100);">' +
            '<div style="display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;">' +
            '<div style="flex:1;min-width:180px;">' +
            '<div style="font-weight:600;font-size:13px;color:var(--gray-900);">' + esc(t.label) + '</div>' +
            '<div style="font-size:12px;color:var(--gray-400);margin-top:2px;">' + esc(t.desc) + '</div>' +
            '</div>' +
            '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">' +
            '<input id="tpl-' + t.id + '" class="form-input" type="text" placeholder="template_xxxxxxx" value="' + esc(cfg.template_id || '') + '" style="width:200px;" />' +
            '<label style="display:flex;align-items:center;gap:6px;cursor:pointer;white-space:nowrap;font-size:13px;font-weight:500;">' +
            '<input type="checkbox" id="chk-' + t.id + '" ' + (isEnabled ? 'checked' : '') + ' style="width:16px;height:16px;cursor:pointer;accent-color:var(--blue);" />' +
            '활성화' +
            '</label>' +
            '<button onclick="saveTriggerConfig(\'' + t.id + '\')" class="btn btn-secondary" style="white-space:nowrap;">저장</button>' +
            '</div>' +
            '</div>' +
            '</div>';
        }).join('') +
        '</div>' +

        '</div>';
    } catch(e) {
      container.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">불러오지 못했습니다: ' + esc(e.message) + '</div></div>';
    }
  }

  window.saveEmailJsSettings = async function() {
    var publicKey = (document.getElementById('ejs-public-key') || {}).value.trim();
    var serviceId = (document.getElementById('ejs-service-id') || {}).value.trim();
    if (!publicKey || !serviceId) { showToast('Public Key와 Service ID를 모두 입력하세요.', 'error'); return; }
    try {
      await setDoc(doc(db, 'email_configs', '_settings'), { public_key: publicKey, service_id: serviceId, updated_at: new Date().toISOString() }, { merge: true });
      showToast('EmailJS 설정 저장 완료', 'success');
    } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }
  };

  window.saveTriggerConfig = async function(triggerId) {
    var tplEl = document.getElementById('tpl-' + triggerId);
    var chkEl = document.getElementById('chk-' + triggerId);
    var templateId = tplEl ? tplEl.value.trim() : '';
    var enabled = chkEl ? chkEl.checked : false;
    try {
      await setDoc(doc(db, 'email_configs', triggerId), {
        trigger_event: triggerId,
        template_id: templateId,
        enabled: enabled && !!templateId,
        updated_at: new Date().toISOString(),
      }, { merge: true });
      showToast('저장 완료', 'success');
    } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }
  };

  /* ── 유틸 ── */
  function statCard(label, value, sub) {
    return '<div class="stat-card"><div class="stat-card-label">' + label + '</div><div class="stat-card-value">' + value + '</div>' + (sub ? '<div class="stat-card-sub">' + sub + '</div>' : '') + '</div>';
  }
  function quickBtn(icon, label, action) {
    const onclick = action.includes('(') ? action : "navigate('" + action + "')";
    return '<button onclick="' + onclick + '" style="display:flex;align-items:center;gap:8px;padding:12px 20px;background:#fff;border:1px solid #e5e7eb;border-radius:10px;font-size:14px;font-weight:600;color:#374151;cursor:pointer;" onmouseover="this.style.borderColor=\'#2563eb\';this.style.color=\'#2563eb\'" onmouseout="this.style.borderColor=\'#e5e7eb\';this.style.color=\'#374151\'">' + icon + ' ' + label + '</button>';
  }
  function formGroup(label, id, inputHTML, required) {
    return '<div class="form-group"><label class="form-label" for="' + id + '">' + label + (required ? '<span class="required">*</span>' : '') + '</label>' + inputHTML + '</div>';
  }
  function opt(value, label, selected) {
    return '<option value="' + value + '"' + (selected === value ? ' selected' : '') + '>' + label + '</option>';
  }
  function esc(str) {
    return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-backdrop').classList.toggle('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-backdrop').classList.remove('open');
  }
  function showToast(msg, type) {
    type = type || 'info';
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
  window.showToast = showToast;
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    });
  }

  /* ── PWA 설치 프롬프트 ── */
  window._pwaInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    window._pwaInstallPrompt = e;
    const btn = document.getElementById('btn-pwa-install');
    if (btn) btn.style.display = 'inline-flex';
  });
  window.addEventListener('appinstalled', () => {
    window._pwaInstallPrompt = null;
    const btn = document.getElementById('btn-pwa-install');
    const msg = document.getElementById('pwa-already-installed');
    if (btn) btn.style.display = 'none';
    if (msg) msg.style.display = 'inline';
    showToast('앱이 홈 화면에 설치되었습니다!', 'success');
  });
  window.triggerPwaInstall = async function() {
    if (!window._pwaInstallPrompt) return;
    window._pwaInstallPrompt.prompt();
    const { outcome } = await window._pwaInstallPrompt.userChoice;
    if (outcome === 'accepted') window._pwaInstallPrompt = null;
  };
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
    window.addEventListener('DOMContentLoaded', () => {
      const msg = document.getElementById('pwa-already-installed');
      if (msg) msg.style.display = 'inline';
    });
  }
</script>
</body>
</html>
