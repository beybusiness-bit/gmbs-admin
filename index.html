  /* ── persons 서브컬렉션 → 최상위 컬렉션 1회 마이그레이션 ── */
  async function migratePersonsToTopLevel() {
    const migKey = 'persons_migrated_v1';
    if (localStorage.getItem(migKey)) return;
    const brandsSnap = await getDocs(collection(db, 'brands'));
    const writes = [];
    for (const bd of brandsSnap.docs) {
      const subSnap = await getDocs(collection(db, 'brands', bd.id, 'persons'));
      for (const pd of subSnap.docs) {
        const existing = await getDoc(doc(db, 'persons', pd.id));
        if (!existing.exists()) {
          writes.push(setDoc(doc(db, 'persons', pd.id), { brand_id: bd.id, ...pd.data() }));
        }
      }
    }
    await Promise.all(writes);
    localStorage.setItem(migKey, '1');
    if (writes.length > 0) console.log('[migration] persons 마이그레이션 완료:', writes.length, '건');
  }

  /* ════════════════════════════════
     담당자 목록 페이지 (전체)
  ════════════════════════════════ */
  async function renderPersonsList(container) {
    container.innerHTML = '<div class="spinner" style="margin:60px auto;"></div>';
    try {
      const [personsSnap, brandsSnap, usersSnap] = await Promise.all([
        getDocs(collection(db, 'persons')),
        getDocs(collection(db, 'brands')),
        getDocs(query(collection(db, 'users'), where('member_status', '!=', null)))
      ]);
      const brandMap = {};
      brandsSnap.docs.forEach(d => { brandMap[d.id] = d.data().brand_name || d.id; });

      // persons 컬렉션에 있는 문서
      const persons = personsSnap.docs.map(d => ({ id: d.id, _source: 'persons', ...d.data() }));
      const personIdSet = new Set(persons.map(p => p.id));

      // users 컬렉션에는 있지만 persons 문서가 없는 벤더 회원 → 미등록 담당자로 표시
      usersSnap.docs.forEach(d => {
        const u = d.data();
        const alreadyIn = u.person_id && personIdSet.has(u.person_id);
        if (!alreadyIn) {
          persons.push({
            id: d.id,
            _source: 'users',
            _uid: d.id,
            name: u.display_name || u.displayName || '',
            login_google_email: u.email || '',
            contact_email: u.email || '',
            role: '',
            brand_id: u.brand_id || null,
            active: u.member_status === '브랜드회원',
            created_at: u.created_at || ''
          });
        }
      });

      const toStr = v => (v && typeof v.toDate === 'function') ? v.toDate().toISOString() : (v || '');
      persons.sort((a, b) => toStr(b.created_at).localeCompare(toStr(a.created_at)));

      let html = '<div style="padding:16px 0;">';
      html += '<div style="display:flex;gap:8px;align-items:center;margin-bottom:16px;">';
      html += '<input id="pl-search" type="text" class="form-input" placeholder="이름·이메일·역할 검색" style="max-width:260px;" oninput="filterPersonsList()" />';
      html += '<select id="pl-filter-active" class="form-input" style="max-width:140px;" onchange="filterPersonsList()">';
      html += '<option value="all">전체</option><option value="active">활성</option><option value="inactive">비활성</option>';
      html += '</select>';
      html += '</div>';

      html += '<div id="pl-table-wrap">';
      html += buildPersonsTable(persons, brandMap);
      html += '</div>';
      html += '</div>';

      container.innerHTML = html;
      window._allPersonsData = persons;
      window._allPersonsBrandMap = brandMap;
    } catch(e) {
      container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--red);">담당자 목록을 불러오지 못했습니다: ' + esc(e.message) + '</div>';
    }
  }

  function buildPersonsTable(persons, brandMap) {
    if (!persons.length) return '<div style="padding:40px;text-align:center;color:var(--gray-400);">담당자가 없습니다.</div>';
    let t = '<div style="overflow-x:auto;">';
    t += '<table style="width:100%;border-collapse:collapse;font-size:14px;">';
    t += '<thead><tr style="background:var(--gray-50);border-bottom:2px solid var(--gray-200);">';
    ['이름','역할','연락처 이메일','구글 로그인 이메일','소속 브랜드','상태','등록일','비고'].forEach(h => {
      t += '<th style="padding:10px 12px;text-align:left;font-weight:600;color:var(--gray-600);white-space:nowrap;">' + h + '</th>';
    });
    t += '</tr></thead><tbody>';
    persons.forEach(p => {
      const brandName = p.brand_id ? (brandMap[p.brand_id] || p.brand_id) : '<span style="color:var(--gray-400);">없음</span>';
      const statusBadge = p.active !== false
        ? '<span class="badge badge-green">활성</span>'
        : '<span class="badge badge-gray">비활성</span>';
      t += '<tr style="border-bottom:1px solid var(--gray-100);">';
      t += '<td style="padding:10px 12px;font-weight:500;">' + esc(p.name || '-') + '</td>';
      t += '<td style="padding:10px 12px;color:var(--gray-600);">' + esc(p.role || '-') + '</td>';
      t += '<td style="padding:10px 12px;">' + esc(p.contact_email || '-') + '</td>';
      t += '<td style="padding:10px 12px;">' + esc(p.login_google_email || '-') + '</td>';
      t += '<td style="padding:10px 12px;">' + brandName + '</td>';
      t += '<td style="padding:10px 12px;">' + statusBadge + '</td>';
      t += '<td style="padding:10px 12px;color:var(--gray-500);">' + esc(p.created_at || '-') + '</td>';
      const noteBadge = p._source === 'users'
        ? '<span class="badge badge-yellow" title="벤더 포털 가입 계정이지만 persons 문서 미생성 상태">미등록</span>'
        : '';
      t += '<td style="padding:10px 12px;">' + noteBadge + '</td>';
      t += '</tr>';
    });
    t += '</tbody></table></div>';
    return t;
  }

  window.filterPersonsList = function() {
    const q = (document.getElementById('pl-search') || {}).value || '';
    const activeFilter = (document.getElementById('pl-filter-active') || {}).value || 'all';
    const persons = (window._allPersonsData || []).filter(p => {
      const matchQ = !q || [p.name, p.contact_email, p.login_google_email, p.role].some(v => v && v.toLowerCase().includes(q.toLowerCase()));
      const matchActive = activeFilter === 'all' || (activeFilter === 'active' ? p.active !== false : p.active === false);
      return matchQ && matchActive;
    });
    const wrap = document.getElementById('pl-table-wrap');
    if (wrap) wrap.innerHTML = buildPersonsTable(persons, window._allPersonsBrandMap || {});
  };

  function fmtPhone(raw) {
    const d = (raw || '').replace(/\D/g, '');
    if (d.length <= 3) return d;
    if (d.startsWith('02')) {
      if (d.length <= 5) return d.slice(0,2) + '-' + d.slice(2);
      if (d.length <= 9) return d.slice(0,2) + '-' + d.slice(2,5) + '-' + d.slice(5);
      return d.slice(0,2) + '-' + d.slice(2,6) + '-' + d.slice(6,10);
    }
    if (d.length <= 6) return d.slice(0,3) + '-' + d.slice(3);
    if (d.length <= 10) return d.slice(0,3) + '-' + d.slice(3,6) + '-' + d.slice(6);
    return d.slice(0,3) + '-' + d.slice(3,7) + '-' + d.slice(7,11);
  }

  window.onPersonPhoneInput = function(el) {
    const pos = el.selectionStart;
    const prev = el.value;
    el.value = fmtPhone(el.value);
    // 커서 위치 보정 (숫자 추가 시 하이픈이 생겨 밀릴 수 있음)
    const diff = el.value.length - prev.length;
    el.setSelectionRange(pos + diff, pos + diff);
  };

  window.savePersonInline = async function(brandId, personId, isEdit) {
    const getVal = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
    const name = getVal('pif-name');
    if (!name) { showToast('이름을 입력해주세요.', 'error'); return; }
    const role = getVal('pif-role');
    if (!role) { showToast('역할을 선택해주세요.', 'error'); return; }
    const loginEmail = getVal('pif-login-email');
    if (!loginEmail) { showToast('vendor 로그인 구글 계정을 입력해주세요.', 'error'); return; }
    if (!isEdit) {
      const loginEmailConfirm = getVal('pif-login-email-confirm');
      if (loginEmail !== loginEmailConfirm) { showToast('구글 계정 이메일이 일치하지 않습니다.', 'error'); return; }
    }
    // 주관리자 1명 제한 검사
    if (role === '주관리자') {
      const existingSnap = await getDocs(query(
        collection(db, 'persons'),
        where('brand_id', '==', brandId),
        where('role', '==', '주관리자'),
        where('active', '!=', false)
      ));
      const others = existingSnap.docs.filter(d => d.id !== personId);
      if (others.length > 0) {
        showToast('이미 주관리자(' + (others[0].data().name || '') + ')가 있습니다. 먼저 해당 담당자의 역할을 부관리자로 변경해주세요.', 'error');
        return;
      }
    }
    const data = {
      name,
      role,
      phone: getVal('pif-phone').replace(/\D/g, '').replace(/(\d{2,3})(\d{3,4})(\d{4})/, '$1-$2-$3'),
      contact_email: getVal('pif-contact-email'),
      login_google_email: loginEmail,
      active: true,
      updated_at: today()
    };
    // 저장 버튼 비활성화 (중복 클릭 방지)
    const saveBtn = document.querySelector('#person-form-area .btn-primary');
    if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = '저장 중...'; }
    try {
      let savedPersonId = personId;
      if (isEdit && personId) {
        await updateDoc(doc(db, 'persons', personId), data);
      } else {
        data.created_at = today();
        data.brand_id = brandId;
        const ref = await addDoc(collection(db, 'persons'), data);
        savedPersonId = ref.id;
        await setDoc(doc(db, 'vendor_accounts', loginEmail), {
          uid: null, brand_id: brandId, person_id: savedPersonId,
          status: '초대됨', created_at: today()
        }, { merge: false });
      }
      showToast(isEdit ? '담당자를 수정했습니다.' : '담당자를 추가하고 vendor 계정을 초대했습니다.');
      // 인라인으로 섹션만 갱신 (모달 유지)
      const sec = document.getElementById('brand-persons-section');
      if (sec) await loadBrandPersons(brandId);
    } catch(e) {
      showToast('저장 실패: ' + e.message, 'error');
      if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = isEdit ? '저장' : '추가'; }
    }
  };

  window.executeBrandDelete = async function(brandId, brandName) {
    const nameInput = (document.getElementById('del-brand-confirm-name') || {}).value || '';
    const chk1 = document.getElementById('del-chk1');
    const chk2 = document.getElementById('del-chk2');
    const chk3 = document.getElementById('del-chk3');
    if (nameInput !== brandName) { showToast('브랜드명이 일치하지 않습니다.', 'error'); return; }
    if (!chk1 || !chk1.checked || !chk2 || !chk2.checked || !chk3 || !chk3.checked) {
      showToast('모든 확인 항목에 체크해주세요.', 'error'); return;
    }
    if (!confirm('마지막 확인: [' + brandName + '] 브랜드를 영구 삭제합니다.\n이 작업은 되돌릴 수 없습니다.')) return;
    try {
      // 담당자: 삭제하지 않고 brand_id를 null로 처리 (계정은 유지)
      const personsSnap = await getDocs(query(collection(db, 'persons'), where('brand_id', '==', brandId)));
      const personPromises = [];
      for (const pd of personsSnap.docs) {
        const loginEmail = pd.data().login_google_email;
        personPromises.push(updateDoc(doc(db, 'persons', pd.id), { brand_id: null, updated_at: today() }));
        if (loginEmail) {
          personPromises.push(updateDoc(doc(db, 'vendor_accounts', loginEmail), { brand_id: null, updated_at: today() }).catch(() => {}));
        }
        const uid = pd.data().uid;
        if (uid) {
          personPromises.push(updateDoc(doc(db, 'users', uid), { brand_id: null, updated_at: today() }).catch(() => {}));
        }
      }
      await Promise.all(personPromises);
      // 관련 신청서에 brand_deleted 플래그 → 승인 목록에서 숨김
      const brandSnap = await getDoc(doc(db, 'brands', brandId));
      const brandCode = brandSnap.exists() ? (brandSnap.data().brand_code || '') : '';
      const flagQueries = [
        getDocs(query(collection(db, 'brand_applications'), where('target_brand_id', '==', brandId))),
        getDocs(query(collection(db, 'brand_join_requests'), where('target_brand_id', '==', brandId))),
        getDocs(query(collection(db, 'brand_applications'), where('brand_id', '==', brandId))),
      ];
      if (brandCode) {
        flagQueries.push(getDocs(query(collection(db, 'brand_applications'), where('brand_code', '==', brandCode))));
      }
      const flagSnaps = await Promise.all(flagQueries);
      const flagPromises = [];
      const flaggedIds = new Set();
      flagSnaps.forEach(snap => snap.docs.forEach(d => {
        if (!flaggedIds.has(d.id)) { flaggedIds.add(d.id); flagPromises.push(updateDoc(d.ref, { brand_deleted: true })); }
      }));
      await Promise.all(flagPromises);
      // contracts는 브랜드 서브컬렉션 — 브랜드 삭제 시 함께 삭제
      const contractsSnap = await getDocs(collection(db, 'brands', brandId, 'contracts'));
      await Promise.all(contractsSnap.docs.map(d => deleteDoc(d.ref)));
      await deleteDoc(doc(db, 'brands', brandId));
      showToast('브랜드가 삭제되었습니다.', 'success');
      closeModal();

  window.saveContractDocs = async function(brandId, contractId) {
    const btn = document.getElementById('btn-upload-docs');
    if (btn) { btn.disabled = true; btn.textContent = '업로드 중...'; }
    try {
      const brandCode = (await getDoc(doc(db, 'brands', brandId))).data()?.brand_code || brandId;
      const basePrefix = 'brands/' + brandCode + '/contracts/' + contractId + '/';
      const updates = {};

      const idCardFile = (document.getElementById('docs-id-card') || {}).files?.[0];
      const bankBookFile = (document.getElementById('docs-bank-book') || {}).files?.[0];
      const bizRegFile = (document.getElementById('docs-biz-reg') || {}).files?.[0];

      if (idCardFile) {
        const snap = await uploadBytes(ref(storage, basePrefix + 'id_card'), idCardFile);
        updates['settlement_info.id_card_url'] = await getDownloadURL(snap.ref);
      }
      if (bankBookFile) {
        const snap = await uploadBytes(ref(storage, basePrefix + 'bank_book'), bankBookFile);
        updates['settlement_info.bank_book_url'] = await getDownloadURL(snap.ref);
      }
      if (bizRegFile) {
        const snap = await uploadBytes(ref(storage, basePrefix + 'biz_reg'), bizRegFile);
        updates['settlement_info.biz_reg_url'] = await getDownloadURL(snap.ref);
      }

      if (Object.keys(updates).length === 0) { showToast('업로드할 파일을 선택해주세요.', 'error'); return; }

      await updateDoc(doc(db, 'brands', brandId), { ...updates, updated_at: today() });
      await writeActivityLog(brandId, 'contract', contractId, 'updated', null, { docs: Object.keys(updates) });
      showToast('✅ 서류 업로드 완료. 브랜드 정보에 저장되었습니다.', 'success');
      closeModal();
      openBrandDetail(brandId);
    } catch(e) {
      showToast('업로드 실패: ' + e.message, 'error');
      if (btn) { btn.disabled = false; btn.textContent = '업로드'; }
    }
  };

  window.submitSendContract = async function(brandId) {
    const templateSel = document.getElementById('sc-template');
    const nameEl = document.getElementById('sc-name');
    const contactEl = document.getElementById('sc-contact');
    const methodEl = document.querySelector('input[name="sc-method"]:checked');
    const testMode = (document.getElementById('sc-testmode') || {}).checked || false;
    const senderName = ((document.getElementById('sc-sender-name') || {}).value || '').trim();
    const senderEmail = ((document.getElementById('sc-sender-email') || {}).value || '').trim();

    const templateDocId = templateSel ? templateSel.value : '';
    const templateName = templateSel ? (templateSel.options[templateSel.selectedIndex] || {}).text : '';
    const participantName = (nameEl ? nameEl.value : '').trim();
    const signingMethod = methodEl ? methodEl.value : 'kakao';
    const contactInfo = (contactEl ? contactEl.value : '').trim();

    if (!templateDocId) { showToast('계약서 템플릿을 선택해주세요.', 'error'); return; }
    if (!senderName) { showToast('발신인 이름을 입력해주세요.', 'error'); return; }
    if (!senderEmail) { showToast('발신인 이메일을 입력해주세요.', 'error'); return; }
    if (!participantName) { showToast('수신인 이름을 입력해주세요.', 'error'); return; }
    if (!contactInfo) { showToast(signingMethod === 'kakao' ? '전화번호를 입력해주세요.' : '이메일을 입력해주세요.', 'error'); return; }

    // 동적 필드 수집
    let fields = {};
    try {
      const opt = templateSel ? templateSel.options[templateSel.selectedIndex] : null;
      const defaultFields = JSON.parse(opt ? (opt.getAttribute('data-fields') || '{}') : '{}');
      Object.keys(defaultFields).forEach(k => {
        const el = document.getElementById('sc-field-' + k);
        if (el) fields[k] = el.value;
      });
    } catch(e) { fields = {}; }

    // 계약 기간 필드 수집
    const periodType = (document.querySelector('input[name="sc-period-type"]:checked') || {}).value || 'months';
    const periodMonths = periodType === 'months' ? (parseInt(((document.getElementById('sc-period-months') || {}).value || '12')) || 12) : null;
    const periodEndAt = periodType === 'date' ? (((document.getElementById('sc-period-date') || {}).value || '') || null) : null;
    const autoRenew = (document.getElementById('sc-auto-renew') || {}).checked || false;

    // Firestore에 contract 문서 먼저 생성 (version 자동 증가)
    let contractId;
    try {
      const existingSnap = await getDocs(collection(db, 'brands', brandId, 'contracts'));
      const version = existingSnap.size + 1;
      const contractDocData = {
        version,
        template_doc_id: templateDocId,
        template_name: templateName,
        participant_name: participantName,
        signing_method: signingMethod,
        signing_contact: contactInfo,
        fields,
        status: '발송대기',
        test_mode: testMode,
        auto_renew: autoRenew,
        created_at: today(),
        updated_at: today(),
      };
      if (periodMonths !== null) contractDocData.period_months = periodMonths;
      if (periodEndAt !== null) contractDocData.end_at = periodEndAt;
      const contractRef = await addDoc(collection(db, 'brands', brandId, 'contracts'), contractDocData);
      contractId = contractRef.id;
    } catch(e) {
      showToast('계약 문서 생성 실패: ' + e.message, 'error'); return;
    }

    // functions 콜러블 호출
    try {
      const sendContractCallable = httpsCallable(fns, 'sendContractCallable');
      const result = await sendContractCallable({
        brandId,
        contractId,
        contractTemplateDocId: templateDocId,
        senderName,
        senderEmail,
        participantName,
        signingMethodType: signingMethod,
        signingContactInfo: contactInfo,
        fields,
        testMode,
      });
      showToast('✅ 전자계약 발송 완료. 서명자에게 ' + (signingMethod === 'kakao' ? '카카오톡' : '이메일') + '이 발송됩니다.');
      closeModal();
      openBrandDetail(brandId);
    } catch(e) {
      // functions 미연결 또는 오류 시 — 생성된 contract 문서는 유지 (이력 보존)
      const isUnimplemented = e.code === 'functions/unimplemented' || e.code === 'functions/not-found' || e.message.includes('NOT_FOUND');
      if (isUnimplemented) {
        showToast('⚠️ 발송 함수를 찾을 수 없습니다. Firebase Functions 배포 상태를 확인해주세요. 계약 문서는 저장됐습니다.', 'error');
      } else {
        // 발송 실패 시 contract 문서 status를 '발송실패'로 업데이트
        try { await updateDoc(doc(db, 'brands', brandId, 'contracts', contractId), { status: '발송실패', updated_at: today() }); } catch(_) {}
        showToast('발송 실패: ' + e.message, 'error');
      }
      closeModal();
      openBrandDetail(brandId);
    }
  };

  window.saveContract = async function(brandId, contractId, existingFileUrl) {
    const btn = document.getElementById('btn-save-contract');
    if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }

    const version = parseInt(document.getElementById('contract-version').value) || 1;
    const signed_at = document.getElementById('contract-signed-at').value || '';
    const end_at = document.getElementById('contract-end-at').value || '';
    const auto_renew = document.getElementById('contract-auto-renew').checked;
    const fileInput = document.getElementById('contract-file-input');
    const file = fileInput && fileInput.files[0];

    try {
      let file_url = existingFileUrl || '';
      if (file) {
        const path = 'contracts/' + brandId + '/' + today() + '_v' + version + '_' + file.name.replace(/[^a-zA-Z0-9._-]/g, '_');
        const snap = await uploadBytes(ref(storage, path), file);
        file_url = await getDownloadURL(snap.ref);
      }

      const data = { version, signed_at, end_at, auto_renew, file_url, status: contractId ? undefined : '진행중', updated_at: today() };
      if (!contractId) { data.status = '진행중'; data.created_at = today(); }

      let savedContractId = contractId;
      if (contractId) {
        const updateData = { version, signed_at, end_at, auto_renew, file_url, updated_at: today() };
        await updateDoc(doc(db, 'brands', brandId, 'contracts', contractId), updateData);
      } else {
        const newRef = await addDoc(collection(db, 'brands', brandId, 'contracts'), { version, signed_at, end_at, auto_renew, file_url, status: '진행중', created_at: today(), updated_at: today() });
        savedContractId = newRef.id;
      }

      await writeActivityLog(brandId, 'contract', savedContractId || 'new', contractId ? 'updated' : 'created', null, { version, signed_at, end_at });

      // brands doc에 contract_expires_at / active_contract_id / contract_auto_renew 동기화
      if (end_at || savedContractId) {
        const brandSyncData = { updated_at: today() };
        if (end_at) brandSyncData.contract_expires_at = end_at;
        if (savedContractId) brandSyncData.active_contract_id = savedContractId;
        brandSyncData.contract_auto_renew = auto_renew;
        try { await updateDoc(doc(db, 'brands', brandId), brandSyncData); } catch(e2) {}
      }

      // 새 계약 추가 시 브랜드가 '미계약' 상태이면 '계약완료'로 자동 전환
      if (!contractId) {
        try {
          const bsnap = await getDoc(doc(db, 'brands', brandId));
          if (bsnap.exists() && (bsnap.data().onboarding_status === '미계약' || !bsnap.data().onboarding_status)) {
            await updateDoc(doc(db, 'brands', brandId), {
              onboarding_status: '계약완료',
              onboarding_status_changed_at: today(),
              contract_completed_at: today(),
              updated_at: today()
            });
          }
        } catch(e2) {}
      }

      showToast(contractId ? '계약을 수정했습니다.' : '계약을 추가했습니다.');
      openBrandDetail(brandId);
    } catch(e) {
      if (btn) { btn.disabled = false; btn.textContent = contractId ? '저장' : '추가'; }
      showToast('저장 실패: ' + e.message, 'error');
    }
  };

  // 공급가 + 수수료율 → 정가 자동 계산
  window.calcRetailFromSupply = function() {
    const supply = parseFloat((document.getElementById('approval-supply-price') || {}).value) || 0;
    const rate = parseFloat((document.getElementById('approval-commission-rate') || {}).value) || 0;
    const retailEl = document.getElementById('approval-retail-price');
    if (!retailEl) return;
    if (supply > 0 && rate >= 0 && rate < 100) {
      retailEl.value = Math.ceil(supply / (1 - rate / 100) / 100) * 100;
    }
  };

  // 정가 + 수수료율 → 공급가 자동 계산
  window.calcSupplyFromRetail = function() {
    const retail = parseFloat((document.getElementById('approval-retail-price') || {}).value) || 0;
    const rate = parseFloat((document.getElementById('approval-commission-rate') || {}).value) || 0;
    const supplyEl = document.getElementById('approval-supply-price');
    if (!supplyEl) return;

  window.saveOnboardingStatus = async function(brandId) {
    const status = document.getElementById('onboarding-status').value;
    const reason = (document.getElementById('onboarding-reason').value || '').trim();
    const updateData = {
      onboarding_status: status || null,
      onboarding_status_reason: reason || '',
      onboarding_status_changed_at: today(),
      updated_at: today()
    };

    // 승인 시 브랜드코드·거래유형·수수료 함께 저장
    if (status === '승인') {
      const brandCode = ((document.getElementById('approval-brand-code') || {}).value || '').trim().toUpperCase();
      const brandType = (document.getElementById('approval-brand-type') || {}).value;
      const commissionRate = parseFloat((document.getElementById('approval-commission') || {}).value) || 15;
      if (!brandCode) { showToast('브랜드코드를 입력해주세요.', 'error'); return; }
      if (!/^[A-Z0-9]{2,10}$/.test(brandCode)) { showToast('브랜드코드는 영문 대문자·숫자 2~10자만 가능합니다.', 'error'); return; }
      // 중복 확인 (기존 코드와 다를 때만)
      if (existingBrand.brand_code !== brandCode) {
        const dup = await getDocs(query(collection(db, 'brands'), where('brand_code', '==', brandCode)));
        if (!dup.empty) { showToast('이미 사용 중인 브랜드코드입니다: ' + brandCode, 'error'); return; }
      }
      updateData.brand_code = brandCode;
      updateData.brand_type = brandType;
      updateData.fee_info = brandType === '위탁' ? { commission_rate: commissionRate } : {};
      updateData.approved_at = today();
    }
    if (status === '계약완료') {
      updateData.contract_completed_at = today();
    }

    try {
      await updateDoc(doc(db, 'brands', brandId), updateData);
      await writeActivityLog(brandId, 'admin_action', brandId, 'status_changed', null,
        { onboarding_status: status, reason, ...(status === '승인' ? { brand_code: updateData.brand_code, brand_type: updateData.brand_type } : {}) });
      showToast('입점 상태를 변경했습니다.');
      openBrandDetail(brandId);
    } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }

    const updateData = { updated_at: today() };

      updateData.approval_status = document.getElementById('bulk-approval-select').value;
    }
    if (chkRejection && chkRejection.checked) {
      updateData.rejection_reason = (document.getElementById('bulk-rejection-reason').value || '').trim();
    }
    if (Object.keys(updateData).length <= 1) { showToast('변경할 항목을 하나 이상 선택하세요.', 'error'); return; }
    try {
      await Promise.all(ids.map(id => updateDoc(doc(db, 'products', id), updateData)));
      showToast(ids.length + '개 상품 일괄 변경 완료.');
      window._productSelected = new Set();
      closeModal();
      navigate('product-list');
    } catch(e) { showToast('변경 실패: ' + e.message, 'error'); }
  };

  /* ── 파일 업로드 UI ── */
  function fileUploadArea(areaId, previewId, inputId, existingUrl) {
    const existing = existingUrl
      ? '<div class="file-preview"><img src="' + esc(existingUrl) + '" /><div><div class="file-preview-name">기존 파일</div><div class="file-preview-size">변경하려면 클릭</div></div></div>'
      : '<div class="file-upload-label"><strong>클릭</strong>해서 이미지 선택<br><span style="font-size:11px;color:var(--gray-400);">JPG, PNG, PDF</span></div>';
    return '<div class="file-upload-area" id="' + areaId + '" onclick="document.getElementById(\'' + inputId + '\').click()">' +
      '<div id="' + previewId + '">' + existing + '</div>' +
      '<input type="file" id="' + inputId + '" accept="image/*,.pdf" style="display:none;" />' +
      '</div>';
  }

  function setupFileUpload(areaId, previewId, inputId) {
    const input = document.getElementById(inputId);
    if (!input) return;
    input.addEventListener('change', function() {
      const file = this.files[0];
      if (!file) return;
      const area = document.getElementById(areaId);
      const preview = document.getElementById(previewId);
      area.classList.add('has-file');
      const sizeMB = (file.size / 1024 / 1024).toFixed(1);
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = e => {
          preview.innerHTML = '<div class="file-preview"><img src="' + e.target.result + '" /><div><div class="file-preview-name">' + esc(file.name) + '</div><div class="file-preview-size">' + sizeMB + ' MB</div></div></div>';
        };
        reader.readAsDataURL(file);
      } else {
        preview.innerHTML = '<div class="file-preview"><div style="font-size:28px;">📄</div><div><div class="file-preview-name">' + esc(file.name) + '</div><div class="file-preview-size">' + sizeMB + ' MB</div></div></div>';
      }
    });
  }

        '<select id="pl-approval-filter" onchange="window._productPage=1;filterProductList()" style="border:1px solid var(--gray-200);border-radius:8px;padding:8px 10px;font-size:13px;background:#fff;">' +

  window.toggleAllProducts = function(checked) {
    const filtered = window._productFiltered || [];
    const ps = window._productPageSize || 20;
    const pg = window._productPage || 1;
    const pageItems = filtered.slice((pg-1)*ps, pg*ps);
    pageItems.forEach(p => {
      if (checked) window._productSelected.add(p.id);
      else window._productSelected.delete(p.id);
      const cb = document.getElementById('pl-chk-' + p.id);
      if (cb) cb.checked = checked;
    });
    updateProductExportBtn();
  };

  window.toggleProductSelect = function(id, checked) {
    if (checked) window._productSelected.add(id);
    else window._productSelected.delete(id);
    const allChk = document.getElementById('pl-chk-all');
    if (allChk) {
      const filtered = window._productFiltered || [];
      const ps = window._productPageSize || 20;
      const pg = window._productPage || 1;
      const pageItems = filtered.slice((pg-1)*ps, pg*ps);
      allChk.checked = pageItems.length > 0 && pageItems.every(p => window._productSelected.has(p.id));
    }
    updateProductExportBtn();
  };

  function updateProductExportBtn() {
    const area = document.getElementById('pl-bulk-actions');
    if (!area) return;
    const cnt = (window._productSelected || new Set()).size;
    if (cnt === 0) { area.innerHTML = ''; return; }
    area.innerHTML =
      '<button class="btn btn-secondary" onclick="bulkChangeProductStatus()" style="white-space:nowrap;">🔄 일괄 변경 (' + cnt + '개)</button>' +
      '<button class="btn btn-secondary" onclick="exportSelectedProducts()" style="white-space:nowrap;">📥 내보내기 (' + cnt + '개)</button>' +
      '<button class="btn btn-secondary" onclick="bulkDeleteProducts()" style="white-space:nowrap;color:var(--red);border-color:var(--red);">🗑 선택 삭제 (' + cnt + '개)</button>';
  }

  window.filterProductList = function() {
    const term = ((document.getElementById('pl-search') || {}).value || '').trim().toLowerCase();
    const approvalFilter = ((document.getElementById('pl-approval-filter') || {}).value || '');
    const filtered = (window._allProducts || []).filter(function(p) {
      const matchTerm = !term ||
        (p.product_name || '').toLowerCase().includes(term) ||
        (p.id || '').toLowerCase().includes(term) ||
        (p.brand_code || '').toLowerCase().includes(term);
      const matchApproval = !approvalFilter || p.approval_status === approvalFilter;
      return matchTerm && matchApproval;
    });
    window._productFiltered = filtered;

    const ps = window._productPageSize || 20;
    const pg = window._productPage || 1;
    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / ps));
    if (window._productPage > totalPages) window._productPage = totalPages;
    const pageItems = filtered.slice((pg-1)*ps, pg*ps);

    const trackingLabel = { quantity: '<span class="badge badge-blue">수량</span>', individual: '<span class="badge badge-yellow">개체</span>' };
    const approvalLabel = {
      '승인대기': '<span class="badge badge-yellow">승인대기</span>',
      '승인': '<span class="badge badge-green">승인</span>',
      '거절': '<span class="badge badge-red">거절</span>',
      '판매중지': '<span class="badge badge-gray">판매중지</span>'
    };

    const tbody = document.getElementById('pl-tbody');
    const countEl = document.getElementById('pl-count');
    const paginEl = document.getElementById('pl-pagination');
    if (!tbody) return;

    if (pageItems.length === 0) {
      tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;color:var(--gray-400);padding:32px;">검색 결과가 없습니다.</td></tr>';
    } else {
      tbody.innerHTML = pageItems.map(p => {
        const thumb = p.image_url
          ? '<img src="' + esc(p.image_url) + '" style="width:72px;height:72px;object-fit:cover;border-radius:8px;border:1px solid var(--gray-200);" />'
          : '<div style="width:72px;height:72px;border-radius:8px;background:var(--gray-100);display:flex;align-items:center;justify-content:center;font-size:22px;">📦</div>';
        const checked = (window._productSelected || new Set()).has(p.id) ? ' checked' : '';
        return '<tr style="cursor:pointer;" onclick="openProductDetail(\'' + p.id + '\')">' +
        '<td style="padding-left:16px;" onclick="event.stopPropagation()"><input type="checkbox" id="pl-chk-' + p.id + '"' + checked + ' onchange="toggleProductSelect(\'' + p.id + '\',this.checked)" style="cursor:pointer;accent-color:var(--blue);" /></td>' +
        '<td style="padding:8px;">' + thumb + '</td>' +
        '<td class="td-code">' + esc(p.id) + '</td>' +
        '<td style="font-weight:600;">' + esc(p.product_name) + '</td>' +
        '<td>' + esc(p.brand_code) + '</td>' +
        '<td>' + (trackingLabel[p.tracking_type] || p.tracking_type) + '</td>' +
        '<td>' + (p.base_price || 0).toLocaleString() + '원</td>' +
        '<td>' + (approvalLabel[p.approval_status] || '<span class="badge badge-gray">미설정</span>') + '</td>' +
        '<td style="color:var(--gray-400);font-size:12px;">' + (p.created_at ? p.created_at.slice(0,10) : '-') + '</td>' +
        '</tr>';
      }).join('');
    }

    const allChk = document.getElementById('pl-chk-all');
    if (allChk) allChk.checked = pageItems.length > 0 && pageItems.every(p => (window._productSelected||new Set()).has(p.id));

    if (countEl) countEl.innerHTML = '총 <strong>' + (window._allProducts || []).length + '</strong>개 중 <strong>' + total + '</strong>개 · 선택 <strong>' + (window._productSelected||new Set()).size + '</strong>개';

    if (paginEl) {
      if (totalPages <= 1) { paginEl.innerHTML = ''; }
      else {
        paginEl.innerHTML =
          '<div style="display:flex;align-items:center;gap:6px;font-size:13px;">' +
          '<button onclick="window._productPage=Math.max(1,window._productPage-1);filterProductList()" style="padding:4px 10px;border:1px solid var(--gray-200);border-radius:6px;background:#fff;cursor:pointer;"' + (pg<=1?' disabled':'') + '>이전</button>' +
          '<span style="color:var(--gray-500);">' + pg + ' / ' + totalPages + '</span>' +
          '<button onclick="window._productPage=Math.min(' + totalPages + ',window._productPage+1);filterProductList()" style="padding:4px 10px;border:1px solid var(--gray-200);border-radius:6px;background:#fff;cursor:pointer;"' + (pg>=totalPages?' disabled':'') + '>다음</button>' +
          '</div>';
      }
    }

    updateProductExportBtn();
  };

  /* ════════════════════════════════
     상품 상세 (모달)
  ════════════════════════════════ */
  window.openProductDetail = async function(productId) {
    showModal('상품 상세', '<div class="spinner" style="margin:40px auto;"></div>', null, 'lg');
    try {
      const [productSnap, skusSnap] = await Promise.all([
        getDoc(doc(db, 'products', productId)),
        getDocs(collection(db, 'products', productId, 'skus'))
      ]);
      if (!productSnap.exists()) { closeModal(); showToast('상품을 찾을 수 없습니다.', 'error'); return; }
      const p = productSnap.data();
      const skus = skusSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      skus.sort((a, b) => (a.option_sort_order ?? 99) - (b.option_sort_order ?? 99));

      const skuRows = skus.map(s => {
        const optLabel = s.option_number === '00' ? '옵션 없음'
          : [1,2,3].map(i => s['option_' + i + '_name'] ? s['option_' + i + '_name'] + ': ' + s['option_' + i + '_value'] : '').filter(Boolean).join(' / ');
        const skuThumb = s.image_url
          ? '<img src="' + esc(s.image_url) + '" style="width:32px;height:32px;object-fit:cover;border-radius:4px;border:1px solid var(--gray-200);cursor:pointer;" onclick="uploadSkuImage(\'' + productId + '\',\'' + s.id + '\')" title="클릭하면 사진 변경" />'
          : '<button onclick="uploadSkuImage(\'' + productId + '\',\'' + s.id + '\')" style="width:32px;height:32px;border:1px dashed var(--gray-300);border-radius:4px;background:var(--gray-50);cursor:pointer;font-size:14px;" title="사진 추가">📷</button>';
        return '<tr>' +
          '<td style="padding:6px 8px;">' + skuThumb + '</td>' +
          '<td class="td-code" style="font-size:12px;">' + esc(s.barcode_value) + '</td>' +
          '<td style="font-size:13px;">' + esc(optLabel) + '</td>' +
          '<td>' + (s.price || p.base_price || 0).toLocaleString() + '원</td>' +
          '<td><span class="badge ' + (s.sku_status === '판매중' ? 'badge-green' : 'badge-gray') + '">' + esc(s.sku_status) + '</span></td>' +
          (p.tracking_type === 'individual' ? '<td><button class="btn btn-secondary" style="padding:4px 10px;font-size:11px;" onclick="openUnitList(\'' + productId + '\',\'' + s.id + '\')">개체 보기</button></td>' : '') +
          '</tr>';
      }).join('');

      const mainImgHTML = p.image_url
        ? '<img src="' + esc(p.image_url) + '" style="width:144px;height:144px;object-fit:cover;border-radius:10px;border:1px solid var(--gray-200);margin-right:16px;flex-shrink:0;" />'
        : '';

      const approvalBadge = s => ({
        '승인대기': '<span class="badge badge-yellow">승인대기</span>',
        '승인': '<span class="badge badge-green">승인</span>',
        '거절': '<span class="badge badge-red">거절</span>',
        '판매중지': '<span class="badge badge-gray">판매중지</span>'
      }[s] || '<span class="badge badge-gray">미설정</span>');

      const approvalRow = p.approval_status
        ? row('승인 상태', approvalBadge(p.approval_status) +
            (p.rejection_reason ? ' <span style="font-size:12px;color:var(--gray-500);">— ' + esc(p.rejection_reason) + '</span>' : '') +
            ' <button class="btn btn-secondary" style="font-size:11px;padding:3px 10px;margin-left:8px;" onclick="openApprovalModal(\'' + productId + '\',\'' + esc(p.approval_status) + '\')">심사</button>')
        : row('승인 상태', '<span class="badge badge-gray">미설정</span>' +
            ' <button class="btn btn-secondary" style="font-size:11px;padding:3px 10px;margin-left:8px;" onclick="openApprovalModal(\'' + productId + '\',\'\')">심사</button>');

      const body =
        '<div style="display:flex;align-items:flex-start;margin-bottom:20px;">' +
        mainImgHTML +
        '<div style="flex:1;background:var(--gray-50);border-radius:10px;padding:16px;">' +
        '<div style="display:grid;grid-template-columns:auto 1fr;gap:6px 16px;font-size:13px;">' +
        row('상품 ID', '<span style="font-family:monospace;font-weight:700;color:var(--blue);">' + esc(productId) + '</span>') +
        row('상품명', '<strong>' + esc(p.product_name) + '</strong>') +
        row('브랜드', esc(p.brand_code)) +
        approvalRow +
        (p.supply_price ? row('공급가격', (p.supply_price).toLocaleString() + '원') : '') +
        (p.commission_rate !== undefined ? row('중개수수료율', p.commission_rate + '%') : '') +
        (p.retail_price_auto ? row('정가(자동산정)', (p.retail_price_auto).toLocaleString() + '원') : '') +
        row('판매가격', (p.base_price || 0).toLocaleString() + '원') +
        row('관리방식', p.tracking_type === 'quantity' ? '수량 관리' : '개체 관리') +
        (p.memo ? row('메모', esc(p.memo)) : '') +
        '</div></div></div>' +
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">' +
        '<div style="font-size:13px;font-weight:700;">SKU / 옵션 (' + skus.length + '개)</div>' +
        '<div style="font-size:12px;color:var(--gray-400);">📷 아이콘 클릭 → 옵션별 사진 추가/변경</div>' +
        '</div>' +
        '<div class="table-wrap"><table>' +
        '<thead><tr><th style="width:40px;"></th><th>바코드</th><th>옵션</th><th>판매가</th><th>상태</th>' +
        (p.tracking_type === 'individual' ? '<th></th>' : '') + '</tr></thead>' +
        '<tbody>' + skuRows + '</tbody></table></div>' +
        '<input type="file" id="sku-img-input" accept="image/*" style="display:none;" />';

      body += '<div style="margin-top:16px;padding-top:12px;border-top:1px solid var(--gray-100);display:flex;align-items:center;gap:16px;">' +
        renderDocId(productId, '상품') +
        '<span style="font-size:11px;color:var(--gray-300);">등록일 ' + esc(p.created_at || '-') + '</span>' +
        '</div>';

      const footerHTML =
        '<button class="btn btn-secondary" onclick="closeModal()">닫기</button>' +
        '<button class="btn btn-secondary" style="color:var(--red);border-color:var(--red);" onclick="confirmProductDelete(\'' + productId + '\',\'' + esc(p.product_name) + '\')">🗑 삭제</button>' +
        '<button class="btn btn-secondary" onclick="openProductEdit(\'' + productId + '\')">✏️ 수정</button>' +
        '<button class="btn btn-danger" onclick="toggleProductStatus(\'' + productId + '\',\'' + p.status + '\')">' +
        (p.status === '판매중' ? '판매중지' : '판매 재개') + '</button>';

      showModal('상품 상세 — ' + esc(p.product_name), body, footerHTML, 'lg');

      /* SKU 이미지 업로드 핸들러 */
      window.uploadSkuImage = function(pid, sid) {
        const input = document.getElementById('sku-img-input');
        if (!input) return;
        input.onchange = async function() {
          const file = this.files[0];
          if (!file) return;
          try {
            const path = 'products/' + pid + '/skus/' + sid + '/img_' + Date.now();
            const snap = await uploadBytes(ref(storage, path), file);
            const url = await getDownloadURL(snap.ref);
            await updateDoc(doc(db, 'products', pid, 'skus', sid), { image_url: url, updated_at: new Date().toISOString() });
            showToast('사진이 저장됐습니다.', 'success');
            await openProductDetail(pid);
          } catch(e) { showToast('사진 업로드 실패: ' + e.message, 'error'); }
        };
        input.value = '';
        input.click();
      };
    } catch(e) {
      document.querySelector('#modal-container .modal-body').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">' + e.message + '</div></div>';
    }
  };

  window.toggleProductStatus = async function(productId, currentStatus) {
    const next = currentStatus === '판매중' ? '판매중지' : '판매중';
    try {
      await updateDoc(doc(db, 'products', productId), { status: next, updated_at: new Date().toISOString() });
      showToast('상태를 ' + next + '으로 변경했습니다.', 'success');
      closeModal();
      await renderProductList(document.getElementById('page-content'));
    } catch(e) { showToast('변경 실패: ' + e.message, 'error'); }
  };

  /* ── 상품 영구 삭제 ── */
  window.confirmProductDelete = function(productId, productName) {
    const risks = [
      '이 상품의 모든 <b>SKU·개체</b>가 함께 삭제됩니다.',
      '삭제된 상품 ID(<b>' + esc(productId) + '</b>)로 발급된 바코드는 조회 불가 상태가 됩니다.',
      '재고·판매 이력에서 이 상품을 참조하는 기록이 깨질 수 있습니다.',

      '<label style="display:flex;align-items:flex-start;gap:8px;font-size:13px;cursor:pointer;">' +

      '<label style="display:flex;align-items:flex-start;gap:8px;font-size:13px;cursor:pointer;">' +

      '</div>';

    showModal('⚠️ 상품 영구 삭제 — ' + esc(productName), bodyHTML, footerHTML);

  window.executeProductDelete = async function(productId, productName) {
    const nameInput = (document.getElementById('del-prod-confirm-name') || {}).value || '';
    const chk1 = document.getElementById('del-prod-chk1');
    const chk2 = document.getElementById('del-prod-chk2');
    const chk3 = document.getElementById('del-prod-chk3');
    if (nameInput !== productName) { showToast('상품명이 일치하지 않습니다.', 'error'); return; }
    if (!chk1 || !chk1.checked || !chk2 || !chk2.checked || !chk3 || !chk3.checked) {
      showToast('모든 확인 항목에 체크해주세요.', 'error'); return;
    }
    if (!confirm('마지막 확인: [' + productName + '] 상품을 영구 삭제합니다.\n이 작업은 되돌릴 수 없습니다.')) return;
    try {
      const skusSnap = await getDocs(collection(db, 'products', productId, 'skus'));
      const delPromises = [];
      for (const skuDoc of skusSnap.docs) {
        const unitsSnap = await getDocs(collection(db, 'products', productId, 'skus', skuDoc.id, 'units'));
        unitsSnap.forEach(u => delPromises.push(deleteDoc(u.ref)));
        delPromises.push(deleteDoc(skuDoc.ref));
      }
      await Promise.all(delPromises);
      await deleteDoc(doc(db, 'products', productId));
      showToast('상품이 삭제되었습니다.', 'success');
      closeModal();
      renderProductList(document.getElementById('page-content'));
    } catch(e) {
      showToast('삭제 실패: ' + esc(e.message), 'error');
    }
  };

  /* ── 상품 수정 ── */
  window.openProductEdit = async function(productId) {
    showModal('상품 수정', '<div class="spinner" style="margin:40px auto;"></div>', null, 'lg');
    try {
      const [pSnap, skusSnap] = await Promise.all([
        getDoc(doc(db, 'products', productId)),
        getDocs(collection(db, 'products', productId, 'skus'))
      ]);
      if (!pSnap.exists()) { showToast('상품을 찾을 수 없습니다.', 'error'); closeModal(); return; }
      const p = pSnap.data();
      const skus = skusSnap.docs.map(d => ({ id: d.id, ...d.data() }))
        .sort((a, b) => (a.option_sort_order ?? 99) - (b.option_sort_order ?? 99));

      const supplyPrice = p.supply_price !== undefined ? p.supply_price : '';
      const commRate = p.commission_rate !== undefined ? p.commission_rate : '';
      const basePrice = p.base_price || 0;

      /* SKU 행 */
      const skuRows = skus.map((s, i) => {
        const optLabel = s.option_number === '00' ? '옵션 없음'
          : [1,2,3].map(j => s['option_' + j + '_name'] ? s['option_' + j + '_name'] + ': ' + s['option_' + j + '_value'] : '').filter(Boolean).join(' / ');
        return '<tr>' +
          '<td style="font-size:11px;font-family:monospace;">' + esc(s.barcode_value) + '</td>' +
          '<td style="font-size:12px;">' + esc(optLabel) + '</td>' +
          '<td><input type="number" min="0" step="100" value="' + (s.price || basePrice) + '" ' +
            'style="width:100px;border:1px solid var(--gray-300);border-radius:6px;padding:4px 7px;font-size:12px;" ' +
            'onchange="window._editSkuPrices[\'' + s.id + '\']=parseInt(this.value)||0" /></td>' +
          '<td style="text-align:center;">' +
            (i > 0 ? '<button onclick="moveEditSku(' + i + ',-1)" style="border:none;background:var(--gray-100);border-radius:4px;padding:2px 6px;cursor:pointer;">↑</button> ' : '') +
            (i < skus.length - 1 ? '<button onclick="moveEditSku(' + i + ',1)" style="border:none;background:var(--gray-100);border-radius:4px;padding:2px 6px;cursor:pointer;">↓</button>' : '') +
          '</td>' +
          '</tr>';
      }).join('');

      window._editSkuPrices = {};
      skus.forEach(s => { window._editSkuPrices[s.id] = s.price || basePrice; });
      window._editSkuOrder = skus.map(s => s.id);
      window._editProductId = productId;
      window._editProductData = p;
      window._editSkus = skus;

      const body =
        '<div style="display:grid;gap:16px;">' +
        '<div style="display:flex;gap:16px;align-items:flex-start;">' +
        '<div style="flex:0 0 auto;">' +
        (p.image_url
          ? '<img id="edit-product-img-preview" src="' + esc(p.image_url) + '" style="width:144px;height:144px;object-fit:cover;border-radius:10px;border:1px solid var(--gray-200);cursor:pointer;" onclick="document.getElementById(\'input-edit-product-img\').click()" title="클릭해서 사진 변경" />'
          : '<div id="edit-product-img-preview" onclick="document.getElementById(\'input-edit-product-img\').click()" style="width:144px;height:144px;border-radius:10px;border:2px dashed var(--gray-300);background:var(--gray-50);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:4px;">' +
            '<span style="font-size:32px;">📷</span><span style="font-size:11px;color:var(--gray-400);">사진 추가</span></div>') +
        '<input type="file" id="input-edit-product-img" accept="image/*" style="display:none;" onchange="(function(f){if(!f)return;var r=new FileReader();r.onload=function(e){var el=document.getElementById(\'edit-product-img-preview\');el.outerHTML=\'<img id=\\\'edit-product-img-preview\\\' src=\\\'\'+e.target.result+\'\\\' style=\\\'width:144px;height:144px;object-fit:cover;border-radius:10px;border:1px solid var(--gray-200);cursor:pointer;\\\' onclick=\\\'document.getElementById(\\\\\\\'input-edit-product-img\\\\\\\').click()\\\' title=\\\'클릭해서 사진 변경\\\' />\';};r.readAsDataURL(f);})(this.files[0])" />' +
        '</div>' +
        '<div style="flex:1;display:grid;gap:12px;">' +
        '<div class="form-group" style="margin:0;"><label class="form-label">상품 ID</label>' +
        '<div style="padding:9px 12px;background:var(--gray-50);border:1px solid var(--gray-200);border-radius:8px;font-family:monospace;font-weight:700;color:var(--blue);">' + esc(productId) + '</div></div>' +
        '<div class="form-group" style="margin:0;"><label class="form-label" for="edit-p-name">상품명 <span class="required">*</span></label>' +
        '<input class="form-input" id="edit-p-name" type="text" value="' + esc(p.product_name) + '" /></div>' +
        '</div></div>' +
        /* 공급가격 + 수수료 + 판매가 */
        '<div class="form-row">' +
        '<div class="form-group"><label class="form-label" for="edit-p-supply">공급가격</label>' +
        '<input class="form-input" id="edit-p-supply" type="number" min="0" step="100" value="' + supplyPrice + '" oninput="calcEditSalePrice()" /></div>' +
        '<div class="form-group"><label class="form-label" for="edit-p-commission">중개수수료 (%)</label>' +
        '<input class="form-input" id="edit-p-commission" type="number" min="0" max="100" step="0.1" value="' + commRate + '" oninput="calcEditSalePrice()" /></div>' +
        '</div>' +
        '<div class="form-group"><label class="form-label">판매가격 <span style="font-size:11px;color:var(--gray-400);font-weight:400;">(자동 계산 또는 직접 입력)</span></label>' +
        '<input class="form-input" id="edit-p-price" type="number" min="0" step="100" value="' + basePrice + '" /></div>' +
        '<div class="form-group"><label class="form-label" for="edit-p-memo">메모</label>' +
        '<input class="form-input" id="edit-p-memo" type="text" value="' + esc(p.memo || '') + '" /></div>' +
        /* SKU 가격 + 순서: 옵션 있는 상품(2개 이상 SKU)만 표시 */
        (skus.length > 1 ?
          '<div style="background:var(--blue-light);border:1px solid #bfdbfe;border-radius:10px;padding:16px;">' +
          '<div style="font-size:13px;font-weight:700;color:var(--blue);margin-bottom:4px;">📋 SKU별 판매가 · 표시 순서</div>' +
          '<div style="font-size:12px;color:var(--gray-500);margin-bottom:12px;">옵션별 가격을 개별 조정하고 목록 표시 순서를 바꿀 수 있습니다.</div>' +
          '<div id="edit-sku-table-wrap" class="table-wrap"><table>' +
          '<thead><tr><th>바코드</th><th>옵션</th><th>판매가</th><th>순서</th></tr></thead>' +
          '<tbody id="edit-sku-tbody">' + skuRows + '</tbody></table></div></div>' : '') +
        '</div>';

      const footerHTML =
        '<button class="btn btn-secondary" onclick="openProductDetail(\'' + productId + '\')">← 돌아가기</button>' +
        '<button class="btn btn-primary" onclick="saveProductEdit()">💾 저장</button>';

      showModal('상품 수정 — ' + esc(p.product_name), body, footerHTML, 'lg');
      calcEditSalePrice();
    } catch(e) {
      document.querySelector('#modal-container .modal-body').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">' + e.message + '</div></div>';
    }
  };

  /* 수정 화면 판매가 역산 */
  window.calcEditSalePrice = function() {
    const supply = parseFloat((document.getElementById('edit-p-supply') || {}).value || '');
    const commission = parseFloat((document.getElementById('edit-p-commission') || {}).value || '');
    if (!isNaN(supply) && !isNaN(commission) && commission < 100) {
      const salePrice = Math.round(supply / (1 - commission / 100));
      const el = document.getElementById('edit-p-price');
      if (el) el.value = salePrice;
    }
  };

  /* SKU 순서 변경 */
  window.moveEditSku = function(i, dir) {
    const j = i + dir;
    const arr = window._editSkus;
    if (j < 0 || j >= arr.length) return;
    const tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    window._editSkuOrder = arr.map(s => s.id);
    const basePrice = parseInt((document.getElementById('edit-p-price') || {}).value || '0') || 0;
    const skuRows = arr.map((s, idx) => {
      const optLabel = s.option_number === '00' ? '옵션 없음'
        : [1,2,3].map(k => s['option_' + k + '_name'] ? s['option_' + k + '_name'] + ': ' + s['option_' + k + '_value'] : '').filter(Boolean).join(' / ');
      return '<tr>' +
        '<td style="font-size:11px;font-family:monospace;">' + esc(s.barcode_value) + '</td>' +
        '<td style="font-size:12px;">' + esc(optLabel) + '</td>' +
        '<td><input type="number" min="0" step="100" value="' + (window._editSkuPrices[s.id] || basePrice) + '" ' +
          'style="width:100px;border:1px solid var(--gray-300);border-radius:6px;padding:4px 7px;font-size:12px;" ' +
          'onchange="window._editSkuPrices[\'' + s.id + '\']=parseInt(this.value)||0" /></td>' +
        '<td style="text-align:center;">' +
          (idx > 0 ? '<button onclick="moveEditSku(' + idx + ',-1)" style="border:none;background:var(--gray-100);border-radius:4px;padding:2px 6px;cursor:pointer;">↑</button> ' : '') +
          (idx < arr.length - 1 ? '<button onclick="moveEditSku(' + idx + ',1)" style="border:none;background:var(--gray-100);border-radius:4px;padding:2px 6px;cursor:pointer;">↓</button>' : '') +
        '</td></tr>';
    }).join('');
    document.getElementById('edit-sku-tbody').innerHTML = skuRows;
  };

  /* 상품 수정 저장 */
  window.saveProductEdit = async function() {
    const productId = window._editProductId;
    if (!productId) return;
    const name = (document.getElementById('edit-p-name').value || '').trim();
    if (!name) { showToast('상품명을 입력해주세요.', 'error'); return; }
    const supplyPrice = parseFloat((document.getElementById('edit-p-supply') || {}).value || '') || undefined;
    const commissionRate = parseFloat((document.getElementById('edit-p-commission') || {}).value || '') || undefined;
    const basePrice = parseInt((document.getElementById('edit-p-price') || {}).value || '0') || 0;
    const memo = (document.getElementById('edit-p-memo').value || '').trim();
    const now = new Date().toISOString();

    try {
      const updates = { product_name: name, base_price: basePrice, memo, updated_at: now };
      if (supplyPrice !== undefined) updates.supply_price = supplyPrice;
      if (commissionRate !== undefined) updates.commission_rate = commissionRate;
      if (supplyPrice !== undefined || commissionRate !== undefined) {
        updates._last_changed_by = (auth.currentUser || {}).uid || '';
      }

      /* 상품 대표 사진 업로드 */
      const imgFile = document.getElementById('input-edit-product-img') && document.getElementById('input-edit-product-img').files[0];
      if (imgFile) {
        try {
          const path = 'products/' + productId + '/main_' + Date.now();
          const snap = await uploadBytes(ref(storage, path), imgFile);
          updates.image_url = await getDownloadURL(snap.ref);
        } catch(imgErr) { console.warn('이미지 업로드 실패:', imgErr); }
      }

      await updateDoc(doc(db, 'products', productId), updates);

      /* SKU 가격 + 순서 일괄 업데이트 */
      await Promise.all(window._editSkus.map(async (s, i) => {
        const skuUpdates = {
          price: window._editSkuPrices[s.id] || basePrice,
          option_sort_order: window._editSkuOrder.indexOf(s.id),
          updated_at: now
        };
        await updateDoc(doc(db, 'products', productId, 'skus', s.id), skuUpdates);
      }));

      showToast('상품이 수정됐습니다.', 'success');
      closeModal();
      await renderProductList(document.getElementById('page-content'));
    } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }
  };

  /* ── 개체 목록 (개체관리 상품) ── */
  window.openUnitList = async function(productId, skuId) {
    showModal('개체 목록', '<div class="spinner" style="margin:40px auto;"></div>', null, 'lg');
    try {
      const [skuSnap, unitsSnap] = await Promise.all([
        getDoc(doc(db, 'products', productId, 'skus', skuId)),
        getDocs(collection(db, 'products', productId, 'skus', skuId, 'units'))
      ]);
      const sku = skuSnap.data();
      const units = unitsSnap.docs.map(d => ({ id: d.id, ...d.data() }));
      units.sort((a, b) => (a.unit_number || '').localeCompare(b.unit_number || ''));

      const statusOpts = ['판매중','판매완료','분실','폐기'];
      const statusColors = { '판매중':'badge-green','판매완료':'badge-blue','분실':'badge-red','폐기':'badge-gray' };

      const unitRows = units.length === 0
        ? '<tr><td colspan="5" style="text-align:center;color:var(--gray-400);padding:24px;">등록된 개체가 없습니다.</td></tr>'
        : units.map(u => {
          const uThumb = u.image_url
            ? '<img src="' + esc(u.image_url) + '" style="width:30px;height:30px;object-fit:cover;border-radius:4px;border:1px solid var(--gray-200);cursor:pointer;" onclick="uploadUnitImage(\'' + productId + '\',\'' + skuId + '\',\'' + u.id + '\')" title="클릭하면 사진 변경" />'
            : '<button onclick="uploadUnitImage(\'' + productId + '\',\'' + skuId + '\',\'' + u.id + '\')" style="width:30px;height:30px;border:1px dashed var(--gray-300);border-radius:4px;background:var(--gray-50);cursor:pointer;font-size:12px;" title="사진 추가">📷</button>';
          return '<tr>' +
          '<td style="padding:6px 8px;">' + uThumb + '</td>' +
          '<td class="td-code" style="font-size:12px;">' + esc(u.barcode_value) + '</td>' +
          '<td style="font-size:13px;color:var(--gray-500);">' + esc(u.unit_number) + '</td>' +
          '<td><span class="badge ' + (statusColors[u.unit_status] || 'badge-gray') + '">' + esc(u.unit_status) + '</span></td>' +
          '<td><select onchange="changeUnitStatus(\'' + productId + '\',\'' + skuId + '\',\'' + u.id + '\',this.value)" ' +
          'style="border:1px solid var(--gray-200);border-radius:6px;padding:4px 6px;font-size:12px;">' +
          statusOpts.map(s => '<option' + (s === u.unit_status ? ' selected' : '') + '>' + s + '</option>').join('') +
          '</select></td>' +
          '</tr>';
        }).join('');

      const body =
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px;">' +
        '<div style="font-size:13px;color:var(--gray-500);">바코드: <code style="color:var(--blue);">' + esc(sku.barcode_value) + '</code></div>' +
        '<div style="display:flex;align-items:center;gap:8px;">' +
        '<span style="font-size:13px;color:var(--gray-500);">추가:</span>' +
        '<input type="number" id="add-unit-count" min="1" max="99" value="1" style="width:60px;border:1px solid var(--gray-300);border-radius:6px;padding:5px 8px;font-size:13px;text-align:center;" />' +
        '<span style="font-size:13px;color:var(--gray-500);">개</span>' +
        '<button class="btn btn-primary" style="padding:6px 14px;font-size:13px;" onclick="addUnitsToSku(\'' + productId + '\',\'' + skuId + '\')">➕ 개체 추가</button>' +
        '</div></div>' +
        '<div class="table-wrap"><table>' +
        '<thead><tr><th style="width:40px;"></th><th>개체 바코드</th><th>개체번호</th><th>상태</th><th>상태 변경</th></tr></thead>' +
        '<tbody>' + unitRows + '</tbody></table></div>' +
        '<input type="file" id="unit-img-input" accept="image/*" style="display:none;" />';

      showModal('개체 목록 — ' + esc(skuId), body, '<button class="btn btn-secondary" onclick="openProductDetail(\'' + productId + '\')">← 상품으로</button>', 'lg');

      window.uploadUnitImage = function(pid, sid, uid) {
        const input = document.getElementById('unit-img-input');
        if (!input) return;
        input.onchange = async function() {
          const file = this.files[0];
          if (!file) return;
          try {
            const path = 'products/' + pid + '/skus/' + sid + '/units/' + uid + '/img_' + Date.now();
            const snap = await uploadBytes(ref(storage, path), file);
            const url = await getDownloadURL(snap.ref);
            await updateDoc(doc(db, 'products', pid, 'skus', sid, 'units', uid), { image_url: url, updated_at: new Date().toISOString() });
            showToast('사진이 저장됐습니다.', 'success');
            await openUnitList(pid, sid);
          } catch(e) { showToast('사진 업로드 실패: ' + e.message, 'error'); }
        };
        input.value = '';
        input.click();
      };
    } catch(e) {
      document.querySelector('#modal-container .modal-body').innerHTML =
        '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div class="empty-state-text">' + e.message + '</div></div>';
    }
  };

  window.changeUnitStatus = async function(productId, skuId, unitId, newStatus) {
    try {
      await updateDoc(doc(db, 'products', productId, 'skus', skuId, 'units', unitId), { unit_status: newStatus, updated_at: new Date().toISOString() });
      showToast('개체 상태를 ' + newStatus + '으로 변경했습니다.', 'success');
    } catch(e) { showToast('변경 실패: ' + e.message, 'error'); }
  };

  /* 개체 추가 (Firestore 트랜잭션) */
  window.addUnitsToSku = async function(productId, skuId) {
    const countEl = document.getElementById('add-unit-count');
    const count = parseInt((countEl || {}).value || '1');
    if (!count || count < 1 || count > 99) { showToast('1~99 사이의 숫자를 입력해주세요.', 'error'); return; }

    const btn = document.querySelector('button[onclick="addUnitsToSku(\'' + productId + '\',\'' + skuId + '\')"]');
    if (btn) { btn.disabled = true; btn.textContent = '추가 중...'; }

    try {
      const skuRef = doc(db, 'products', productId, 'skus', skuId);
      let newUnits = [];

      await runTransaction(db, async (tx) => {
        const skuSnap = await tx.get(skuRef);
        if (!skuSnap.exists()) throw new Error('SKU를 찾을 수 없습니다.');
        const skuData = skuSnap.data();
        const lastNum = parseInt(skuData.last_unit_number || '000', 10);
        const now = new Date().toISOString();
        newUnits = [];

        for (let i = 1; i <= count; i++) {
          const unitNum = String(lastNum + i).padStart(3, '0');
          const unitId = skuId + '-' + unitNum;
          const barcodeValue = skuData.barcode_value + '-' + unitNum;
          newUnits.push({ id: unitId, unit_number: unitNum, barcode_value: barcodeValue });
          tx.set(doc(db, 'products', productId, 'skus', skuId, 'units', unitId), {
            unit_number: unitNum,
            barcode_value: barcodeValue,
            unit_price: 0,
            unit_status: '판매중',
            memo: '',
            barcode_printed_at: null,
            created_at: now,
            updated_at: now
          });
        }
        tx.update(skuRef, { last_unit_number: String(lastNum + count).padStart(3, '0'), updated_at: now });
      });

      showToast(count + '개 개체가 추가됐습니다.', 'success');
      /* 목록 새로고침 */
      await openUnitList(productId, skuId);
    } catch(e) {
      showToast('추가 실패: ' + e.message, 'error');
      if (btn) { btn.disabled = false; btn.textContent = '➕ 개체 추가'; }
    }
  };
