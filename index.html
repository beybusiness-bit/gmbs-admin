  window.submitAppDecision = async function(docId, type) {
    const decision = window._appDecision;
    if (!decision) { showToast('처리 결정을 선택해주세요.', 'error'); return; }
    const reason = ((document.getElementById('app-reason') || {}).value || '').trim();
    const item = window._pendingAppItem;
    if (!item || item.id !== docId) { showToast('데이터 오류', 'error'); return; }
    if (decision === '승인') {
      await window.approveApplication(docId, type, reason);
    } else {
      await window.rejectApplication(docId, type,
        item.applicant_email, item.applicant_name,
        item.applicant_contact_email || '', item._brandNameDisplay || '', reason);
    }
  };

  window.checkAppBrandCode = async function() {
    const input = document.getElementById('app-brand-code');
    const msg = document.getElementById('app-brand-code-msg');
    if (!input || !msg) return;
    const code = input.value.trim().toUpperCase();
    if (!code) { msg.innerHTML = ''; return; }
    if (!/^[A-Z0-9]{2,10}$/.test(code)) {
      msg.innerHTML = '<span style="color:var(--red);">영문 대문자·숫자 2~10자만 입력 가능합니다.</span>';
      return;
    }
    msg.innerHTML = '<span style="color:var(--gray-400);">확인 중...</span>';
    try {
      const dup = await getDocs(query(collection(db, 'brands'), where('brand_code', '==', code)));
      if (dup.empty) {
        msg.innerHTML = '<span style="color:var(--green);">✅ 사용 가능한 코드입니다.</span>';
      } else {
        msg.innerHTML = '<span style="color:var(--red);">⚠️ 이미 사용 중인 코드입니다.</span>';
      }
    } catch(e) {
      msg.innerHTML = '<span style="color:var(--red);">확인 실패: ' + esc(e.message) + '</span>';
    }
  };

  window.approveApplication = async function(docId, type, _reason) {
    const item = window._pendingAppItem;
    if (!item || item.id !== docId) { showToast('데이터 오류', 'error'); return; }
    const isJoin = type === 'join';
    const auth = getAuth();
    const reviewerEmail = auth.currentUser ? auth.currentUser.email : '';
    const approvalReason = _reason !== undefined ? _reason : ((document.getElementById('app-reason') || {}).value || '').trim();

    try {
      if (isJoin) {
        // 합류 신청 승인
        const brandId = item.target_brand_id;
        const joinPersonData = {
          brand_id: brandId,
          name: item.applicant_name || '',
          phone: item.applicant_phone || '',
          role: item.applicant_role || '',
          contact_email: item.applicant_contact_email || '',
          login_google_email: (item.applicant_email || '').toLowerCase(),
          active: true,
          created_at: today(), updated_at: today()
        };
        const personRef = await addDoc(collection(db, 'persons'), joinPersonData);
        const personId = personRef.id;
        // vendor 포털이 읽는 서브컬렉션에도 동일 데이터 기록
        await setDoc(doc(db, 'brands', brandId, 'persons', personId), joinPersonData);

        await setDoc(doc(db, 'vendor_accounts', item.applicant_email), {
          uid: item.applicant_uid || null,
          brand_id: brandId, person_id: personId,
          status: '연결됨', created_at: today(), linked_at: today()
        });

        if (item.applicant_uid) {
          await setDoc(doc(db, 'users', item.applicant_uid), {
            member_status: '브랜드회원',
            brand_id: brandId, person_id: personId,
            updated_at: today()
          }, { merge: true });
        }

        await updateDoc(doc(db, 'brand_join_requests', docId), {
          status: '승인', reviewed_at: today(), reviewer_email: reviewerEmail,
          approval_reason: approvalReason
        });

        let brandName = item._brandNameDisplay || brandId;
        await sendEmailByTrigger('brand_approved', {
          toEmail: item.applicant_contact_email || item.applicant_email,
          toName: item.applicant_name,
          brandName: brandName,
          reason: approvalReason
        });

      } else {
        // 신규 브랜드 등록 신청 승인 — brand_applications 데이터를 brands로 복사
        // vendor가 신청 폼에서 brand_type을 제거했으므로 admin 확정 폼에서 읽음
        const adminBrandCode = ((document.getElementById('app-brand-code') || {}).value || '').trim().toUpperCase();
        const adminBrandType = ((document.getElementById('app-brand-type') || {}).value) || item.brand_type || '위탁';
        const adminCommission = parseFloat(((document.getElementById('app-commission') || {}).value) || '') || item.requested_commission_rate || 15;
        if (!adminBrandCode) { showToast('브랜드코드를 입력해주세요.', 'error'); return; }
        if (!/^[A-Z0-9]{2,10}$/.test(adminBrandCode)) { showToast('브랜드코드는 영문 대문자·숫자 2~10자만 가능합니다.', 'error'); return; }
        const dupCheck = await getDocs(query(collection(db, 'brands'), where('brand_code', '==', adminBrandCode)));
        if (!dupCheck.empty) { showToast('이미 사용 중인 브랜드코드입니다: ' + adminBrandCode, 'error'); return; }
        const brandRef = await addDoc(collection(db, 'brands'), {
          brand_name: item.brand_name || item.applicant_name + '의 브랜드',
          brand_code: adminBrandCode,
          brand_type: adminBrandType,
          brand_desc: item.brand_description || '',
          website_urls: item.website_urls || [],
          settlement_info: item.settlement_info || {},
          fee_info: adminBrandType === '위탁' ? { commission_rate: adminCommission } : {},
          onboarding_status: '계약 정보 입력 필요',
          ...(item.brand_photo_url ? { logo_url: item.brand_photo_url, brand_photo_url: item.brand_photo_url } : {}),

  window.copyEmailVar = function(v) {
    var ae = document.activeElement;
    if (ae && (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA') && !ae.readOnly && !ae.disabled) {
      var start = ae.selectionStart;
      var end = ae.selectionEnd;
      var val = ae.value;
      ae.value = val.slice(0, start) + v + val.slice(end);
      ae.selectionStart = ae.selectionEnd = start + v.length;
      ae.dispatchEvent(new Event('input', { bubbles: true }));
      showToast(v + ' 삽입됨', 'success');
    } else {
      navigator.clipboard.writeText(v).then(function() {
        showToast(v + ' 복사됨', 'success');
      }).catch(function() {
        showToast('복사 실패 — 직접 선택 후 복사하세요', 'error');
      });
    }
  };

    var thb = document.getElementById('ejs-global-thumb');

  window.saveAllEmailSettings = async function() {
    var btn = event && event.target;
    if (btn) { btn.disabled = true; btn.textContent = '저장 중...'; }
    try {
      const batch = writeBatch(db);
      EMAIL_TRIGGERS.forEach(function(t) {
        var chkEl = document.getElementById('chk-' + t.id);
        var tplEl = document.getElementById('tpl-' + t.id);
        var subjEl = document.getElementById('tpl-subj-' + t.id);
        var bodyEl = document.getElementById('tpl-body-' + t.id);
        var templateId = tplEl ? tplEl.value.trim() : '';
        var enabled = !!(chkEl && chkEl.checked && templateId);
        batch.set(doc(db, 'email_configs', t.id), {
          trigger_event: t.id,
          template_id: templateId,
          enabled: enabled,
          tpl_subject: subjEl ? subjEl.value.trim() : '',
          tpl_body: bodyEl ? bodyEl.value.trim() : '',
          updated_at: new Date().toISOString(),
        }, { merge: true });
      });
      await batch.commit();
      showToast('전체 저장 완료', 'success');
    } catch(e) {
      showToast('저장 실패: ' + e.message, 'error');

      if (btn) { btn.disabled = false; btn.textContent = '전체 저장'; }

  window.validateBulkBrands = async function() {
    var fileEl = document.getElementById('bulk-brand-file');
    if (!fileEl || !fileEl.files[0]) { showToast('파일을 먼저 선택해주세요.', 'error'); return; }
    if (!window.XLSX) { showToast('라이브러리 로딩 중입니다. 잠시 후 다시 시도해주세요.', 'error'); return; }
    var summaryEl = document.getElementById('bulk-brand-summary');
    var resultWrap = document.getElementById('bulk-brand-result');
    var tbody = document.getElementById('bulk-brand-tbody');
    var thead = document.getElementById('bulk-brand-thead');
    resultWrap.style.display = 'block';
    summaryEl.innerHTML = '<div class="spinner spinner-sm" style="display:inline-block;margin-right:8px;"></div>검사 중...';
    tbody.innerHTML = ''; thead.innerHTML = '';
    document.getElementById('btn-do-bulk-brand').style.display = 'none';
    window._bulkBrandValidated = null;

    try {
      var file = fileEl.files[0];
      var isZip = file.name.toLowerCase().endsWith('.zip');
      var xlsxBuf;
      var imageMap = {};

      if (isZip) {
        if (!window.JSZip) { summaryEl.innerHTML = 'JSZip 라이브러리가 로드되지 않았습니다.'; return; }
        summaryEl.innerHTML = '<div class="spinner spinner-sm" style="display:inline-block;margin-right:8px;"></div>ZIP 분석 중...';
        var zipBuf = await file.arrayBuffer();
        var zip = await JSZip.loadAsync(zipBuf);
        var xlsxEntry = null;
        var imgPromises = [];
        zip.forEach(function(path, entry) {
          if (entry.dir || path.includes('__MACOSX') || path.startsWith('.')) return;
          var lp = path.toLowerCase();
          if (!xlsxEntry && /\.(xlsx|xls|csv)$/.test(lp)) { xlsxEntry = entry; }
          else if (/\.(jpg|jpeg|png|webp)$/.test(lp)) {
            var basename = path.split('/').pop().replace(/\.[^.]+$/, '').toUpperCase().trim();
            var ext = lp.split('.').pop().replace('jpeg','jpg');
            imgPromises.push(entry.async('arraybuffer').then(function(buf) { imageMap[basename] = { buf: buf, ext: ext }; }));
          }
        });
        if (!xlsxEntry) { summaryEl.innerHTML = '❌ ZIP 안에 엑셀 파일(.xlsx)이 없습니다. 폴더 없이 파일을 바로 ZIP에 넣었는지 확인해주세요.'; return; }
        xlsxBuf = await xlsxEntry.async('arraybuffer');
        await Promise.all(imgPromises);
        summaryEl.innerHTML = '<div class="spinner spinner-sm" style="display:inline-block;margin-right:8px;"></div>ZIP 분석 완료 (이미지 ' + Object.keys(imageMap).length + '개). 엑셀 검사 중...';
      } else {
        xlsxBuf = await file.arrayBuffer();
      }
      window._bulkBrandImageMap = imageMap;

      var wb = XLSX.read(xlsxBuf, {type:'array'});
      var sheetName = wb.SheetNames.includes('브랜드목록') ? '브랜드목록' : wb.SheetNames[wb.SheetNames.length - 1];
      var ws = wb.Sheets[sheetName];
      var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if (!rows || rows.length < 2) { summaryEl.innerHTML = '데이터 행이 없습니다. 양식을 확인해주세요.'; return; }

      var headerIdx = -1;
      for (var i = 0; i < Math.min(rows.length, 8); i++) {
        if (rows[i].some(function(c){ return String(c).includes('브랜드명'); })) { headerIdx = i; break; }
      }
      if (headerIdx < 0) { summaryEl.innerHTML = '헤더 행(브랜드명*)을 찾을 수 없습니다. 양식을 확인해주세요.'; return; }

      var headers = rows[headerIdx].map(function(h){ return String(h).replace('*','').trim(); });
      var dataRows = rows.slice(headerIdx + 1).filter(function(r){
        if (!r.some(function(c){ return String(c).trim(); })) return false; // 빈 행
        var first = String(r[0] || '').trim();
        if (first.startsWith('예)') || first.startsWith('예시') || first.startsWith('(작성')) return false; // 안내 행
        return true;
      });

      var colIdx = {};
      ['브랜드명','브랜드코드','거래유형','사업자구분','대표자명','연락처','이메일','SNS','브랜드소개'].forEach(function(k){
        colIdx[k] = headers.findIndex(function(h){ return h.includes(k); });
      });

      var existingSnap = await getDocs(collection(db, 'brands'));
      var existingCodes = new Set(existingSnap.docs.map(function(d){ return (d.data().brand_code||'').toUpperCase(); }));

      var results = [];
      var codesInFile = new Set();
      var okCount = 0; var errCount = 0;

      dataRows.forEach(function(row, i) {
        var get = function(key){ var ci = colIdx[key]; return ci >= 0 ? String(row[ci] || '').trim() : ''; };
        var brandName = get('브랜드명');
        var brandCode = get('브랜드코드').toUpperCase();
        var brandType = get('거래유형');
        var errors = [];

        if (!brandName) errors.push('브랜드명 누락');
        if (!brandCode) errors.push('브랜드코드 누락');
        else if (!/^[A-Z0-9]{2,10}$/.test(brandCode)) errors.push('브랜드코드 형식 오류 (영문대문자·숫자 2~10자)');
        else if (existingCodes.has(brandCode)) errors.push('이미 존재하는 브랜드코드: ' + brandCode);
        else if (codesInFile.has(brandCode)) errors.push('파일 내 브랜드코드 중복: ' + brandCode);
        if (!brandType) errors.push('거래유형 누락');

        if (errors.length === 0) { okCount++; codesInFile.add(brandCode); }

        results.push({ rowNum: i+1, brandName, brandCode, brandType,

           '<td>' + (r.brandType || '-') + '</td>',
           '<td>' + (r.bizDiv || '-') + '</td>',
           '<td>' + (r.phone || '-') + '</td>',
           '<td>' + (r.email || '-') + '</td>',
           '<td>' + status + '</td>'].join('') + '</tr>';
      }).join('');

      var imgKeys = Object.keys(window._bulkBrandImageMap || {});
      var matchCount = imgKeys.length > 0
        ? results.filter(function(r){ return r.errors.length === 0 && window._bulkBrandImageMap[r.brandCode]; }).length
        : 0;

      summaryEl.innerHTML =
        '총 <strong>' + dataRows.length + '행</strong> 검사 완료 &nbsp;|&nbsp; ' +
        '등록 가능: <strong style="color:#16a34a;">' + okCount + '개</strong> &nbsp;|&nbsp; ' +
        '오류: <strong style="color:#dc2626;">' + errCount + '개</strong>' +

  window.saveBulkBrands = async function() {
    var items = window._bulkBrandValidated;
    if (!items || items.length === 0) { showToast('업로드할 데이터가 없습니다.', 'error'); return; }
    var btn = document.getElementById('btn-do-bulk-brand');
    btn.disabled = true; btn.innerHTML = '<div class="spinner spinner-sm"></div> 업로드 중...';
    try {
      var now = new Date().toISOString();
      var existingSnap = await getDocs(collection(db, 'brands'));
      var existingCodes = new Set(existingSnap.docs.map(function(d){ return (d.data().brand_code||'').toUpperCase(); }));
      var added = 0; var skipped = 0; var imgUploaded = 0;
      for (var i = 0; i < items.length; i++) {
        var item = items[i];
        if (existingCodes.has(item.brandCode)) { skipped++; continue; }
        var data = {
          brand_name: item.brandName, brand_code: item.brandCode, brand_type: item.brandType,
          brand_desc: item.desc || '',
          contact_info: { phone: item.phone || '', email: item.email || '', sns: item.sns || '' },
          logo_url: '', last_product_number: '000',
          onboarding_status: '미계약', created_at: now, updated_at: now
        };
        if (item.bizDiv) data.biz_div = item.bizDiv;
        if (item.ceo) data.ceo_name = item.ceo;
        var docRef = await addDoc(collection(db, 'brands'), data);
        existingCodes.add(item.brandCode);
        added++;
        // 이미지 업로드 (ZIP에 파일명=브랜드코드 일치하는 경우)
        var imgData = (window._bulkBrandImageMap || {})[item.brandCode.toUpperCase()];
        if (imgData) {
          try {
            var mime = imgData.ext === 'png' ? 'image/png' : imgData.ext === 'webp' ? 'image/webp' : 'image/jpeg';
            var sRef = ref(storage, 'brands/' + docRef.id + '/logo.' + imgData.ext);
            await uploadBytes(sRef, new Uint8Array(imgData.buf), { contentType: mime });
            var logoUrl = await getDownloadURL(sRef);
            await updateDoc(doc(db, 'brands', docRef.id), { logo_url: logoUrl });
            imgUploaded++;
          } catch(imgErr) { console.warn('이미지 업로드 실패(' + item.brandCode + '):', imgErr.message); }
        }
      }
      showToast(added + '개 브랜드 등록 완료' + (imgUploaded > 0 ? ' (이미지 ' + imgUploaded + '개 포함)' : '') + (skipped > 0 ? ' · ' + skipped + '개 코드 충돌 제외' : ''), 'success');
      closeModal();
      const content = document.getElementById('page-content');
      if (content) await renderBrandList(content);

      showToast('업로드 오류: ' + e.message, 'error');
      btn.disabled = false; btn.textContent = '📤 대량 업로드';
    }
  };

  window.validateBulkProducts = async function() {
    var fileEl = document.getElementById('bulk-product-file');
    if (!fileEl || !fileEl.files[0]) { showToast('파일을 먼저 선택해주세요.', 'error'); return; }
    if (!window.XLSX) { showToast('라이브러리 로딩 중입니다.', 'error'); return; }
    var summaryEl = document.getElementById('bulk-product-summary');
    var resultWrap = document.getElementById('bulk-product-result');
    var tbody = document.getElementById('bulk-product-tbody');
    var thead = document.getElementById('bulk-product-thead');
    resultWrap.style.display = 'block';
    summaryEl.innerHTML = '<div class="spinner spinner-sm" style="display:inline-block;margin-right:8px;"></div>검사 중...';
    tbody.innerHTML = ''; thead.innerHTML = '';
    document.getElementById('btn-do-bulk-product').style.display = 'none';
    window._bulkProductValidated = null;

    try {
      var file = fileEl.files[0];
      var isZip = file.name.toLowerCase().endsWith('.zip');
      var xlsxBuf;
      var imageMap = {}; // key: normalized string, value: {buf, ext}

      if (isZip) {
        if (!window.JSZip) { summaryEl.innerHTML = 'JSZip 라이브러리가 로드되지 않았습니다.'; return; }
        summaryEl.innerHTML = '<div class="spinner spinner-sm" style="display:inline-block;margin-right:8px;"></div>ZIP 분석 중...';
        var zipBuf = await file.arrayBuffer();
        var zip = await JSZip.loadAsync(zipBuf);
        var xlsxEntry = null;
        var imgPromises = [];
        zip.forEach(function(path, entry) {
          if (entry.dir || path.includes('__MACOSX') || path.startsWith('.')) return;
          var lp = path.toLowerCase();
          if (!xlsxEntry && /\.(xlsx|xls|csv)$/.test(lp)) { xlsxEntry = entry; }
          else if (/\.(jpg|jpeg|png|webp)$/.test(lp)) {
            var basename = path.split('/').pop().replace(/\.[^.]+$/, '');
            var ext = lp.split('.').pop().replace('jpeg','jpg');
            imgPromises.push(entry.async('arraybuffer').then(function(buf) { imageMap[basename] = { buf: buf, ext: ext }; }));
          }
        });
        if (!xlsxEntry) { summaryEl.innerHTML = '❌ ZIP 안에 엑셀 파일(.xlsx)이 없습니다.'; return; }
        xlsxBuf = await xlsxEntry.async('arraybuffer');
        await Promise.all(imgPromises);
        summaryEl.innerHTML = '<div class="spinner spinner-sm" style="display:inline-block;margin-right:8px;"></div>ZIP 분석 완료 (이미지 ' + Object.keys(imageMap).length + '개). 엑셀 검사 중...';
      } else {
        xlsxBuf = await file.arrayBuffer();
      }
      window._bulkProductImageMap = imageMap;

      var wb = XLSX.read(xlsxBuf, {type:'array'});
      var sheetName = wb.SheetNames.includes('상품목록') ? '상품목록' : wb.SheetNames[wb.SheetNames.length - 1];
      var ws = wb.Sheets[sheetName];
      var rows = XLSX.utils.sheet_to_json(ws, {header:1, defval:''});
      if (!rows || rows.length < 2) { summaryEl.innerHTML = '데이터 행이 없습니다.'; return; }

      var headerIdx = -1;
      for (var i = 0; i < Math.min(rows.length, 8); i++) {
        if (rows[i].some(function(c){ return String(c).includes('브랜드코드'); })) { headerIdx = i; break; }
      }
      if (headerIdx < 0) { summaryEl.innerHTML = '헤더 행(브랜드코드*)을 찾을 수 없습니다.'; return; }

      var headers = rows[headerIdx].map(function(h){ return String(h).replace('*','').trim(); });
      var COLS = ['브랜드코드','상품명','관리방식','기본판매가','옵션1축이름','옵션1값','옵션2축이름','옵션2값','옵션3축이름','옵션3값','SKU판매가','개체수','메모'];
      var colIdx = {};
      COLS.forEach(function(k){ colIdx[k] = headers.findIndex(function(h){ return h.includes(k); }); });

      var brandSnap = await getDocs(collection(db, 'brands'));
      var brandMap = {};
      brandSnap.docs.forEach(function(d){ brandMap[(d.data().brand_code||'').toUpperCase()] = { id: d.id, brand_name: d.data().brand_name }; });

      var results = [];
      var okCount = 0; var errCount = 0;
      var productKeys = new Set();

      rows.slice(headerIdx + 1).forEach(function(row, rawIdx) {
        if (!row.some(function(c){ return String(c).trim(); })) return; // 빈 행
        var firstCell = String(row[0] || '').trim();
        if (firstCell.startsWith('예)') || firstCell.startsWith('예시') || firstCell.startsWith('(작성')) return; // 안내 행
        var excelRowNum = headerIdx + 2 + rawIdx; // 실제 엑셀 행 번호 (1부터)
        var get = function(key){ var ci = colIdx[key]; return ci >= 0 ? String(row[ci] || '').trim() : ''; };
        var brandCode = get('브랜드코드').toUpperCase();
        var productName = get('상품명');
        var trackingType = get('관리방식');
        var basePriceRaw = get('기본판매가');
        var skuPriceRaw = get('SKU판매가');
        var unitCountRaw = get('개체수');
        var errors = [];

        if (!brandCode) errors.push('브랜드코드 누락');
        else if (!brandMap[brandCode]) errors.push('미등록 브랜드: ' + brandCode);
        if (!productName) errors.push('상품명 누락');
        if (!trackingType) errors.push('관리방식 누락');
        else if (!['수량관리','개체관리'].includes(trackingType)) errors.push('관리방식 오류 (수량관리/개체관리)');
        var basePrice = parseInt(basePriceRaw, 10);
        if (!basePriceRaw) errors.push('기본판매가 누락');
        else if (isNaN(basePrice) || basePrice < 0) errors.push('기본판매가는 0 이상 숫자');

        var skuPrice = skuPriceRaw ? parseInt(skuPriceRaw, 10) : null;
        if (skuPriceRaw && (isNaN(skuPrice) || skuPrice < 0)) errors.push('SKU판매가 형식 오류');

        var unitCount = unitCountRaw ? parseInt(unitCountRaw, 10) : null;
        if (unitCountRaw) {
          if (isNaN(unitCount) || unitCount < 1) errors.push('개체수는 1 이상 정수');
          else if (trackingType === '수량관리') errors.push('수량관리 상품에 개체수 불필요');
        }

        var o1name = get('옵션1축이름'); var o1val = get('옵션1값');
        var o2name = get('옵션2축이름'); var o2val = get('옵션2값');
        var o3name = get('옵션3축이름'); var o3val = get('옵션3값');

        if ((o1name && !o1val) || (!o1name && o1val)) errors.push('옵션1 축이름·값 쌍으로 입력');
        if ((o2name || o2val) && !o1name) errors.push('옵션2는 옵션1 있어야 사용 가능');
        if ((o3name || o3val) && !o2name) errors.push('옵션3은 옵션2 있어야 사용 가능');

        var optSummary = [o1name && (o1name+':'+o1val), o2name && (o2name+':'+o2val), o3name && (o3name+':'+o3val)].filter(Boolean).join(' / ') || '(옵션없음)';
        var productKey = brandCode + '|' + productName;
        if (errors.length === 0) { okCount++; productKeys.add(productKey); }
        else errCount++;

        results.push({ rowNum: excelRowNum, excelRowNum, brandCode, productName, trackingType,
          basePrice: isNaN(basePrice) ? basePriceRaw : basePrice,
          skuPrice, unitCount, optSummary, memo: get('메모'),
          o1name, o1val, o2name, o2val, o3name, o3val, errors });
      });

      var productTrackingMap = {};
      results.forEach(function(r) {
        if (r.errors.length > 0) return;
        var key = r.brandCode + '|' + r.productName;
        if (!productTrackingMap[key]) productTrackingMap[key] = r.trackingType;
        else if (productTrackingMap[key] !== r.trackingType) {
          r.errors.push('같은 상품 내 관리방식 불일치');
          okCount--; errCount++;
        }
      });

      window._bulkProductValidated = results.filter(function(r){ return r.errors.length === 0; });

      thead.innerHTML = '<tr>' + ['행','브랜드','상품명','관리방식','판매가','옵션','개체수','결과'].map(function(h){
        return '<th>' + h + '</th>';
      }).join('') + '</tr>';

      tbody.innerHTML = results.map(function(r) {
        var cls = r.errors.length === 0 ? 'bulk-row-ok' : 'bulk-row-err';
        var status = r.errors.length === 0
          ? '<span style="color:#16a34a;font-weight:600;">정상</span>'
          : '<span style="color:#dc2626;font-size:11px;">' + r.errors.join('<br>') + '</span>';
        var priceStr = r.skuPrice != null
          ? (r.skuPrice.toLocaleString() + '원(SKU)')
          : (isNaN(r.basePrice) ? r.basePrice : r.basePrice.toLocaleString() + '원');
        return '<tr class="' + cls + '">' +
          ['<td style="color:var(--gray-400);">' + r.rowNum + '</td>',
           '<td><code>' + (r.brandCode||'-') + '</code></td>',
           '<td>' + (r.productName||'-') + '</td>',
           '<td>' + (r.trackingType||'-') + '</td>',
           '<td style="white-space:nowrap;">' + priceStr + '</td>',
           '<td style="font-size:11px;">' + r.optSummary + '</td>',
           '<td style="text-align:center;">' + (r.unitCount||'-') + '</td>',
           '<td>' + status + '</td>'].join('') + '</tr>';
      }).join('');

      summaryEl.innerHTML =
        '총 <strong>' + dataRows.length + '행</strong> 검사 완료 &nbsp;|&nbsp; ' +
        '상품: <strong style="color:#16a34a;">' + productKeys.size + '개</strong> &nbsp; SKU: <strong style="color:#16a34a;">' + okCount + '개</strong> &nbsp;|&nbsp; ' +
        '오류: <strong style="color:#dc2626;">' + errCount + '개</strong>' +
        (errCount > 0 ? '<br><span style="font-size:12px;color:var(--gray-500);">오류 행은 업로드에서 제외됩니다.</span>' : '');

      if (okCount > 0) document.getElementById('btn-do-bulk-product').style.display = '';
    } catch(e) {
      summaryEl.innerHTML = '파일 읽기 오류: ' + esc(e.message);
    }
  };

  window.saveBulkProducts = async function() {
    var items = window._bulkProductValidated;
    if (!items || items.length === 0) { showToast('업로드할 데이터가 없습니다.', 'error'); return; }
    var btn = document.getElementById('btn-do-bulk-product');
    btn.disabled = true; btn.innerHTML = '<div class="spinner spinner-sm"></div> 업로드 중...';

    try {
      var settingsSnap = await getDoc(doc(db, 'settings', 'config'));
      var cfg = settingsSnap.exists() ? settingsSnap.data() : {};
      var prodDigits = cfg.product_number_digits || 3;
      var optDigits = cfg.option_number_digits || 2;
      var unitDigits = cfg.unit_number_digits || 3;
      var pad = function(n, d){ return String(n).padStart(d, '0'); };

      var brandSnap = await getDocs(collection(db, 'brands'));
      var brandMap = {};
      brandSnap.docs.forEach(function(d){ brandMap[(d.data().brand_code||'').toUpperCase()] = Object.assign({id:d.id}, d.data()); });

      var productGroupOrder = [];
      var productGroups = {};
      items.forEach(function(item) {
        var key = item.brandCode + '|' + item.productName;
        if (!productGroups[key]) { productGroups[key] = []; productGroupOrder.push(key); }
        productGroups[key].push(item);
      });

      var now = new Date().toISOString();
      var totalProducts = 0; var totalSkus = 0; var totalUnits = 0;

      for (var ki = 0; ki < productGroupOrder.length; ki++) {
        var key = productGroupOrder[ki];
        var group = productGroups[key];
        var first = group[0];
        var brand = brandMap[first.brandCode];
        if (!brand) continue;

        var newProductNumber;
        await runTransaction(db, async function(tx) {
          var brandRef = doc(db, 'brands', brand.id);
          var brandDoc = await tx.get(brandRef);
          var lastNum = parseInt(brandDoc.data().last_product_number || '0', 10);
          newProductNumber = pad(lastNum + 1, prodDigits);
          tx.update(brandRef, { last_product_number: newProductNumber, updated_at: now });
        });

        var productId = first.brandCode + '-' + newProductNumber;
        var trackingType = first.trackingType;
        var productRef = doc(db, 'products', productId);

        // 상품 대표 이미지: 첫 번째 SKU 행 번호로 조회
        var productImgData = (window._bulkProductImageMap || {})[String(first.excelRowNum)];
        var productImgUrl = '';
        if (productImgData) {
          try {
            var mime = productImgData.ext === 'png' ? 'image/png' : productImgData.ext === 'webp' ? 'image/webp' : 'image/jpeg';
            var pRef = ref(storage, 'products/' + productId + '/main.' + productImgData.ext);
            await uploadBytes(pRef, new Uint8Array(productImgData.buf), { contentType: mime });
            productImgUrl = await getDownloadURL(pRef);
          } catch(e) { console.warn('상품 이미지 업로드 실패:', e.message); }
        }

        await setDoc(productRef, {
          brand_id: brand.id, brand_code: first.brandCode, brand_name: brand.brand_name,
          product_number: newProductNumber, product_name: first.productName,
          base_price: first.basePrice, tracking_type: trackingType,
          status: '판매중', approval_status: '승인',
          memo: first.memo || '', last_option_number: pad(0, optDigits),
          image_url: productImgUrl,
          created_at: now, updated_at: now
        });

        var optNum = 0;
        for (var si = 0; si < group.length; si++) {
          var skuItem = group[si];
          var isNoOption = !skuItem.o1name;
          var optCode = isNoOption ? pad(0, optDigits) : pad(++optNum, optDigits);
          var skuId = productId + '-' + optCode;
          var barcodeValue = skuId;

          // SKU 이미지 키: 엑셀 행 번호
          var skuImgData = (window._bulkProductImageMap || {})[String(skuItem.excelRowNum)];
          var skuImgUrl = '';
          if (skuImgData) {
            try {
              var skuMime = skuImgData.ext === 'png' ? 'image/png' : skuImgData.ext === 'webp' ? 'image/webp' : 'image/jpeg';
              var sRef = ref(storage, 'products/' + productId + '/skus/' + skuId + '/main.' + skuImgData.ext);
              await uploadBytes(sRef, new Uint8Array(skuImgData.buf), { contentType: skuMime });
              skuImgUrl = await getDownloadURL(sRef);
            } catch(e) { console.warn('SKU 이미지 업로드 실패:', e.message); }
          }

          await setDoc(doc(db, 'products', productId, 'skus', skuId), {
            option_number: optCode, option_sort_order: optNum,
            option_1_name: skuItem.o1name || '', option_1_value: skuItem.o1val || '',
            option_2_name: skuItem.o2name || '', option_2_value: skuItem.o2val || '',
            option_3_name: skuItem.o3name || '', option_3_value: skuItem.o3val || '',
            price: skuItem.skuPrice != null ? skuItem.skuPrice : skuItem.basePrice,
            barcode_value: barcodeValue, sku_status: '판매중',
            image_url: skuImgUrl,
            last_unit_number: pad(0, unitDigits), created_at: now, updated_at: now
          });
          totalSkus++;

          if (trackingType === '개체관리' && skuItem.unitCount) {
            for (var u = 1; u <= skuItem.unitCount; u++) {
              var unitCode = pad(u, unitDigits);
              await setDoc(doc(db, 'products', productId, 'skus', skuId, 'units', skuId + '-' + unitCode), {
                unit_number: unitCode, barcode_value: barcodeValue + '-' + unitCode,
                unit_price: null, unit_status: '판매중', memo: '', created_at: now, updated_at: now
              });
              totalUnits++;
            }
            await updateDoc(doc(db, 'products', productId, 'skus', skuId), { last_unit_number: pad(skuItem.unitCount, unitDigits) });
          }
        }

        await updateDoc(productRef, { last_option_number: pad(Math.max(optNum, 0), optDigits) });
        totalProducts++;
      }

      showToast('상품 ' + totalProducts + '개 (SKU ' + totalSkus + '개' + (totalUnits > 0 ? ', 개체 ' + totalUnits + '개' : '') + ') 등록 완료!', 'success');
      closeModal();
      const content = document.getElementById('page-content');
      if (content) await renderProductList(content);
    } catch(e) {
      showToast('업로드 오류: ' + e.message, 'error');
      btn.disabled = false; btn.textContent = '📤 대량 업로드';
    }
  };
</script>

<script>
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebar-backdrop').classList.toggle('open');
  }
  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebar-backdrop').classList.remove('open');
  }
  function toggleSidebarCollapse() {
    const sidebar = document.getElementById('sidebar');
    const main = document.getElementById('main');
    const collapsed = sidebar.classList.toggle('collapsed');
    main.classList.toggle('sidebar-collapsed', collapsed);
    // 햄버거 아이콘은 접힘 여부와 무관하게 동일
    try { localStorage.setItem('sidebar_collapsed', collapsed ? '1' : '0'); } catch(e) {}
  }
  // 저장된 상태 복원
  (function() {
    try {
      if (localStorage.getItem('sidebar_collapsed') === '1') {
        const sidebar = document.getElementById('sidebar');
        const main = document.getElementById('main');
        if (sidebar) { sidebar.classList.add('collapsed'); }
        if (main) { main.classList.add('sidebar-collapsed'); }
        // 햄버거 아이콘 유지
      }
    } catch(e) {}
  })();
  function showToast(msg, type) {
    type = type || 'info';
    const el = document.createElement('div');
    el.className = 'toast ' + type;
    el.textContent = msg;
    document.getElementById('toast-container').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
  window.showToast = showToast;
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/service-worker.js').catch(() => {});
    });
  }

  // ═══════════════════════════════════════════════
  //  등록 드롭다운 메뉴 공통
  // ═══════════════════════════════════════════════
  window.toggleRegisterMenu = function(menuId, btn) {
    document.querySelectorAll('.register-dropdown').forEach(function(el) {
      if (el.id !== menuId) el.style.display = 'none';
    });
    var menu = document.getElementById(menuId);
    if (!menu) return;
    menu.style.display = menu.style.display === 'none' ? 'block' : 'none';
  };
  window.closeRegisterMenus = function() {
    document.querySelectorAll('.register-dropdown').forEach(function(el) { el.style.display = 'none'; });
  };
  document.addEventListener('click', function(e) {
    if (!e.target.closest('[data-register-wrap]')) closeRegisterMenus();
  });

  /* ── PWA 설치 프롬프트 ── */
  window._pwaInstallPrompt = null;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    window._pwaInstallPrompt = e;
    const btn = document.getElementById('btn-pwa-install');
    if (btn) btn.style.display = 'inline-flex';
  });
  window.addEventListener('appinstalled', () => {
    window._pwaInstallPrompt = null;
    const btn = document.getElementById('btn-pwa-install');
    const msg = document.getElementById('pwa-already-installed');
    if (btn) btn.style.display = 'none';
    if (msg) msg.style.display = 'inline';
    showToast('앱이 홈 화면에 설치되었습니다!', 'success');
  });
  window.triggerPwaInstall = async function() {
    if (!window._pwaInstallPrompt) return;
    window._pwaInstallPrompt.prompt();
    const { outcome } = await window._pwaInstallPrompt.userChoice;
    if (outcome === 'accepted') window._pwaInstallPrompt = null;
  };
  if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone) {
    window.addEventListener('DOMContentLoaded', () => {
      const msg = document.getElementById('pwa-already-installed');
      if (msg) msg.style.display = 'inline';
    });
  }
</script>
</body>
</html>
